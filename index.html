const TABS = { SETTINGS: 'Settings', FLIPS: 'Flips', ACTUALS: 'Actuals' };
let _gapiReady = false, _tokenClient = null, _signedIn = false;
let _onAuthChange = null;

async function initGoogleApi(onAuthChange) {
  _onAuthChange = onAuthChange;
  return new Promise((resolve) => {
    gapi.load('client', async () => {
      await gapi.client.init({ discoveryDocs: [SHEETS_CONFIG.DISCOVERY_DOC] });
      _gapiReady = true;
      _tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: SHEETS_CONFIG.CLIENT_ID,
        scope: SHEETS_CONFIG.SCOPES,
        callback: (resp) => {
          if (!resp.error) { _signedIn = true; if (_onAuthChange) _onAuthChange(true); }
        },
      });
      // Try to silently reconnect if user has previously signed in
      if (localStorage.getItem('cfs:google_authed')) {
        try {
          _tokenClient.requestAccessToken({ prompt: '' });
        } catch(e) { console.log('Silent re-auth failed:', e); }
      }
      resolve();
    });
  });
}

function doSignIn() {
  if (!_tokenClient) return;
  _tokenClient.requestAccessToken({ prompt: gapi.client.getToken() ? '' : 'consent' });
  localStorage.setItem('cfs:google_authed', 'true');
}

function doSignOut() {
  const token = gapi.client.getToken();
  if (token) { google.accounts.oauth2.revoke(token.access_token); gapi.client.setToken(''); }
  _signedIn = false;
  localStorage.removeItem('cfs:google_authed');
  if (_onAuthChange) _onAuthChange(false);
}

function isGoogleSignedIn() { return _signedIn && gapi.client && gapi.client.getToken() !== null; }

async function ensureTabs() {
  try {
    const resp = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: SHEETS_CONFIG.SHEET_ID });
    const existing = resp.result.sheets.map(s => s.properties.title);
    const reqs = [];
    for (const tab of Object.values(TABS)) {
      if (!existing.includes(tab)) reqs.push({ addSheet: { properties: { title: tab } } });
    }
    if (reqs.length > 0) {
      await gapi.client.sheets.spreadsheets.batchUpdate({ spreadsheetId: SHEETS_CONFIG.SHEET_ID, resource: { requests: reqs } });
    }
  } catch(e) { console.error('ensureTabs error:', e); }
}

const { useState, useMemo, useEffect, useCallback, useRef } = React;

/* ══════════════════════════════════════════════
   CASHFLOW STACKING v4 — CALCULATOR + TRACKER
   Persistent storage · Cross-device sync
   ══════════════════════════════════════════════ */

const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmt = n => n == null || isNaN(n) ? "$0" : "$" + Math.round(n).toLocaleString();
const fmtK = n => { const a = Math.abs(n); return (n<0?'-':'') + (a>=1e6?'$'+(a/1e6).toFixed(1)+'M':a>=1e3?'$'+(a/1e3).toFixed(0)+'k':fmt(n)); };
const fmtDate = d => d ? MO[d.getMonth()] + " " + d.getFullYear() : "—";
const moKey = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
const parseDate = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d||1); };
const addMo = (d, m) => new Date(d.getFullYear(), d.getMonth() + m, 1);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

function monthlyPmt(principal, annualRate, years) {
  const r = annualRate/12, n = years*12;
  if (r<=0||n<=0) return principal/Math.max(n,1);
  return (principal*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}

// Tax calculation for index-fund-backed flips
// Computes net-after-tax monthly payment using FIFO lot-based capital gains
const TAX_FED_ST = 0.32, TAX_FED_LT = 0.15, TAX_STATE = 0.0465; // Utah
const TAX_IDX_RETURN = 0.10; // assumed annual index fund return
const TAX_IDX_MR = Math.pow(1 + TAX_IDX_RETURN, 1/12) - 1;

function calcIndexFundNetPmt(principal, grossPmt, durationMonths) {
  // Returns array of net payments after tax for each month
  let lotBasis = principal, lotShares = principal;
  const nets = [];
  for (let m = 1; m <= durationMonths; m++) {
    lotShares *= (1 + TAX_IDX_MR);
    const sellAmt = Math.min(grossPmt, lotShares);
    const proportion = lotShares > 0 ? sellAmt / lotShares : 1;
    const basisSold = lotBasis * proportion;
    const gain = Math.max(0, sellAmt - basisSold);
    const isLT = m > 12;
    const taxRate = isLT ? (TAX_FED_LT + TAX_STATE) : (TAX_FED_ST + TAX_STATE);
    const tax = gain * taxRate;
    lotShares -= sellAmt;
    lotBasis -= basisSold;
    nets.push(grossPmt - tax);
  }
  return nets;
}

// Get average net payment for an index fund flip
function avgIndexFundNetPmt(principal, grossPmt, durationMonths) {
  const nets = calcIndexFundNetPmt(principal, grossPmt, durationMonths);
  return nets.reduce((s,v) => s+v, 0) / nets.length;
}


// Get combined monthly payment for a flip (handles splits)
function flipTotalPmt(f) {
  if (f.splits && f.splits.length > 0) {
    return f.splits.reduce((sum, s) => sum + (s.monthlyPmt || monthlyPmt(s.amount, (s.yield||8)/100, s.durationYears)), 0);
  }
  return f.monthlyPmt || monthlyPmt(f.amount, (f.yield||8)/100, f.durationYears);
}

// Get splits array (returns single-element array for non-split flips)
function flipSplits(f) {
  if (f.splits && f.splits.length > 0) return f.splits;
  return [{ id: f.id, name: 'Main', amount: f.amount, yield: f.yield, durationYears: f.durationYears,
    monthlyPmt: f.monthlyPmt || monthlyPmt(f.amount, (f.yield||8)/100, f.durationYears),
    indexFund: f.indexFund || false, actualCF: f.actualCF || {} }];
}

// Get the max duration across all splits
function flipMaxDuration(f) {
  if (f.splits && f.splits.length > 0) return Math.max(...f.splits.map(s => s.durationYears));
  return f.durationYears;
}

/* ══ SIMULATION ENGINE ══ */

function simulateFromState(p, initialState) {
  const { startMonth, startDate, desiredMonthlyWithdrawal, maxFlipSize,
    defaultYield, locInterestRate, flipDurationYears, flipsPerAmount, growthMultiplier,
    staleThreshold, maxMonths, currentAge, retirementAge, current401k, monthly401kContrib,
    annual401kYield, monthlyPersonalCash, include401k } = p;

  const monthsToRetirement = Math.max(0, (retirementAge - currentAge) * 12);

  // Core single-month step function (mutates state in place, returns row data)
  function step(s, m, date, postFreedom) {
    const pc = postFreedom ? 0 : monthlyPersonalCash;
    const wd = postFreedom ? desiredMonthlyWithdrawal : 0;

    let deployed = false;
    if (s.loc <= 0) {
      s.loc = 0;
      const gap = m - s.lfm;
      if (s.faa >= flipsPerAmount && gap < staleThreshold) {
        s.fa = Math.min(s.fa * growthMultiplier, maxFlipSize); s.faa = 0;
      }
      const pmt = monthlyPmt(s.fa, defaultYield, flipDurationYears);
      s.flips.push({ startMonth: m, pmt, endMonth: m + Math.round(flipDurationYears * 12) });
      s.loc += s.fa; s.fc++; s.faa++; s.lfm = m; deployed = true;
    }

    let assetCF = 0;
    for (const f of s.flips) {
      if (m > f.startMonth && m <= f.endMonth) {
        if (f.indexFund && f.amount) {
          // Cache net payments array on the flip object
          if (!f._nets) {
            const dur = f.endMonth - f.startMonth;
            f._nets = calcIndexFundNetPmt(f.amount, f.pmt, dur);
          }
          const flipMo = m - f.startMonth;
          assetCF += (flipMo > 0 && flipMo <= f._nets.length) ? f._nets[flipMo - 1] : f.pmt;
        } else {
          assetCF += f.pmt;
        }
      }
    }

    if (include401k && m < monthsToRetirement) { s.b401k += monthly401kContrib; s.b401k *= (1 + annual401kYield / 12); }
    const ret401k = (include401k && m >= monthsToRetirement) ? (s.b401k * 0.04) / 12 : 0;

    const locInt = s.loc * (locInterestRate / 12);
    s.loc = s.loc + locInt - pc - assetCF - ret401k + wd;

    if (s.loc <= 0 && !deployed) {
      s.loc = 0;
      const gap = m - s.lfm;
      if (s.faa >= flipsPerAmount && gap < staleThreshold) {
        s.fa = Math.min(s.fa * growthMultiplier, maxFlipSize); s.faa = 0;
      }
      const pmt = monthlyPmt(s.fa, defaultYield, flipDurationYears);
      s.flips.push({ startMonth: m, pmt, endMonth: m + Math.round(flipDurationYears * 12) });
      s.loc += s.fa; s.fc++; s.faa++; s.lfm = m;
    }

    const totalCF = assetCF + ret401k;
    return {
      month: m, date, flipNumber: s.fc, personalCash: pc, assetCF,
      locBalance: Math.max(0, s.loc),
      currentFlipAmount: s.fa, balance401k: s.b401k, retirement401kMonthly: ret401k,
      totalMonthlyCF: totalCF, monthlyWithdrawalOut: wd,
      activeFlipCount: s.flips.filter(f => m >= f.startMonth && m <= f.endMonth).length,
      source: 'forecast',
    };
  }

  function cloneState(s) {
    return { loc: s.loc, flips: s.flips.map(f => ({...f})), fc: s.fc, faa: s.faa,
      fa: s.fa, lfm: s.lfm, b401k: s.b401k };
  }

  function makeState(is) {
    return { loc: is.locBalance, flips: is.activeFlips.map(f => ({...f})),
      fc: is.flipCount, faa: is.flipsAtCurrentAmt, fa: is.currentFlipAmt,
      lfm: is.lastFlipMonth, b401k: is.balance401k };
  }

  // Test if the system is self-sustaining indefinitely from this point
  // Runs 50 years forward with $0 personal cash and desired withdrawal
  function testSustainable(savedState, fromMonth) {
    const ts = cloneState(savedState);
    let peakCF = 0;
    for (let t = 0; t < 600; t++) {
      const tm = fromMonth + 1 + t;
      const date = addMo(startDate, tm - startMonth);
      const row = step(ts, tm, date, true);
      if (row.assetCF > peakCF) peakCF = row.assetCF;
      const hasActive = ts.flips.some(f => tm < f.endMonth);
      if (peakCF > 0 && row.assetCF <= 0 && !hasActive) return false;
    }
    return true;
  }

  // === Main simulation ===
  const state = makeState(initialState);
  const rows = [];
  let freedomDate = null, freedomMonth = null;
  let freedomReached = initialState.freedomReached || false;
  let cfDepletedDate = null, cfDepletedMonth = null, peakAssetCF = 0;

  if (freedomReached) {
    freedomMonth = startMonth;
    freedomDate = addMo(startDate, 0);
  }

  for (let i = 0; i < maxMonths; i++) {
    const m = startMonth + i;
    const date = addMo(startDate, i);
    const row = step(state, m, date, freedomReached);
    rows.push(row);

    // Freedom check: can the system sustain itself if I stop contributing and start withdrawing?
    if (!freedomReached && row.assetCF > 0 && row.assetCF >= desiredMonthlyWithdrawal * 0.5) {
      const snapshot = cloneState(state);
      if (testSustainable(snapshot, m)) {
        freedomReached = true;
        freedomDate = date;
        freedomMonth = m;
      }
    }

    // CF depletion tracking
    if (row.assetCF > peakAssetCF) peakAssetCF = row.assetCF;
    const hasActiveFuture = state.flips.some(f => m < f.endMonth);
    if (!cfDepletedDate && peakAssetCF > 0 && row.assetCF <= 0 && !hasActiveFuture && freedomReached) {
      cfDepletedDate = date; cfDepletedMonth = m;
    }
  }

  return { rows, freedomDate, freedomMonth, cfDepletedDate, cfDepletedMonth };
}

/* Index fund sim */
function simulateIndexFund(p) {
  const { startDate, monthlyPersonalCash, desiredMonthlyWithdrawal, annualReturn, maxMonths } = p;
  const rows = []; let balance = 0, freedomMonth = null, freedomDate = null;
  let depletedMonth = null, depletedDate = null, phase = "accumulate";
  for (let m = 0; m < maxMonths; m++) {
    const mr = annualReturn / 12;
    if (phase === "accumulate") {
      balance += monthlyPersonalCash; balance *= (1 + mr);
      const w = (balance * 0.04) / 12;
      if (w >= desiredMonthlyWithdrawal) { freedomDate = addMo(startDate, m); freedomMonth = m; phase = "drawdown"; }
      rows.push({ month: m, date: addMo(startDate, m), balance, monthlyWithdrawable: w, phase: "accumulate" });
    } else if (phase === "drawdown") {
      balance *= (1 + mr); balance -= desiredMonthlyWithdrawal;
      if (balance <= 0) { balance = 0; depletedDate = addMo(startDate, m); depletedMonth = m; phase = "depleted"; }
      rows.push({ month: m, date: addMo(startDate, m), balance, monthlyWithdrawable: balance > 0 ? desiredMonthlyWithdrawal : 0, phase });
    } else {
      rows.push({ month: m, date: addMo(startDate, m), balance: 0, monthlyWithdrawable: 0, phase: "depleted" });
    }
  }
  return { rows, freedomDate, freedomMonth, depletedDate, depletedMonth };
}

/* ══ UI COMPONENTS ══ */

function Spark({ data, h = 50, color = "#22d3ee" }) {
  if (!data?.length) return null;
  const max = Math.max(...data, 1), w = data.length * 3;
  const pts = data.map((v, i) => `${i*3},${h-(v/max)*(h-6)-3}`).join(' ');
  const area = pts + ` ${(data.length-1)*3},${h} 0,${h}`;
  const id = `sp${color.slice(1)}`;
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={area} fill={`url(#${id})`}/><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
}

function DualChart({ rows, idxData, target }) {
  if (!rows?.length) return null;
  const W = 800, H = 300, P = { t: 28, r: 18, b: 38, l: 72 };
  const cw = W-P.l-P.r, ch = H-P.t-P.b;
  const cfV = rows.map(d => d.assetCF||0);
  const idxV = idxData ? idxData.slice(0, rows.length).map(d => d.monthlyWithdrawable||0) : [];
  const maxY = Math.max(...cfV, ...idxV, target*1.2, 1);
  const x = i => P.l + (i/Math.max(rows.length-1,1))*cw;
  const y = v => P.t + ch - (v/maxY)*ch;
  const path = vals => vals.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const area = vals => path(vals)+` L${x(vals.length-1).toFixed(1)},${P.t+ch} L${x(0).toFixed(1)},${P.t+ch} Z`;
  const yT = [0,.25,.5,.75,1].map(p=>({v:maxY*p,y:y(maxY*p)}));
  const xT = []; const step = Math.max(1, Math.floor(rows.length/7));
  for (let i=0;i<rows.length;i+=step) xT.push({l:fmtDate(rows[i].date),x:x(i)});

  // Find actual/forecast boundary
  const lastActIdx = rows.findIndex(r => r.source === 'forecast');
  const boundaryX = lastActIdx > 0 ? x(lastActIdx) : null;

  // Find freedom and depletion
  const freeIdx = -1; // freedom marker handled separately
  const actualFreeIdx = -1; // freedom marker handled by parent

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
      <defs>
        <linearGradient id="cfg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#06b6d4" stopOpacity=".15"/><stop offset="100%" stopColor="#06b6d4" stopOpacity="0"/></linearGradient>
      </defs>
      {yT.map((t,i)=>(<g key={i}><line x1={P.l} y1={t.y} x2={W-P.r} y2={t.y} stroke="#1e293b"/><text x={P.l-6} y={t.y+3} textAnchor="end" fill="#475569" fontSize="9" fontFamily="monospace">{fmtK(t.v)}</text></g>))}
      {xT.map((t,i)=><text key={i} x={t.x} y={H-6} textAnchor="middle" fill="#475569" fontSize="8" fontFamily="monospace">{t.l}</text>)}

      {/* Actual/Forecast boundary */}
      {boundaryX && (<g>
        <line x1={boundaryX} y1={P.t} x2={boundaryX} y2={P.t+ch} stroke="#475569" strokeWidth="1" strokeDasharray="2,4" opacity=".5"/>
        <text x={boundaryX+4} y={P.t+10} fill="#475569" fontSize="7" fontFamily="monospace">Forecast →</text>
      </g>)}

      <path d={area(cfV)} fill="url(#cfg)"/>
      <path d={path(cfV)} fill="none" stroke="#06b6d4" strokeWidth="2"/>
      {idxV.length>0 && <path d={path(idxV)} fill="none" stroke="#f97316" strokeWidth="1.5" strokeDasharray="2,3" opacity=".7"/>}
      <line x1={P.l} y1={y(target)} x2={W-P.r} y2={y(target)} stroke="#ef4444" strokeWidth="1" strokeDasharray="3,4" opacity=".4"/>
      <text x={W-P.r-2} y={y(target)-4} textAnchor="end" fill="#ef4444" fontSize="8" fontFamily="monospace" opacity=".5">Target {fmt(target)}</text>

      {actualFreeIdx > 0 && actualFreeIdx < rows.length && (<g>
        <line x1={x(actualFreeIdx)} y1={P.t} x2={x(actualFreeIdx)} y2={P.t+ch} stroke="#22c55e" strokeWidth="1.5" strokeDasharray="4,3"/>
        <circle cx={x(actualFreeIdx)} cy={y(cfV[actualFreeIdx])} r="4" fill="#22c55e" stroke="#020617" strokeWidth="1.5"/>
        <rect x={x(actualFreeIdx)-36} y={P.t-1} width="72" height="15" rx="4" fill="#22c55e"/>
        <text x={x(actualFreeIdx)} y={P.t+9.5} textAnchor="middle" fill="#020617" fontSize="7.5" fontWeight="800" fontFamily="monospace">FREEDOM</text>
      </g>)}
    </svg>
  );
}

function Inp({ label, value, onChange, pre, suf, step, min, max, type="number", note, small, style: sx }) {
  return (
    <div style={{ marginBottom: small?8:14, ...sx }}>
      <label style={{display:'block',fontSize:9,fontWeight:700,color:'#94a3b8',marginBottom:3,textTransform:'uppercase',letterSpacing:'.08em',fontFamily:'var(--m)'}}>
        {label}{note&&<span style={{color:'#475569',fontWeight:400,textTransform:'none',letterSpacing:0,marginLeft:5,fontSize:8}}>{note}</span>}
      </label>
      <div style={{display:'flex',alignItems:'center',background:'#0f172a',border:'1px solid #1e293b',borderRadius:6,padding:'0 8px'}}>
        {pre&&<span style={{color:'#475569',fontSize:12,marginRight:2,fontFamily:'var(--m)'}}>{pre}</span>}
        <input type={type} value={value} step={step} min={min} max={max}
          onChange={e=>onChange(type==="number"?parseFloat(e.target.value)||0:e.target.value)}
          style={{flex:1,background:'transparent',border:'none',outline:'none',color:'#e2e8f0',fontSize:13,padding:'7px 0',fontFamily:'var(--m)',width:'100%'}}/>
        {suf&&<span style={{color:'#475569',fontSize:10,marginLeft:2,fontFamily:'var(--m)'}}>{suf}</span>}
      </div>
    </div>
  );
}

function Card({ label, value, sub, color="#06b6d4", icon }) {
  return (
    <div style={{background:'linear-gradient(145deg,#0f172a,#1a2332)',border:'1px solid #1e293b',borderRadius:10,padding:'14px 12px',flex:'1 1 150px',minWidth:140,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-12,right:-12,width:48,height:48,borderRadius:'50%',background:color,opacity:.04}}/>
      <div style={{fontSize:9,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:5,fontFamily:'var(--m)'}}>{icon&&<span style={{marginRight:4}}>{icon}</span>}{label}</div>
      <div style={{fontSize:20,fontWeight:800,color,lineHeight:1.1,fontFamily:'var(--d)'}}>{value}</div>
      {sub&&<div style={{fontSize:9,color:'#475569',marginTop:2,fontFamily:'var(--m)'}}>{sub}</div>}
    </div>
  );
}

function Btn({ children, onClick, color="#06b6d4", small, disabled }) {
  return <button onClick={onClick} disabled={disabled} style={{
    padding: small?'5px 10px':'8px 16px', borderRadius:6, border:`1px solid ${color}33`,
    background:`${color}11`, color, fontSize: small?10:11, fontWeight:600, cursor: disabled?'not-allowed':'pointer',
    fontFamily:'var(--m)', opacity: disabled?.5:1, transition:'all .15s',
  }}>{children}</button>;
}

/* ══════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════ */
function App({ googleReady, signedIn, onSignIn, onSignOut }) {
  // Settings
  const [startDate, setStartDate] = useState("2024-08-01");
  const [monthlyPersonalCash, setMonthlyPersonalCash] = useState(2000);
  const [startingFlipAmount, setStartingFlipAmount] = useState(9500);
  const [desiredMonthlyWithdrawal, setDesiredMonthlyWithdrawal] = useState(10000);
  const [maxFlipSize, setMaxFlipSize] = useState(600000);
  const [defaultYield, setDefaultYield] = useState(8);
  const [locInterestRate, setLocInterestRate] = useState(4);
  const [flipDurationYears, setFlipDurationYears] = useState(3);
  const [flipsPerAmount, setFlipsPerAmount] = useState(4);
  const [growthMultiplier, setGrowthMultiplier] = useState(1.5);
  const [staleThreshold, setStaleThreshold] = useState(12);
  const [currentAge, setCurrentAge] = useState(35);
  const [retirementAge, setRetirementAge] = useState(60);
  const [current401k, setCurrent401k] = useState(250000);
  const [include401k, setInclude401k] = useState(true);
  const [monthly401kContrib, setMonthly401kContrib] = useState(1400);
  const [annual401kYield, setAnnual401kYield] = useState(7);
  const [indexFundReturn, setIndexFundReturn] = useState(10);

  // Actuals
  const [actuals, setActuals] = useState({}); // keyed by "YYYY-MM" -> { personalCash, withdrawal, notes }
  const [trackedFlips, setTrackedFlips] = useState([]); // [{id, name, amount, yield, startDate, durationYears, monthlyPmt, actualCF: {"YYYY-MM": amount}}]

  // UI
  const [tab, setTab] = useState("dashboard");
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [editMonth, setEditMonth] = useState('');
  const [newFlipForm, setNewFlipForm] = useState({ name:'', amount:9500, yield:8, startDate:'', durationYears:3, indexFund:false });
  const [editingFlipId, setEditingFlipId] = useState(null);
  const [exportData, setExportData] = useState(null);
  const [importData, setImportData] = useState('');
  const [showImport, setShowImport] = useState(false);
  const [detailRange, setDetailRange] = useState('default'); // 'default', 'all', '10yr', '20yr', '30yr'

  // Load from storage on mount
  useEffect(() => {
    loadData().then(({ settings, actuals: a, flips: f }) => {
      if (settings) {
        if (settings.startDate) setStartDate(settings.startDate);
        if (settings.monthlyPersonalCash != null) setMonthlyPersonalCash(settings.monthlyPersonalCash);
        if (settings.startingFlipAmount != null) setStartingFlipAmount(settings.startingFlipAmount);
        if (settings.desiredMonthlyWithdrawal != null) setDesiredMonthlyWithdrawal(settings.desiredMonthlyWithdrawal);
        if (settings.maxFlipSize != null) setMaxFlipSize(settings.maxFlipSize);
        if (settings.defaultYield != null) setDefaultYield(settings.defaultYield);
        if (settings.locInterestRate != null) setLocInterestRate(settings.locInterestRate);
        if (settings.flipDurationYears != null) setFlipDurationYears(settings.flipDurationYears);
        if (settings.flipsPerAmount != null) setFlipsPerAmount(settings.flipsPerAmount);
        if (settings.growthMultiplier != null) setGrowthMultiplier(settings.growthMultiplier);
        if (settings.staleThreshold != null) setStaleThreshold(settings.staleThreshold);
        if (settings.currentAge != null) setCurrentAge(settings.currentAge);
        if (settings.retirementAge != null) setRetirementAge(settings.retirementAge);
        if (settings.current401k != null) setCurrent401k(settings.current401k);
        if (settings.include401k != null) setInclude401k(settings.include401k);
        if (settings.monthly401kContrib != null) setMonthly401kContrib(settings.monthly401kContrib);
        if (settings.annual401kYield != null) setAnnual401kYield(settings.annual401kYield);
        if (settings.indexFundReturn != null) setIndexFundReturn(settings.indexFundReturn);
      }
      if (a) setActuals(a);
      if (f && f.length) setTrackedFlips(f);
      setLoaded(true);
    });
  }, []);

  // Reload data from Google Sheets when sign-in status changes
  useEffect(() => {
    if (!loaded || !signedIn) return;
    loadData().then(({ settings, actuals: a, flips: f }) => {
      if (settings && Object.keys(settings).length > 0) {
        if (settings.startDate) setStartDate(settings.startDate);
        if (settings.monthlyPersonalCash != null) setMonthlyPersonalCash(settings.monthlyPersonalCash);
        if (settings.startingFlipAmount != null) setStartingFlipAmount(settings.startingFlipAmount);
        if (settings.desiredMonthlyWithdrawal != null) setDesiredMonthlyWithdrawal(settings.desiredMonthlyWithdrawal);
        if (settings.maxFlipSize != null) setMaxFlipSize(settings.maxFlipSize);
        if (settings.defaultYield != null) setDefaultYield(settings.defaultYield);
        if (settings.locInterestRate != null) setLocInterestRate(settings.locInterestRate);
        if (settings.flipDurationYears != null) setFlipDurationYears(settings.flipDurationYears);
        if (settings.flipsPerAmount != null) setFlipsPerAmount(settings.flipsPerAmount);
        if (settings.growthMultiplier != null) setGrowthMultiplier(settings.growthMultiplier);
        if (settings.staleThreshold != null) setStaleThreshold(settings.staleThreshold);
        if (settings.currentAge != null) setCurrentAge(settings.currentAge);
        if (settings.retirementAge != null) setRetirementAge(settings.retirementAge);
        if (settings.current401k != null) setCurrent401k(settings.current401k);
        if (settings.include401k != null) setInclude401k(settings.include401k);
        if (settings.monthly401kContrib != null) setMonthly401kContrib(settings.monthly401kContrib);
        if (settings.annual401kYield != null) setAnnual401kYield(settings.annual401kYield);
        if (settings.indexFundReturn != null) setIndexFundReturn(settings.indexFundReturn);
      }
      if (a && Object.keys(a).length > 0) setActuals(a);
      if (f && f.length > 0) setTrackedFlips(f);
    });
  }, [signedIn]);
  const saveTimer = useRef(null);
  useEffect(() => {
    if (!loaded) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      setSaving(true);
      const s = { startDate, monthlyPersonalCash, startingFlipAmount, desiredMonthlyWithdrawal,
        maxFlipSize, defaultYield, locInterestRate, flipDurationYears,
        flipsPerAmount, growthMultiplier, staleThreshold, currentAge, retirementAge,
        current401k, monthly401kContrib, annual401kYield, indexFundReturn,
        include401k };
      saveSettings(s).then(() => setTimeout(()=>setSaving(false), 500));
    }, 800);
  }, [loaded, startDate, monthlyPersonalCash, startingFlipAmount, desiredMonthlyWithdrawal, maxFlipSize, defaultYield, locInterestRate, flipDurationYears, flipsPerAmount, growthMultiplier, staleThreshold, currentAge, retirementAge, current401k, monthly401kContrib, annual401kYield, indexFundReturn, include401k]);

  // Save actuals/flips
  const persistActuals = useCallback((a) => { setActuals(a); saveActuals(a); }, []);
  const persistFlips = useCallback((f) => { setTrackedFlips(f); saveFlips(f); }, []);

  /* ── Build combined actuals + forecast rows ── */
  const { combinedRows, freedomDate, freedomMonth, cfDepletedDate } = useMemo(() => {
    const sd = parseDate(startDate);
    const dy = defaultYield / 100;
    const lr = locInterestRate / 100;
    const ay = annual401kYield / 100;

    // Sort actual months
    const actualMonthKeys = Object.keys(actuals).sort();

    // Build actual rows - LOC calculated from flip deployments, CF, personal cash, withdrawals
    const actualRows = [];
    let runningLOC = 0;
    let actualFlipCount = trackedFlips.length;

    for (const mk of actualMonthKeys) {
      const [yr, mo] = mk.split('-').map(Number);
      const date = new Date(yr, mo - 1, 1);
      const monthIdx = (yr - sd.getFullYear()) * 12 + (mo - 1 - sd.getMonth());
      if (monthIdx < 0) continue;

      const a = actuals[mk];
      const personalCash = a.personalCash ?? 0;
      const withdrawal = a.withdrawal || 0;

      // Compute asset CF from tracked flips (split-aware)
      let assetCF = 0;
      for (const f of trackedFlips) {
        const fStart = parseDate(f.startDate);
        const fStartMonth = (fStart.getFullYear() - sd.getFullYear()) * 12 + (fStart.getMonth() - sd.getMonth());
        const splits = flipSplits(f);
        for (const sp of splits) {
          const cfOverride = sp.actualCF?.[mk];
          if (cfOverride != null) {
            assetCF += cfOverride;
          } else {
            const fEndMonth = fStartMonth + Math.round(sp.durationYears * 12);
            if (monthIdx > fStartMonth && monthIdx <= fEndMonth) {
              const grossPmt = sp.monthlyPmt || monthlyPmt(sp.amount, (sp.yield||8)/100, sp.durationYears);
              if (sp.indexFund) {
                const flipMonth = monthIdx - fStartMonth;
                const nets = calcIndexFundNetPmt(sp.amount, grossPmt, Math.round(sp.durationYears * 12));
                assetCF += (flipMonth > 0 && flipMonth <= nets.length) ? nets[flipMonth - 1] : grossPmt;
              } else {
                assetCF += grossPmt;
              }
            }
          }
        }
      }

      // Check if a new flip was deployed this month (adds to LOC)
      for (const f of trackedFlips) {
        const fStart = parseDate(f.startDate);
        const fStartMonth = (fStart.getFullYear() - sd.getFullYear()) * 12 + (fStart.getMonth() - sd.getMonth());
        if (fStartMonth === monthIdx) {
          runningLOC += f.amount;
        }
      }

      // Calculate LOC: previous LOC + interest - personalCash - assetCF + withdrawal
      const locInt = runningLOC * (lr / 12);
      runningLOC = runningLOC + locInt - personalCash - assetCF + withdrawal;
      if (runningLOC < 0) runningLOC = 0;

      const locBalance = runningLOC;
      const totalCF = assetCF;

      actualRows.push({
        month: monthIdx, date, flipNumber: actualFlipCount, personalCash,
        assetCF, locBalance,
        currentFlipAmount: 0, balance401k: 0, retirement401kMonthly: 0,
        totalMonthlyCF: totalCF, monthlyWithdrawalOut: withdrawal,
        activeFlipCount: trackedFlips.filter(f => {
          const fs = parseDate(f.startDate);
          const fsm = (fs.getFullYear()-sd.getFullYear())*12+(fs.getMonth()-sd.getMonth());
          const fem = fsm + Math.round(f.durationYears*12);
          return monthIdx >= fsm && monthIdx <= fem;
        }).length,
        source: 'actual', notes: a.notes || '',
      });
    }

    // Determine forecast start state from last actual
    const lastActual = actualRows.length > 0 ? actualRows[actualRows.length - 1] : null;
    let forecastStartMonth = 0;
    let initialState;

    if (lastActual) {
      forecastStartMonth = lastActual.month + 1;
      // Build active flips list for forecast
      const forecastFlips = trackedFlips.map(f => {
        const fs = parseDate(f.startDate);
        const fsm = (fs.getFullYear()-sd.getFullYear())*12+(fs.getMonth()-sd.getMonth());
        return {
          id: f.id, startMonth: fsm, amount: f.amount,
          pmt: flipTotalPmt(f),
          yield: (f.yield || (f.splits?.[0]?.yield) || 8)/100,
          endMonth: fsm + Math.round(flipMaxDuration(f)*12),
          indexFund: (f.indexFund || (f.splits && f.splits.some(s=>s.indexFund))) || false,
          source: 'actual', amount: f.amount,
        };
      });

      // Determine current flip sizing state
      let cfa = startingFlipAmount;
      let flipsAtAmt = 0;
      const sortedFlips = [...trackedFlips].sort((a,b) => a.startDate.localeCompare(b.startDate));
      let prevAmt = 0;
      for (const f of sortedFlips) {
        if (f.amount !== prevAmt) { flipsAtAmt = 0; prevAmt = f.amount; }
        flipsAtAmt++;
        cfa = f.amount;
      }

      const lastFlipStart = sortedFlips.length > 0 ? (() => {
        const lf = sortedFlips[sortedFlips.length - 1];
        const fs = parseDate(lf.startDate);
        return (fs.getFullYear()-sd.getFullYear())*12+(fs.getMonth()-sd.getMonth());
      })() : -999;

      const isFree = lastActual.assetCF >= desiredMonthlyWithdrawal;

      initialState = {
        locBalance: lastActual.locBalance || 0,  // now auto-calculated
        activeFlips: forecastFlips,
        flipCount: trackedFlips.length,
        flipsAtCurrentAmt: flipsAtAmt,
        currentFlipAmt: cfa,
        lastFlipMonth: lastFlipStart,
        balance401k: current401k,
        freedomReached: isFree,
      };
    } else if (trackedFlips.length > 0) {
      // Tracked flips exist but no monthly actuals entered
      // Build forecast state from the tracked flips
      const forecastFlips = trackedFlips.map(f => {
        const fs = parseDate(f.startDate);
        const fsm = (fs.getFullYear()-sd.getFullYear())*12+(fs.getMonth()-sd.getMonth());
        return {
          id: f.id, startMonth: fsm, amount: f.amount,
          pmt: flipTotalPmt(f),
          yield: (f.yield || (f.splits?.[0]?.yield) || 8)/100,
          endMonth: fsm + Math.round(flipMaxDuration(f)*12),
          indexFund: (f.indexFund || (f.splits && f.splits.some(s=>s.indexFund))) || false,
          source: 'actual', amount: f.amount,
        };
      });

      // Count flips at current amount tier
      let cfa = startingFlipAmount;
      let flipsAtAmt = 0;
      const sortedFlips = [...trackedFlips].sort((a,b) => a.startDate.localeCompare(b.startDate));
      let prevAmt = 0;
      for (const f of sortedFlips) {
        if (f.amount !== prevAmt) { flipsAtAmt = 0; prevAmt = f.amount; }
        flipsAtAmt++;
        cfa = f.amount;
      }

      const lastFlipStart = (() => {
        const lf = sortedFlips[sortedFlips.length - 1];
        const fs = parseDate(lf.startDate);
        return (fs.getFullYear()-sd.getFullYear())*12+(fs.getMonth()-sd.getMonth());
      })();

      // Calculate current LOC by simulating from first flip to now
      let calcLOC = 0;
      const firstFlipMonth = (() => {
        const fs = parseDate(sortedFlips[0].startDate);
        return (fs.getFullYear()-sd.getFullYear())*12+(fs.getMonth()-sd.getMonth());
      })();
      const nowMonth = (new Date().getFullYear()-sd.getFullYear())*12+(new Date().getMonth()-sd.getMonth());

      for (let m = firstFlipMonth; m <= nowMonth; m++) {
        for (const ff of forecastFlips) { if (ff.startMonth === m) calcLOC += ff.amount; }
        let cf = 0;
        for (const ff of forecastFlips) { if (m > ff.startMonth && m <= ff.endMonth) cf += ff.pmt; }
        calcLOC = Math.max(0, calcLOC + calcLOC * (lr / 12) - monthlyPersonalCash - cf);
      }

      forecastStartMonth = nowMonth + 1;
      initialState = {
        locBalance: calcLOC,
        activeFlips: forecastFlips,
        flipCount: trackedFlips.length,
        flipsAtCurrentAmt: flipsAtAmt,
        currentFlipAmt: cfa,
        lastFlipMonth: lastFlipStart,
        balance401k: current401k || 0,
        freedomReached: false,
      };
    } else {
      const pmt0 = monthlyPmt(startingFlipAmount, dy, flipDurationYears);
      initialState = {
        locBalance: startingFlipAmount,
        activeFlips: [{ id: uid(), startMonth: 0, amount: startingFlipAmount, pmt: pmt0,
          yield: dy, endMonth: Math.round(flipDurationYears*12), source: 'forecast' }],
        flipCount: 1,
        flipsAtCurrentAmt: 1,
        currentFlipAmt: startingFlipAmount,
        lastFlipMonth: 0,
        balance401k: current401k || 0,
        freedomReached: false,
      };
      forecastStartMonth = 1; // first month is the flip deploy, forecast from month 1
      // Add month 0 as a "forecast" row
      actualRows.push({
        month: 0, date: sd, flipNumber: 1, personalCash: monthlyPersonalCash,
        assetCF: 0, locBalance: startingFlipAmount,
        currentFlipAmount: startingFlipAmount, balance401k: current401k,
        retirement401kMonthly: 0, totalMonthlyCF: 0, monthlyWithdrawalOut: 0,
        activeFlipCount: 1, source: 'forecast',
      });
    }

    const forecast = simulateFromState({
      startMonth: forecastStartMonth, startDate: addMo(sd, forecastStartMonth),
      desiredMonthlyWithdrawal, maxFlipSize, defaultYield: dy,
      locInterestRate: lr, flipDurationYears, flipsPerAmount, growthMultiplier, staleThreshold,
      maxMonths: 600 - forecastStartMonth, currentAge, retirementAge, current401k,
      monthly401kContrib, annual401kYield: ay, monthlyPersonalCash,
      include401k,
    }, { ...initialState, activeFlips: [...initialState.activeFlips] });

    const combined = [...actualRows, ...forecast.rows];
    return {
      combinedRows: combined,
      freedomDate: forecast.freedomDate || (lastActual && lastActual.assetCF >= desiredMonthlyWithdrawal ? lastActual.date : null),
      freedomMonth: forecast.freedomMonth,
      cfDepletedDate: forecast.cfDepletedDate,
    };
  }, [startDate, monthlyPersonalCash, startingFlipAmount, desiredMonthlyWithdrawal, maxFlipSize, defaultYield, locInterestRate, flipDurationYears, flipsPerAmount, growthMultiplier, staleThreshold, currentAge, retirementAge, current401k, monthly401kContrib, annual401kYield, actuals, trackedFlips, include401k]);

  const idxSim = useMemo(() => simulateIndexFund({
    startDate: parseDate(startDate), monthlyPersonalCash, desiredMonthlyWithdrawal,
    annualReturn: indexFundReturn/100, maxMonths: 600,
  }), [startDate, monthlyPersonalCash, desiredMonthlyWithdrawal, indexFundReturn]);

  // Compute display data
  const freeMonth = freedomMonth;
  const yf = freeMonth != null ? Math.floor(freeMonth/12) : null;
  const mr = freeMonth != null ? freeMonth % 12 : null;
  const teDefault = Math.min(freeMonth != null ? freeMonth + 60 : 240, combinedRows.length);
  const teMap = { 'default': teDefault, '10yr': 120, '20yr': 240, '30yr': 360, 'all': combinedRows.length };
  const te = Math.min(teMap[detailRange] || teDefault, combinedRows.length);
  const tRows = combinedRows.slice(0, te);
  const sr = Math.max(1, Math.floor(te / 280));
  const cd = tRows.filter((_,i) => i%sr===0);
  const idxCd = idxSim.rows.slice(0,te).filter((_,i)=>i%sr===0);
  const actualCount = tRows.filter(r => r.source === 'actual').length;

  // Actuals entry helpers
  const sd = parseDate(startDate);
  const today = new Date();
  const currentMoKey = moKey(today);
  const allMonthKeys = [];
  for (let d = new Date(sd); d <= today; d = addMo(d, 1)) {
    allMonthKeys.push(moKey(d));
  }

  const updateActual = (mk, field, value) => {
    const next = { ...actuals, [mk]: { ...(actuals[mk]||{}), [field]: value } };
    persistActuals(next);
  };

  const updateFlipCF = (flipId, splitId, mk, value) => {
    const next = trackedFlips.map(f => {
      if (f.id !== flipId) return f;
      if (f.splits) {
        return { ...f, splits: f.splits.map(s => s.id === splitId
          ? { ...s, actualCF: { ...(s.actualCF||{}), [mk]: value } } : s) };
      }
      // Legacy: no splits
      return { ...f, actualCF: { ...(f.actualCF||{}), [mk]: value } };
    });
    persistFlips(next);
  };

  // Add a split to a flip
  const addSplit = (flipId) => {
    const next = trackedFlips.map(f => {
      if (f.id !== flipId) return f;
      const splits = flipSplits(f);
      const newSplit = { id: uid(), name: `Split ${splits.length + 1}`, amount: 0,
        yield: 8, durationYears: 3, monthlyPmt: 0, indexFund: false, actualCF: {} };
      return { ...f, splits: [...splits, newSplit] };
    });
    persistFlips(next);
  };

  // Remove a split from a flip
  const removeSplit = (flipId, splitId) => {
    const next = trackedFlips.map(f => {
      if (f.id !== flipId || !f.splits) return f;
      const newSplits = f.splits.filter(s => s.id !== splitId);
      if (newSplits.length === 0) return f; // Don't remove last split
      return { ...f, splits: newSplits, amount: newSplits.reduce((s,sp) => s + sp.amount, 0) };
    });
    persistFlips(next);
  };

  // Update a split's field
  const updateSplit = (flipId, splitId, field, value) => {
    const next = trackedFlips.map(f => {
      if (f.id !== flipId) return f;
      const splits = (f.splits || flipSplits(f)).map(s => {
        if (s.id !== splitId) return s;
        const updated = { ...s, [field]: value };
        if (['amount','yield','durationYears'].includes(field)) {
          updated.monthlyPmt = monthlyPmt(updated.amount, (updated.yield||8)/100, updated.durationYears);
        }
        return updated;
      });
      return { ...f, splits, amount: splits.reduce((sum,s) => sum + s.amount, 0) };
    });
    persistFlips(next);
  };

  const addFlip = () => {
    if (!newFlipForm.name || !newFlipForm.startDate) return;
    const f = {
      id: uid(), name: newFlipForm.name, amount: newFlipForm.amount,
      startDate: newFlipForm.startDate,
      // Default single split with all the details
      splits: [{
        id: uid(), name: 'Main', amount: newFlipForm.amount,
        yield: newFlipForm.yield, durationYears: newFlipForm.durationYears,
        monthlyPmt: monthlyPmt(newFlipForm.amount, newFlipForm.yield/100, newFlipForm.durationYears),
        indexFund: newFlipForm.indexFund || false, actualCF: {},
      }],
    };
    persistFlips([...trackedFlips, f]);
    setNewFlipForm({ name:'', amount:9500, yield:8, startDate:'', durationYears:3, indexFund:false });
  };

  const removeFlip = (id) => { persistFlips(trackedFlips.filter(f=>f.id!==id)); };

  const updateFlip = (id, field, value) => {
    const next = trackedFlips.map(f => {
      if (f.id !== id) return f;
      const updated = { ...f, [field]: value };
      // Recalculate monthly payment when amount, yield, or duration changes
      if (['amount','yield','durationYears'].includes(field)) {
        updated.monthlyPmt = monthlyPmt(updated.amount, (updated.yield||8)/100, updated.durationYears);
      }
      return updated;
    });
    persistFlips(next);
  };

  const resetAll = async () => {
    if (!confirm('Reset all saved data? This cannot be undone.')) return;
    try {
      await window.storage.delete(KEYS.settings);
      await window.storage.delete(KEYS.actuals);
      await window.storage.delete(KEYS.flips);
    } catch {}
    setActuals({}); setTrackedFlips([]);
  };

  const tabs = [
    ['dashboard','◇ Dashboard'],
    ['actuals','📊 Actuals'],
    ['flips','🔄 Flips'],
    ['detail','▤ Detail'],
    ['settings','⚙ Settings'],
  ];

  if (!loaded) return (
    <div style={{background:'#020617',color:'#475569',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'monospace'}}>
      Loading saved data...
    </div>
  );

  return (
    <div style={{'--d':"'Bricolage Grotesque', sans-serif",'--m':"'DM Mono', monospace",fontFamily:'var(--d)',background:'#020617',color:'#e2e8f0',minHeight:'100vh'}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
        .tb:hover{background:#0c1525!important}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .3s ease-out both}
        @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(34,197,94,.3)}50%{box-shadow:0 0 18px rgba(34,197,94,.1)}}
        input[type=number]::-webkit-inner-spin-button{opacity:1}
      `}</style>

      {/* HEADER */}
      <header style={{borderBottom:'1px solid #1e293b',padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10,background:'linear-gradient(180deg,#0f172a,#020617)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,#06b6d4,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#020617'}}>CF</div>
          <div>
            <h1 style={{fontSize:16,fontWeight:800,letterSpacing:'-.02em',color:'#f1f5f9'}}>Cashflow Stacking</h1>
            <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)',letterSpacing:'.06em'}}>
              CALCULATOR & TRACKER {saving && <span style={{color:'#f59e0b'}}>· saving...</span>}
              {!saving && signedIn && <span style={{color:'#22c55e'}}>· Sheets synced</span>}
              {!saving && !signedIn && <span style={{color:'#475569'}}>· local only</span>}
              {!saving && actualCount > 0 && <span style={{color:'#22c55e'}}>· {actualCount} months tracked</span>}
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{
            display:'flex',alignItems:'center',gap:8,padding:'8px 14px',borderRadius:8,
            background: freedomDate ? 'rgba(34,197,94,.06)' : 'rgba(239,68,68,.06)',
            border:`1px solid ${freedomDate ? 'rgba(34,197,94,.12)' : 'rgba(239,68,68,.12)'}`,
            ...(freedomDate ? {animation:'glow 3s ease-in-out infinite'} : {}),
          }}>
            <div style={{width:7,height:7,borderRadius:'50%',background:freedomDate?'#22c55e':'#ef4444'}}/>
            <div>
              <div style={{fontSize:8,color:'#64748b',fontFamily:'var(--m)',letterSpacing:'.06em',fontWeight:500}}>FREEDOM</div>
              <div style={{fontSize:14,fontWeight:800,color:freedomDate?'#22c55e':'#ef4444'}}>{freedomDate?fmtDate(freedomDate):">50yr"}</div>
              {freeMonth!=null&&<div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)'}}>{yf}y {mr}m</div>}
            </div>
          </div>
          <div style={{padding:'8px 14px',borderRadius:8,background:'rgba(249,115,22,.04)',border:'1px solid rgba(249,115,22,.1)'}}>
            <div style={{fontSize:8,color:'#64748b',fontFamily:'var(--m)',letterSpacing:'.06em',fontWeight:500}}>INDEX FUND</div>
            <div style={{fontSize:14,fontWeight:800,color:'#f97316'}}>{idxSim.freedomDate?fmtDate(idxSim.freedomDate):">50yr"}</div>
          </div>
        </div>
      </header>

      {/* TABS */}
      <div style={{padding:'8px 20px',borderBottom:'1px solid #0f172a',display:'flex',gap:4,overflowX:'auto'}}>
        {tabs.map(([id,l])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            padding:'7px 14px',borderRadius:6,border:tab===id?'1px solid #164e63':'1px solid transparent',
            background:tab===id?'#0c1929':'transparent',color:tab===id?'#06b6d4':'#64748b',
            fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'var(--m)',transition:'all .15s',whiteSpace:'nowrap',
          }}>{l}</button>
        ))}
      </div>

      <div style={{padding:'20px',maxWidth:1200,margin:'0 auto'}}>

        {/* ═══ DASHBOARD ═══ */}
        {tab==="dashboard"&&(
          <div className="fi">
            {/* Freedom definition */}
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#64748b',fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>Freedom</div>
              <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)',lineHeight:1.5}}>
                Earliest month where you can withdraw <span style={{color:'#06b6d4'}}>{fmt(desiredMonthlyWithdrawal)}/mo</span>, stop contributing, and flips sustain indefinitely
              </div>
            </div>


            <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:20}}>
              <Card label="Freedom Date" value={freedomDate?fmtDate(freedomDate):"N/A"} sub={freeMonth!=null?`${yf}y ${mr}m · self-sustaining${include401k?'':' · 401k off'}`:`Adjust inputs`} color="#22c55e" icon="🎯"/>
              <Card label="Desired Withdrawal" value={fmt(desiredMonthlyWithdrawal)} sub="/mo at freedom" color="#a78bfa" icon="💰"/>
              <Card label="Tracked Flips" value={trackedFlips.length} sub={`${actualCount} months of actuals`} color="#f59e0b" icon="🔄"/>
              <Card label="CF Depleted" value={cfDepletedDate?fmtDate(cfDepletedDate):"Not Depleted"} color={cfDepletedDate?"#ef4444":"#22c55e"} icon={cfDepletedDate?"⚠️":"✅"}/>
            </div>

            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18,marginBottom:18}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,flexWrap:'wrap',gap:8}}>
                <div>
                  <h3 style={{fontSize:14,fontWeight:700}}>Cashflow Trajectory</h3>
                  <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)',marginTop:2}}>Actuals + forecast · dotted line = forecast boundary</div>
                </div>
                <div style={{display:'flex',gap:12,fontSize:9,fontFamily:'var(--m)',flexWrap:'wrap'}}>
                  <span><span style={{color:'#06b6d4'}}>━</span> Asset CF</span>
                  <span><span style={{color:'#f97316'}}>╌</span> Index Fund</span>
                </div>
              </div>
              <DualChart rows={cd} idxData={idxCd} target={desiredMonthlyWithdrawal}/>
            </div>

            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {[
                ['Asset CF',cd.map(d=>d.assetCF),'#06b6d4'],
                ['LOC Balance',cd.map(d=>d.locBalance),'#ef4444'],
              ].map(([label,data,color])=>(
                <div key={label} style={{flex:'1 1 200px',background:'#0f172a',border:'1px solid #1e293b',borderRadius:8,padding:12}}>
                  <div style={{fontSize:9,fontWeight:700,color:'#475569',marginBottom:6,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.05em'}}>{label}</div>
                  <Spark data={data} color={color} h={44}/>
                  <div style={{textAlign:'right',fontSize:12,fontWeight:700,color,marginTop:3,fontFamily:'var(--m)'}}>{data.length?fmtK(data[data.length-1]):'—'}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ═══ ACTUALS ═══ */}
        {tab==="actuals"&&(
          <div className="fi">
            {/* Entry form */}
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18,marginBottom:18}}>
              <h3 style={{fontSize:13,fontWeight:700,marginBottom:14,fontFamily:'var(--m)',color:'#06b6d4'}}>📊 Record Monthly Actuals</h3>
              <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
                <Inp label="Month" value={editMonth||currentMoKey} onChange={setEditMonth} type="text" note="YYYY-MM" small style={{flex:'0 0 120px'}}/>
                <Inp label="Personal Cash" value={actuals[editMonth||currentMoKey]?.personalCash??monthlyPersonalCash} onChange={v=>updateActual(editMonth||currentMoKey,'personalCash',v)} pre="$" step={100} small style={{flex:'1 1 120px'}}/>
                <Inp label="Withdrawal" value={actuals[editMonth||currentMoKey]?.withdrawal??0} onChange={v=>updateActual(editMonth||currentMoKey,'withdrawal',v)} pre="$" step={100} small style={{flex:'1 1 120px'}}/>
                <Inp label="Notes" value={actuals[editMonth||currentMoKey]?.notes??''} onChange={v=>updateActual(editMonth||currentMoKey,'notes',v)} type="text" small style={{flex:'2 1 200px'}}/>
              </div>
            </div>

            {/* Grid of existing actuals */}
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,overflow:'hidden'}}>
              <div style={{padding:'12px 16px',borderBottom:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <h3 style={{fontSize:12,fontWeight:700,fontFamily:'var(--m)'}}>Monthly History</h3>
                <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)'}}>{Object.keys(actuals).length} months recorded</div>
              </div>
              <div style={{overflowX:'auto',maxHeight:500}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:10,fontFamily:'var(--m)'}}>
                  <thead>
                    <tr style={{borderBottom:'2px solid #1e293b',position:'sticky',top:0,background:'#0f172a',zIndex:1}}>
                      {['Month','Personal','Asset CF','W/D','Notes',''].map(h=>(
                        <th key={h} style={{padding:'7px 8px',textAlign:'left',color:'#475569',fontSize:8,fontWeight:700,textTransform:'uppercase'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {allMonthKeys.map(mk => {
                      const a = actuals[mk];
                      const hasData = a && (a.personalCash != null);
                      // Compute CF from tracked flips for this month
                      let flipCF = 0;
                       for (const f of trackedFlips) {
                         for (const sp of flipSplits(f)) { if (sp.actualCF?.[mk] != null) flipCF += sp.actualCF[mk]; }
                       }
                      return (
                        <tr key={mk} className="tb" style={{borderBottom:'1px solid #0b1120',background:hasData?'rgba(6,182,212,.03)':'transparent',cursor:'pointer'}}
                          onClick={()=>setEditMonth(mk)}>
                          <td style={{padding:'6px 8px',color:editMonth===mk?'#06b6d4':'#94a3b8',fontWeight:editMonth===mk?700:400}}>{mk}</td>
                          <td style={{padding:'6px 8px',color:hasData?'#f59e0b':'#1e293b'}}>{hasData?fmt(a.personalCash??0):'—'}</td>
                          <td style={{padding:'6px 8px',color:flipCF>0?'#22d3ee':'#1e293b'}}>{flipCF>0?fmt(flipCF):'—'}</td>
                          <td style={{padding:'6px 8px',color:a?.withdrawal?'#f87171':'#1e293b'}}>{a?.withdrawal?'-'+fmt(a.withdrawal):'—'}</td>
                          <td style={{padding:'6px 8px',color:'#475569',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a?.notes||''}</td>
                          <td style={{padding:'6px 8px'}}>
                            {hasData && <span style={{color:'#22c55e',fontSize:9}}>✓</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ═══ FLIPS ═══ */}
        {tab==="flips"&&(
          <div className="fi">
            {/* Add new flip */}
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18,marginBottom:18}}>
              <h3 style={{fontSize:13,fontWeight:700,marginBottom:14,fontFamily:'var(--m)',color:'#f59e0b'}}>🔄 Add New Flip</h3>
              <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
                <Inp label="Name" value={newFlipForm.name} onChange={v=>setNewFlipForm({...newFlipForm,name:v})} type="text" small note="e.g. Flip #1" style={{flex:'1 1 140px'}}/>
                <Inp label="Amount" value={newFlipForm.amount} onChange={v=>setNewFlipForm({...newFlipForm,amount:v})} pre="$" step={500} small style={{flex:'1 1 100px'}}/>
                <Inp label="Yield" value={newFlipForm.yield} onChange={v=>setNewFlipForm({...newFlipForm,yield:v})} suf="%" step={0.5} small style={{flex:'0 0 80px'}}/>
                <Inp label="Start Date" value={newFlipForm.startDate} onChange={v=>setNewFlipForm({...newFlipForm,startDate:v})} type="text" note="YYYY-MM-DD" small style={{flex:'1 1 130px'}}/>
                <Inp label="Duration" value={newFlipForm.durationYears} onChange={v=>setNewFlipForm({...newFlipForm,durationYears:v})} suf="yrs" step={0.5} small style={{flex:'0 0 90px'}}/>
                <div style={{flex:'0 0 auto',marginBottom:8,display:'flex',alignItems:'flex-end',paddingBottom:2}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',padding:'6px 0'}} onClick={()=>setNewFlipForm({...newFlipForm,indexFund:!newFlipForm.indexFund})}>
                    <div style={{width:16,height:16,borderRadius:3,border:'1px solid '+(newFlipForm.indexFund?'#f97316':'#334155'),background:newFlipForm.indexFund?'#f97316':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {newFlipForm.indexFund&&<span style={{color:'#fff',fontSize:10,lineHeight:1}}>\u2713</span>}
                    </div>
                    <span style={{fontSize:9,color:newFlipForm.indexFund?'#f97316':'#64748b',fontFamily:'var(--m)',fontWeight:600}}>Index Fund</span>
                  </div>
                </div>
                <div style={{marginBottom:8}}><Btn onClick={addFlip} color="#22c55e">+ Add Flip</Btn></div>
              </div>
            </div>

            {/* Tracked flips list */}
            {trackedFlips.map(f => {
              const splits = flipSplits(f);
              const pmt = flipTotalPmt(f);
              const fStart = parseDate(f.startDate);
              const fEnd = addMo(fStart, Math.round(flipMaxDuration(f) * 12));
              const cfMonths = [];
              for (let d = addMo(fStart, 1); d <= fEnd && d <= today; d = addMo(d, 1)) {
                cfMonths.push(moKey(d));
              }

              return (
                <div key={f.id} style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18,marginBottom:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,flexWrap:'wrap',gap:8}}>
                    {editingFlipId===f.id ? (
                      <div style={{flex:1}}>
                        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end',marginBottom:10}}>
                          <Inp label="Flip Name" value={f.name} onChange={v=>updateFlip(f.id,'name',v)} type="text" small style={{flex:'1 1 140px'}}/>
                          <Inp label="Start Date" value={f.startDate} onChange={v=>updateFlip(f.id,'startDate',v)} type="text" note="YYYY-MM-DD" small style={{flex:'1 1 130px'}}/>
                          <div style={{fontSize:10,color:'#475569',fontFamily:'var(--m)',marginBottom:8,paddingBottom:4}}>Total: {fmt(f.amount)}</div>
                        </div>
                        <div style={{fontSize:9,fontWeight:700,color:'#64748b',fontFamily:'var(--m)',textTransform:'uppercase',marginBottom:6}}>Splits</div>
                        {splits.map((sp,si) => (
                          <div key={sp.id} style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end',marginBottom:8,padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
                            <Inp label="Name" value={sp.name} onChange={v=>updateSplit(f.id,sp.id,'name',v)} type="text" small style={{flex:'1 1 100px'}}/>
                            <Inp label="Amount" value={sp.amount} onChange={v=>updateSplit(f.id,sp.id,'amount',v)} pre="$" step={500} small style={{flex:'1 1 90px'}}/>
                            <Inp label="Yield" value={sp.yield} onChange={v=>updateSplit(f.id,sp.id,'yield',v)} suf="%" step={0.5} small style={{flex:'0 0 70px'}}/>
                            <Inp label="Duration" value={sp.durationYears} onChange={v=>updateSplit(f.id,sp.id,'durationYears',v)} suf="yrs" step={0.5} small style={{flex:'0 0 70px'}}/>
                            <div style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',marginBottom:8,paddingBottom:4}} onClick={()=>updateSplit(f.id,sp.id,'indexFund',!sp.indexFund)}>
                              <div style={{width:14,height:14,borderRadius:3,border:'1px solid '+(sp.indexFund?'#f97316':'#334155'),background:sp.indexFund?'#f97316':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                {sp.indexFund&&<span style={{color:'#fff',fontSize:9,lineHeight:1}}>\u2713</span>}
                              </div>
                              <span style={{fontSize:8,color:sp.indexFund?'#f97316':'#64748b',fontFamily:'var(--m)',fontWeight:600}}>IDX</span>
                            </div>
                            {splits.length > 1 && <Btn onClick={()=>removeSplit(f.id,sp.id)} color="#ef4444" small>\u00d7</Btn>}
                          </div>
                        ))}
                        <div style={{display:'flex',gap:6,marginTop:4}}>
                          <Btn onClick={()=>addSplit(f.id)} color="#f59e0b" small>+ Add Split</Btn>
                          <Btn onClick={()=>setEditingFlipId(null)} color="#22c55e" small>Done</Btn>
                          <Btn onClick={()=>removeFlip(f.id)} color="#ef4444" small>Remove Flip</Btn>
                        </div>
                      </div>
                    ) : (
                      <>
                        <div style={{flex:1}}>
                          <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'space-between',flexWrap:'wrap'}}>
                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                              <h4 style={{fontSize:14,fontWeight:700,color:'#06b6d4'}}>{f.name || `Flip ${f.id.slice(0,4)}`}</h4>
                              {splits.length > 1 && <span style={{fontSize:8,padding:'2px 6px',borderRadius:4,background:'rgba(6,182,212,.15)',color:'#06b6d4',fontWeight:700,fontFamily:'var(--m)'}}>{splits.length} SPLITS</span>}
                            </div>
                            <div style={{display:'flex',gap:6}}>
                              <Btn onClick={()=>setEditingFlipId(f.id)} color="#06b6d4" small>Edit</Btn>
                              <Btn onClick={()=>removeFlip(f.id)} color="#ef4444" small>Remove</Btn>
                            </div>
                          </div>
                          <div style={{fontSize:10,color:'#475569',fontFamily:'var(--m)',marginTop:2}}>
                            {fmt(f.amount)} total · {fmtDate(fStart)} · Combined Pmt: {fmt(pmt)}/mo
                          </div>
                          {splits.length > 1 && (
                            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:6}}>
                              {splits.map(sp => (
                                <div key={sp.id} style={{fontSize:9,padding:'3px 8px',borderRadius:4,background:'#020617',border:'1px solid #1e293b',fontFamily:'var(--m)',color:'#94a3b8'}}>
                                  {sp.name}: {fmt(sp.amount)} @ {sp.yield}% · {sp.durationYears}yr
                                  {sp.indexFund && <span style={{color:'#f97316'}}> · IDX</span>}
                                </div>
                              ))}
                            </div>
                          )}
                          {splits.length === 1 && (
                            <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)',marginTop:1}}>
                              @ {splits[0].yield}% · {splits[0].durationYears}yr
                              {splits[0].indexFund && <span style={{color:'#f97316'}}> · Index Fund · Net: {fmt(avgIndexFundNetPmt(splits[0].amount, pmt, Math.round(splits[0].durationYears*12)))}/mo</span>}
                            </div>
                          )}
                        </div>
                      </>
                    )}
                  </div>

                  {/* Monthly CF tracking for this flip */}
                  {cfMonths.length > 0 && (()=>{
                    let totalExpected = 0, totalActual = 0;
                    for (const mk of cfMonths) {
                      let moExpected = 0, moActual = 0;
                      for (const sp of splits) {
                        const spPmt = sp.monthlyPmt || monthlyPmt(sp.amount, (sp.yield||8)/100, sp.durationYears);
                        const spEnd = Math.round(sp.durationYears * 12);
                        const fStartParsed = parseDate(f.startDate);
                        const mkParts = mk.split('-').map(Number);
                        const moIdx = (mkParts[0]-fStartParsed.getFullYear())*12+(mkParts[1]-1-fStartParsed.getMonth());
                        if (moIdx > 0 && moIdx <= spEnd) {
                          moExpected += spPmt;
                          const act = sp.actualCF?.[mk];
                          moActual += act != null ? act : spPmt;
                        }
                      }
                      totalExpected += moExpected;
                      totalActual += moActual;
                    }
                    const diff = totalActual - totalExpected;
                    const diffPct = totalExpected > 0 ? (diff / totalExpected * 100) : 0;
                    return (<div>
                    <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>
                      <div style={{flex:'1 1 120px',padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
                        <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)',textTransform:'uppercase',fontWeight:700,marginBottom:3}}>Expected to Date</div>
                        <div style={{fontSize:16,fontWeight:800,color:'#06b6d4',fontFamily:'var(--m)'}}>{fmt(totalExpected)}</div>
                        <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)'}}>{cfMonths.length} months × {fmt(pmt)}</div>
                      </div>
                      <div style={{flex:'1 1 120px',padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
                        <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)',textTransform:'uppercase',fontWeight:700,marginBottom:3}}>Actual to Date</div>
                        <div style={{fontSize:16,fontWeight:800,color:'#22c55e',fontFamily:'var(--m)'}}>{fmt(totalActual)}</div>
                        <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)'}}>{cfMonths.filter(mk=>splits.some(sp=>sp.actualCF?.[mk]!=null)).length} of {cfMonths.length} months recorded</div>
                      <div style={{flex:'1 1 120px',padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid '+(diff>=0?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)')}}>
                        <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)',textTransform:'uppercase',fontWeight:700,marginBottom:3}}>Difference</div>
                        <div style={{fontSize:16,fontWeight:800,color:diff>=0?'#22c55e':'#ef4444',fontFamily:'var(--m)'}}>{diff>=0?'+':''}{fmt(diff)}</div>
                        <div style={{fontSize:8,color:diff>=0?'#22c55e':'#ef4444',fontFamily:'var(--m)'}}>{diff>=0?'+':''}{diffPct.toFixed(1)}% vs expected</div>
                      </div>
                      {(()=>{
                        const totalOwed = splits.reduce((s,sp) => s + (sp.monthlyPmt || monthlyPmt(sp.amount,(sp.yield||8)/100,sp.durationYears)) * Math.round(sp.durationYears*12), 0);
                        const remaining = totalOwed - totalActual;
                        const pctComplete = totalOwed > 0 ? (totalActual / totalOwed * 100) : 0;
                        return (
                          <div style={{flex:'1 1 120px',padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
                            <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)',textTransform:'uppercase',fontWeight:700,marginBottom:3}}>Remaining</div>
                            <div style={{fontSize:16,fontWeight:800,color:'#f59e0b',fontFamily:'var(--m)'}}>{fmt(Math.max(0, remaining))}</div>
                            <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)'}}>{pctComplete.toFixed(1)}% of {fmt(totalOwed)} received</div>
                            <div style={{marginTop:4,height:3,background:'#1e293b',borderRadius:2,overflow:'hidden'}}>
                              <div style={{height:'100%',background:'#f59e0b',borderRadius:2,width:Math.min(100,pctComplete)+'%',transition:'width .3s'}}/>
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                    <div style={{overflowX:'auto'}}>
                      <table style={{width:'100%',borderCollapse:'collapse',fontSize:10,fontFamily:'var(--m)'}}>
                        <thead>
                          <tr style={{borderBottom:'1px solid #1e293b'}}>
                            <th style={{padding:'5px 8px',textAlign:'left',color:'#475569',fontSize:8,fontWeight:700}}>MONTH</th>
                            <th style={{padding:'5px 8px',textAlign:'right',color:'#475569',fontSize:8,fontWeight:700}}>EXPECTED</th>
                            <th style={{padding:'5px 8px',textAlign:'right',color:'#475569',fontSize:8,fontWeight:700}}>ACTUAL CF</th>
                          </tr>
                        </thead>
                        <tbody>
                          {cfMonths.map(mk => {
                            return (
                              <tr key={mk} style={{borderBottom:'1px solid #0b1120'}}>
                                <td style={{padding:'4px 8px',color:'#94a3b8'}}>{mk}</td>
                                {splits.map(sp => {
                                  const spPmt = sp.monthlyPmt || monthlyPmt(sp.amount,(sp.yield||8)/100,sp.durationYears);
                                  const spEnd = Math.round(sp.durationYears*12);
                                  const fsp = parseDate(f.startDate);
                                  const mkP = mk.split('-').map(Number);
                                  const moIdx = (mkP[0]-fsp.getFullYear())*12+(mkP[1]-1-fsp.getMonth());
                                  const active = moIdx > 0 && moIdx <= spEnd;
                                  const actual = sp.actualCF?.[mk];
                                  return (<React.Fragment key={sp.id}>
                                    <td style={{padding:'4px 8px',textAlign:'right',color:active?'#475569':'#1e293b'}}>
                                      {active ? fmt(spPmt) : '—'}
                                    </td>
                                    <td style={{padding:'4px 8px',textAlign:'right'}}>
                                      {active ? (
                                        <input type="number" value={actual??''} placeholder={Math.round(spPmt).toString()}
                                          onChange={e => updateFlipCF(f.id, sp.id, mk, e.target.value ? parseFloat(e.target.value) : null)}
                                          style={{background:'#020617',border:'1px solid #1e293b',borderRadius:4,color:actual!=null?'#22c55e':'#334155',
                                            padding:'3px 6px',width:80,textAlign:'right',fontSize:10,fontFamily:'var(--m)',outline:'none'}}/>
                                      ) : <span style={{color:'#1e293b'}}>{'—'}</span>}
                                    </td>
                                  </React.Fragment>);
                                })}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    </div>);
                  })()}
                </div>
              );
            })}

            {trackedFlips.length === 0 && (
              <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:30,textAlign:'center'}}>
                <div style={{fontSize:11,color:'#475569',fontFamily:'var(--m)'}}>No flips tracked yet. Add your first flip above to start tracking actuals.</div>
              </div>
            )}
          </div>
        )}

        {/* ═══ DETAIL TABLE ═══ */}
        {tab==="detail"&&(
          <div className="fi">
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,overflow:'hidden'}}>
              <div style={{padding:'12px 16px',borderBottom:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                <h3 style={{fontSize:12,fontWeight:700,fontFamily:'var(--m)'}}>Actuals + Forecast</h3>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <div style={{display:'flex',background:'#020617',borderRadius:5,border:'1px solid #1e293b',overflow:'hidden'}}>
                    {[['default','Default'],['10yr','10yr'],['20yr','20yr'],['30yr','30yr'],['all','All']].map(([k,l])=>(
                      <button key={k} onClick={()=>setDetailRange(k)} style={{
                        padding:'4px 8px',fontSize:9,fontWeight:600,fontFamily:'var(--m)',border:'none',cursor:'pointer',
                        background:detailRange===k?'#06b6d4':'transparent',color:detailRange===k?'#020617':'#64748b',
                      }}>{l}</button>
                    ))}
                  </div>
                  <button onClick={()=>{
                    const headers = ['Month','Date','Source','Flip#','Personal Cash','Asset CF','W/D Out','LOC Balance','Active Flips'];
                    const csvRows = tRows.map(r => [
                      r.month, r.date ? `${r.date.getFullYear()}-${String(r.date.getMonth()+1).padStart(2,'0')}` : '',
                      r.source||'forecast', r.flipNumber, Math.round(r.personalCash||0), Math.round(r.assetCF||0),
                      Math.round(r.monthlyWithdrawalOut||0), Math.round(r.locBalance||0), r.activeFlipCount||0,
                    ].join(','));
                    const csv = [headers.join(','), ...csvRows].join('\n');
                    const blob = new Blob([csv], {type:'text/csv'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `cashflow-detail-${new Date().toISOString().slice(0,10)}.csv`;
                    a.click(); URL.revokeObjectURL(url);
                  }} style={{padding:'4px 10px',fontSize:9,fontWeight:600,fontFamily:'var(--m)',border:'1px solid #1e293b',
                    borderRadius:5,background:'#020617',color:'#64748b',cursor:'pointer'}}>
                    Export CSV
                  </button>
                  <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)'}}>
                    <span style={{color:'#22c55e'}}>● actual</span> <span style={{color:'#64748b'}}>● forecast</span> · {tRows.length} months
                  </div>
                </div>
              </div>
              <div style={{overflowX:'auto',maxHeight:detailRange==='all'||detailRange==='30yr'?'none':600}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:10,fontFamily:'var(--m)'}}>
                  <thead>
                    <tr style={{borderBottom:'2px solid #1e293b',position:'sticky',top:0,background:'#0f172a',zIndex:1}}>
                      {['','Date','Flip#','Personal','Asset CF','W/D Out','LOC','Active'].map(h=>(
                        <th key={h} style={{padding:'7px 8px',textAlign:'right',color:'#475569',fontSize:8,fontWeight:700,textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {tRows.map((r,i) => {
                      const isFree = freeMonth != null && r.month === freeMonth;
                      const isActual = r.source === 'actual';
                      return (
                        <tr key={i} className="tb" style={{
                          borderBottom:'1px solid #0b1120',
                          background: isFree?'rgba(34,197,94,.07)':isActual?'rgba(6,182,212,.03)':'transparent',
                        }}>
                          <td style={{padding:'6px 6px',textAlign:'center',width:8}}>
                            <div style={{width:6,height:6,borderRadius:'50%',background:isActual?'#22c55e':'#334155',margin:'0 auto'}}/>
                          </td>
                          <td style={{padding:'6px 8px',textAlign:'right',color:isFree?'#22c55e':'#94a3b8',fontWeight:isFree?700:400}}>
                            {fmtDate(r.date)}{isFree&&' 🎯'}
                          </td>
                          <td style={{padding:'6px 8px',textAlign:'right',color:'#06b6d4'}}>{r.flipNumber}</td>
                          <td style={{padding:'6px 8px',textAlign:'right',color:r.personalCash>0?'#f59e0b':'#334155'}}>{r.personalCash>0?fmt(r.personalCash):'$0'}</td>
                          <td style={{padding:'6px 8px',textAlign:'right',color:'#22d3ee',fontWeight:600}}>{fmt(r.assetCF)}</td>
                          <td style={{padding:'6px 8px',textAlign:'right',color:r.monthlyWithdrawalOut>0?'#f87171':'#1e293b'}}>
                            {r.monthlyWithdrawalOut>0?'-'+fmt(r.monthlyWithdrawalOut):'—'}
                          </td>
                          <td style={{padding:'6px 8px',textAlign:'right',color:r.locBalance>100?'#ef4444':'#22c55e'}}>{r.locBalance<=0?'$0':fmt(r.locBalance)}</td>
                          <td style={{padding:'6px 8px',textAlign:'right',color:'#475569'}}>{r.activeFlipCount}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ═══ SETTINGS ═══ */}
        {tab==="settings"&&(
          <div className="fi" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:16}}>
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
              <h3 style={{fontSize:12,fontWeight:700,color:'#06b6d4',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>◇ Core</h3>
              <Inp label="Start Date" value={startDate} onChange={setStartDate} type="text" note="YYYY-MM-DD" small/>
              <Inp label="Monthly Personal Cash" value={monthlyPersonalCash} onChange={setMonthlyPersonalCash} pre="$" step={100} small/>
              <Inp label="Starting Flip Amount" value={startingFlipAmount} onChange={setStartingFlipAmount} pre="$" step={500} small/>
              <Inp label="Max Flip Size" value={maxFlipSize} onChange={setMaxFlipSize} pre="$" step={10000} small/>
            </div>
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
              <h3 style={{fontSize:12,fontWeight:700,color:'#a78bfa',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>💰 Withdrawal & Rates</h3>
              <Inp label="Desired Monthly Withdrawal" value={desiredMonthlyWithdrawal} onChange={setDesiredMonthlyWithdrawal} pre="$" step={500} small/>
              <Inp label="Default Yield" value={defaultYield} onChange={setDefaultYield} suf="%" step={0.5} small/>
              <Inp label="LOC Interest Rate" value={locInterestRate} onChange={setLocInterestRate} suf="%" step={0.25} small/>
              <div style={{marginTop:10,padding:10,background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
                <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)',lineHeight:1.5}}>
                  Freedom = earliest month where you can stop contributing, withdraw desired amount, and flips sustain indefinitely
                </div>
              </div>
            </div>
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
              <h3 style={{fontSize:12,fontWeight:700,color:'#f59e0b',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>🔄 Flip Structure</h3>
              <Inp label="Flip Duration" value={flipDurationYears} onChange={setFlipDurationYears} suf="yrs" step={0.5} small/>
              <Inp label="Flips Per Amount" value={flipsPerAmount} onChange={setFlipsPerAmount} step={1} small/>
              <Inp label="Growth Multiplier" value={growthMultiplier} onChange={setGrowthMultiplier} suf="×" step={0.1} small/>
              <Inp label="Stale Threshold" value={staleThreshold} onChange={setStaleThreshold} suf="mo" step={1} small/>
            </div>
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
              <h3 style={{fontSize:12,fontWeight:700,color:'#f59e0b',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>🏦 401k & Index</h3>
