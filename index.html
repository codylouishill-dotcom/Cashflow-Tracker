// ═══════════════════════════════════════════════
// DIBS IMPACT CALCULATOR
// Computes cumulative policy loan increases on dest policies
// and source paydowns for a given date, from DIBS-linked flips.
// ═══════════════════════════════════════════════

function calcDibsImpact(trackedFlips, targetDate) {
  const policyLoans = {}; // destPolicyId → cumulative loans drawn from that policy

  trackedFlips.forEach(f => {
    if (!f.dibs || !f.dibs.destPolicyId) return;
    const fStart = parseDate(f.startDate);
    const fEnd = addMo(fStart, Math.round(flipMaxDuration(f) * 12));
    const pmt = flipTotalPmt(f);

    // Payments flow out of dest policy starting 1 month after flip start
    const paymentStart = addMo(fStart, 1);
    if (targetDate < paymentStart) return;

    const endDate = targetDate < fEnd ? targetDate : fEnd;
    const monthsElapsed = Math.max(0,
      (endDate.getFullYear() - paymentStart.getFullYear()) * 12 +
      (endDate.getMonth() - paymentStart.getMonth()) + 1
    );
    if (monthsElapsed <= 0) return;

    const destId = f.dibs.destPolicyId;
    policyLoans[destId] = (policyLoans[destId] || 0) + (pmt * monthsElapsed);
  });

  return policyLoans; // { policyId: cumulativeLoanAmount }
}


function IBCSection({ policies, setPolicies, locs, setLocs, deals, setDeals, trackedFlips, combinedRows, persistIBCPolicies, persistIBCLocs, persistIBCDeals }) {
  const [subTab, setSubTab] = useState('dashboard');
  const [showAddModal, setShowAddModal] = useState(false);
  const [showLocModal, setShowLocModal] = useState(false);
  const [showDealModal, setShowDealModal] = useState(false);
  const [editingPolicyId, setEditingPolicyId] = useState(null);
  const [openYears, setOpenYears] = useState({}); // keyed by "policyId-year"
  const toggleYr = (pid, yr) => { const k = pid+'-'+yr; setOpenYears(prev => ({...prev,[k]:!prev[k]})); };
  const [projSelectedIds, setProjSelectedIds] = useState(null); // null = all
  const [borrowableDetailYear, setBorrowableDetailYear] = useState(null); // click to expand year

  const toggleExpand = (id) => { const next = policies.map(p => p.id===id ? {...p, expanded:!p.expanded} : p); persistIBCPolicies(next); };
  const updatePolicyField = (pid, field, value) => { const next = policies.map(p => p.id===pid ? {...p, [field]: value} : p); persistIBCPolicies(next); };
  const updateActual = (pid,yr,f,v) => { const next = policies.map(p => { if(p.id!==pid) return p; const a={...p.actuals}; if(!a[yr]) a[yr]={cashValue:'',deathBenefit:''}; a[yr]={...a[yr],[f]:v}; return {...p, actuals:a, actualYears:{...(p.actualYears||{}),[yr]:true}}; }); persistIBCPolicies(next); };
  const markActual = (pid, yr) => { const next = policies.map(p => p.id!==pid?p:{...p, actualYears:{...(p.actualYears||{}),[yr]:true}}); persistIBCPolicies(next); };
  const updateMonthlyLoan = (pid,mk,v) => { const next = policies.map(p => p.id!==pid?p:{...p, monthlyLoans:{...p.monthlyLoans,[mk]:v}}); persistIBCPolicies(next); };
  const deletePolicy = (id) => persistIBCPolicies(policies.filter(p=>p.id!==id));
  const addPolicy = (p) => { persistIBCPolicies([...policies, prefillActuals(p)]); setShowAddModal(false); };
  const addDeal = (d) => { persistIBCDeals([...deals, d]); setShowDealModal(false); };
  const updateDeal = (id, updates) => persistIBCDeals(deals.map(d => d.id===id ? {...d,...updates} : d));
  const deleteDeal = (id) => persistIBCDeals(deals.filter(d=>d.id!==id));
  const addLoc = (l) => { persistIBCLocs([...locs, l]); setShowLocModal(false); };
  const updateLoc = (id, updates) => persistIBCLocs(locs.map(l => l.id===id?{...l,...updates}:l));
  const deleteLoc = (id) => persistIBCLocs(locs.filter(l=>l.id!==id));

  const currentYear = new Date().getFullYear();
  const trackingYears = [];
  const minYear = policies.reduce((m,p) => { const y = p.startDate ? ibcParseDate(p.startDate).getFullYear() : currentYear; return Math.min(m,y); }, currentYear);
  for (let y = minYear; y <= currentYear + 1; y++) trackingYears.push(y);

  const totals = useMemo(() => {
    let cv=0, loans=0, db=0;
    policies.forEach(p => { const cur = getCurrentActualsEnhanced(p); cv += cur.cashValue; db += cur.deathBenefit; loans += getLatestLoan(p); });
    return { cashValue:cv, loans, netCashValue:cv-loans, deathBenefit:db, borrowable:Math.max(0,cv-loans) };
  }, [policies]);

  const upcomingPremiums = useMemo(() => {
    const today = new Date(); today.setHours(0,0,0,0);
    const items = [];
    policies.forEach(p => {
      if (!p.startDate) return;
      const na = getNextAnniversary(p.startDate); if(!na) return;
      const py = Math.floor((na - ibcParseDate(p.startDate))/(1000*60*60*24*365.25))+1;
      let amt=0;
      if (py <= Number(p.premiumEndYear||999)) amt += Number(p.basePremium||0);
      if (py <= Number(p.fpurEndYear||0)) amt += Number(p.fpur||0);
      if (amt<=0) return;
      items.push({ policyId:p.id, name:p.name||'Unnamed', insured:p.insured, date:na, amount:amt, daysAway:daysBetween(today,na), policyYear:py, basePrem:Number(p.basePremium||0), fpurPrem:py<=Number(p.fpurEndYear||0)?Number(p.fpur||0):0 });
    });
    items.sort((a,b) => a.date-b.date);
    return items;
  }, [policies]);

  const locAvailable = locs.reduce((s, l) => s + Math.max(0, Number(l.creditLimit||0) - Number(l.currentBalance||0)), 0);
  const locBalance = locs.reduce((s, l) => s + Number(l.currentBalance||0), 0);

  const subTabs = [['dashboard','Dashboard'],['policies',`Policies (${policies.length})`],['creditlines',`Credit Lines (${locs.length})`],['projections','Projections'],['borrowable','Borrowable']];

  return (<div className="fi">
    {/* IBC Sub-navigation */}
    <div style={{display:'flex',gap:3,marginBottom:18,background:'#0a0a12',padding:3,borderRadius:8,border:'1px solid #1e293b',overflowX:'auto'}}>
      {subTabs.map(([id,l])=>(<button key={id} onClick={()=>setSubTab(id)} style={{
        flex:1,padding:'8px 12px',borderRadius:6,border:'none',background:subTab===id?'#0f172a':'transparent',
        color:subTab===id?'#22c55e':'#475569',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'var(--m)',transition:'all .15s',whiteSpace:'nowrap',
      }}>{l}</button>))}
    </div>

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:28,height:28,borderRadius:7,background:'linear-gradient(135deg,#22c55e,#06b6d4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#020617'}}>IB</div>
        <div><div style={{fontSize:14,fontWeight:700}}>Infinite Banking</div><div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)'}}>POLICY TRACKER · {policies.length} policies · {locs.length} credit lines</div></div>
      </div>
      <div style={{display:'flex',gap:6}}>
        <Btn onClick={()=>setShowAddModal(true)} color="#22c55e" small>+ Policy</Btn>
        <Btn onClick={()=>setShowLocModal(true)} color="#60a5fa" small>+ Credit Line</Btn>
        <Btn onClick={()=>setShowDealModal(true)} color="#f59e0b" small>+ Deal</Btn>
      </div>
    </div>

    {/* ── IBC Dashboard ── */}
    {subTab==='dashboard'&&<div>
      {upcomingPremiums.filter(u=>u.daysAway<=90).map((u,i)=>(<div className="premium-alert" key={i}>
        <div style={{fontSize:18,flexShrink:0}}>{u.daysAway<=30?'🔔':'📅'}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13,color:'var(--amber)',marginBottom:2}}>{u.daysAway<=30?'Premium Due Soon':'Upcoming Premium'}</div>
          <div style={{fontFamily:'var(--m)',fontSize:11,color:'var(--t2)'}}><strong style={{color:'var(--t1)'}}>{u.name}</strong> — Year {u.policyYear} · {ibcFormatDate(u.date)} · {u.daysAway===0?'Due today':`${u.daysAway}d away`} · <strong style={{color:'var(--amber)'}}>{fmt(u.amount)}</strong></div>
        </div>
      </div>))}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:20}}>
        <SummaryCard label="Total Cash Value" value={fmt(totals.cashValue)} sub={`${policies.length} ${policies.length===1?'policy':'policies'}`} color="var(--green)" />
        <SummaryCard label="Policy Loans" value={fmt(totals.loans)} sub="Latest month" color="var(--amber)" />
        <SummaryCard label="Net Cash Value" value={fmt(totals.netCashValue)} sub="CV − loans" color="var(--blue)" />
        <SummaryCard label="Death Benefit" value={fmt(totals.deathBenefit)} sub="Current" color="var(--purple)" />
        <SummaryCard label="IBC Borrowable" value={fmt(totals.borrowable)} sub="CV − loans" color="var(--green)" />
        {locs.length>0&&<SummaryCard label="LOC Available" value={fmt(locAvailable)} sub={`${locs.length} line${locs.length!==1?'s':''} · ${fmt(locBalance)} drawn`} color="var(--green)" />}
        {locs.length>0&&<SummaryCard label="Total Capital Available" value={fmt(totals.borrowable + locAvailable)} sub="IBC + LOCs" color="var(--green)" />}
      </div>

      {policies.length > 0 && <div className="ibc-tw"><table className="ibc-table"><thead><tr>
        <th>Policy</th><th>Insured</th><th>Start</th><th>Cash Value</th><th>Loans</th><th>Net CV</th><th>Death Benefit</th>
      </tr></thead><tbody>
        {policies.map(p => { const cur=getCurrentActualsEnhanced(p); const lb=getLatestLoan(p); return (<tr key={p.id}>
          <td>{p.name||'Unnamed'}</td><td style={{color:'#475569'}}>{p.insured||'—'}</td>
          <td style={{color:'#475569'}}>{p.startDate?ibcFormatDate(ibcParseDate(p.startDate)):'—'}</td>
          <td style={{color:'var(--green)'}}>{fmt(cur.cashValue)}</td>
          <td style={{color:lb>0?'var(--amber)':'#475569'}}>{fmt(lb)}</td>
          <td style={{color:'var(--blue)'}}>{fmt(cur.cashValue-lb)}</td>
          <td style={{color:'var(--purple)'}}>{fmt(cur.deathBenefit)}</td>
        </tr>); })}
        {policies.length>1&&<tr style={{borderTop:'2px solid #334155',fontWeight:600}}>
          <td>TOTAL</td><td></td><td></td><td style={{color:'var(--green)'}}>{fmt(totals.cashValue)}</td><td style={{color:'var(--amber)'}}>{fmt(totals.loans)}</td><td style={{color:'var(--blue)'}}>{fmt(totals.netCashValue)}</td><td style={{color:'var(--purple)'}}>{fmt(totals.deathBenefit)}</td>
        </tr>}
      </tbody></table></div>}
      {policies.length===0&&<div style={{padding:40,textAlign:'center',color:'#475569',fontFamily:'var(--m)',background:'#0f172a',borderRadius:8,border:'1px solid #1e293b'}}>
        <div style={{fontSize:36,marginBottom:10,opacity:.4}}>🛡️</div>No IBC policies yet. Add your first policy to get started.
      </div>}
    </div>}

    {/* ── Policies ── */}
    {subTab==='policies'&&<div>
      {policies.length===0&&<div style={{padding:40,textAlign:'center',color:'#475569',fontFamily:'var(--m)'}}>No policies added.</div>}
      {policies.map(p => {
        const cv = getCurrentActualsEnhanced(p).cashValue;
        const lb = getLatestLoan(p);
        const na = getNextAnniversary(p.startDate);
        const dtr = na ? daysBetween(new Date(), na) : null;
        const isEditing = editingPolicyId === p.id;
        const isForecast = (yr) => {
          if (p.actualYears && p.actualYears[yr]) return false;
          const sY = p.startDate ? ibcParseDate(p.startDate).getFullYear() : 2025;
          // CV for calendar year yr comes from illustration Year (yr - sY + 1)
          const cvIllusYear = yr - sY + 1;
          if (cvIllusYear < 1) return false;
          const cvRow = p.illustration.find(r => r.year === cvIllusYear);
          if (!cvRow) return false;
          const act = p.actuals[yr];
          if (!act) return false;
          // DB for calendar year yr comes from illustration Year (yr - sY), or base if yr === sY
          const dbIllusYear = yr - sY;
          let expectedDB;
          if (dbIllusYear <= 0) { expectedDB = String(p.baseDeathBenefit || cvRow.ngDB); }
          else { const dbRow = p.illustration.find(r => r.year === dbIllusYear); expectedDB = dbRow ? String(dbRow.ngDB) : String(p.baseDeathBenefit); }
          return String(act.cashValue) === String(cvRow.ngCV) && String(act.deathBenefit) === expectedDB;
        };
        const getYearEndLoan = (yr) => { const mks=[]; for(let m=1;m<=12;m++){const k=`${yr}-${String(m).padStart(2,'0')}`; if(p.monthlyLoans&&p.monthlyLoans[k]!==undefined)mks.push(k);} if(!mks.length)return 0; mks.sort(); return Number(p.monthlyLoans[mks[mks.length-1]]||0); };
        return (<div className="policy-card" key={p.id}>
          <div className="policy-card-hdr" onClick={()=>toggleExpand(p.id)}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{p.name||'Unnamed'} <span className="badge badge-g" style={{marginLeft:8}}>Active</span>
                {dtr!==null&&dtr<=60&&<span className="badge badge-w" style={{marginLeft:4}}>Renewal {dtr}d</span>}
              </div>
              <div style={{fontFamily:'var(--m)',fontSize:11,color:'#475569',marginTop:2}}>{p.carrier} · {p.insured} · Start {p.startDate?ibcFormatDate(ibcParseDate(p.startDate)):'—'}</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:16}} className="ibc-stats">
              <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--m)',fontSize:9,color:'#475569',textTransform:'uppercase'}}>Cash Value</div><div style={{fontFamily:'var(--m)',fontSize:13,fontWeight:500,color:'var(--green)'}}>{fmt(cv)}</div></div>
              <div style={{textAlign:'right'}}><div style={{fontFamily:'var(--m)',fontSize:9,color:'#475569',textTransform:'uppercase'}}>Loans</div><div style={{fontFamily:'var(--m)',fontSize:13,fontWeight:500,color:lb>0?'var(--amber)':'#475569'}}>{fmt(lb)}</div></div>
              <div style={{fontSize:16,color:'#475569',transition:'transform .2s',transform:p.expanded?'rotate(180deg)':'none'}}>▾</div>
            </div>
          </div>
          {p.expanded&&<div style={{padding:'0 16px 16px',borderTop:'1px solid #1e293b'}}>
            {/* Policy details — read-only or edit mode */}
            {isEditing ? (
              <div style={{margin:'14px 0 16px'}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10}}>
                  <div className="ibc-field" style={{gridColumn:'1/-1'}}><label>Policy Name</label><input value={p.name||''} onChange={e=>updatePolicyField(p.id,'name',e.target.value)} /></div>
                  <div className="ibc-field"><label>Carrier</label><input value={p.carrier||''} onChange={e=>updatePolicyField(p.id,'carrier',e.target.value)} /></div>
                  <div className="ibc-field"><label>Insured</label><input value={p.insured||''} onChange={e=>updatePolicyField(p.id,'insured',e.target.value)} /></div>
                  <div className="ibc-field"><label>Issue Age</label><input type="number" value={p.issueAge||''} onChange={e=>updatePolicyField(p.id,'issueAge',e.target.value)} /></div>
                  <div className="ibc-field"><label>Start Date</label><input type="date" value={p.startDate||''} onChange={e=>updatePolicyField(p.id,'startDate',e.target.value)} /></div>
                  <div className="ibc-field"><label>Base Premium</label><input type="number" value={p.basePremium||''} onChange={e=>updatePolicyField(p.id,'basePremium',e.target.value)} /></div>
                  <div className="ibc-field"><label>Base Paid Years</label><input type="number" value={p.premiumEndYear||''} onChange={e=>updatePolicyField(p.id,'premiumEndYear',e.target.value)} /></div>
                  <div className="ibc-field"><label>FPUR Premium</label><input type="number" value={p.fpur||''} onChange={e=>updatePolicyField(p.id,'fpur',e.target.value)} /></div>
                  <div className="ibc-field"><label>FPUR Years</label><input type="number" value={p.fpurEndYear||''} onChange={e=>updatePolicyField(p.id,'fpurEndYear',e.target.value)} /></div>
                  <div className="ibc-field"><label>Base Death Benefit</label><input type="number" value={p.baseDeathBenefit||''} onChange={e=>updatePolicyField(p.id,'baseDeathBenefit',e.target.value)} /></div>
                </div>
                <div style={{marginTop:10}}><Btn onClick={()=>setEditingPolicyId(null)} color="#22c55e" small>Done Editing</Btn></div>
              </div>
            ) : (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,margin:'14px 0 16px'}}>
                <div className="ibc-field"><label>Base Premium</label><input readOnly value={fmt(p.basePremium)} /></div>
                <div className="ibc-field"><label>FPUR (Yrs 1–{p.fpurEndYear||'?'})</label><input readOnly value={fmt(p.fpur)} /></div>
                <div className="ibc-field"><label>Base Death Benefit</label><input readOnly value={fmt(p.baseDeathBenefit)} /></div>
                <div className="ibc-field"><label>Next Renewal</label><input readOnly value={na?ibcFormatDate(na):'—'} /></div>
              </div>
            )}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div>
                <div style={{fontSize:13,fontWeight:700}}>Annual Tracking</div>
                <div style={{fontSize:10,color:'#475569',fontFamily:'var(--m)'}}><span style={{color:'var(--purple)'}}>Forecast</span> vs <span style={{color:'var(--green)'}}>Actual</span> · Click <span style={{color:'var(--blue)'}}>▾ Mo.</span> to enter monthly loan balances</div>
              </div>
              {!isEditing && <Btn onClick={(e)=>{e.stopPropagation();setEditingPolicyId(p.id);}} color="#06b6d4" small>Edit Policy</Btn>}
            </div>
            <div className="ibc-tw scroll"><table className="ibc-table"><thead><tr>
              <th>Year</th><th>Yr</th><th>Cash Value</th><th>Loan Bal</th><th>Net CV</th><th>Death Benefit</th><th>Status</th><th style={{width:50}}></th>
            </tr></thead><tbody>
              {trackingYears.map(yr => {
                const sY = p.startDate ? ibcParseDate(p.startDate).getFullYear() : 2025;
                const py = yr-sY+1; if(py<1) return null;
                const forecast = isForecast(yr);
                const act = p.actuals[yr]||{};
                const acv = Number(act.cashValue||0);
                const dL = getYearEndLoan(yr);
                const currentPY = p.startDate ? getCurrentPolicyYear(p.startDate) : 1;
                const isCurrent = py === currentPY;
                const showMonths = openYears[p.id+'-'+yr];
                return (<React.Fragment key={yr}>
                  <tr style={isCurrent?{borderLeft:'3px solid var(--green)'}:forecast?{borderLeft:'3px solid var(--purple)'}:{}}>
                  <td>{yr}{isCurrent?' ←':''}</td><td style={{color:'#475569'}}>Yr {py}</td>
                  <td><input className="ibc-inline" type="number" style={{color:forecast?'var(--purple)':'var(--green)'}} value={act.cashValue||''} onChange={e=>updateActual(p.id,yr,'cashValue',e.target.value)} placeholder="0" /></td>
                  <td style={{color:dL>0?'var(--amber)':'#475569'}}>{fmt(dL)}</td>
                  <td style={{color:'var(--blue)'}}>{fmt(acv-dL)}</td>
                  <td><input className="ibc-inline" type="number" style={{color:forecast?'var(--purple)':'var(--green)'}} value={act.deathBenefit||''} onChange={e=>updateActual(p.id,yr,'deathBenefit',e.target.value)} placeholder="0" /></td>
                  <td>{forecast?<button className="loan-toggle" style={{color:'var(--purple)'}} onClick={()=>markActual(p.id,yr)}>Forecast ✓</button>:act.cashValue?<span style={{fontFamily:'var(--m)',fontSize:9,color:'var(--green)'}}>Actual</span>:''}</td>
                  <td><button className="loan-toggle" onClick={()=>toggleYr(p.id,yr)}>{showMonths?'▴ Mo.':'▾ Mo.'}</button></td>
                </tr>
                {showMonths && Array.from({length:12},(_,m) => {
                  const mk=`${yr}-${String(m+1).padStart(2,'0')}`;
                  const val=p.monthlyLoans?.[mk]!==undefined?p.monthlyLoans[mk]:'';
                  return (<tr key={mk} style={{background:'rgba(15,23,42,.5)'}}>
                    <td style={{paddingLeft:28,color:'#475569',fontWeight:400,fontSize:10}}>{MO[m]} {yr}</td><td></td><td></td>
                    <td><input className="ibc-inline" type="number" style={{color:Number(val||0)>0?'var(--amber)':'#475569',width:90,fontSize:10}} value={val} onChange={e=>updateMonthlyLoan(p.id,mk,e.target.value)} placeholder="—" /></td>
                    <td style={{color:'#475569',fontSize:10}}>{val!==''&&acv>0?fmt(acv-Number(val||0)):'—'}</td>
                    <td></td><td></td><td></td>
                  </tr>);
                })}
                </React.Fragment>);
              })}
            </tbody></table></div>
            <div style={{display:'flex',justifyContent:'flex-end',marginTop:12,gap:8}}>
              {!isEditing&&<Btn onClick={(e)=>{e.stopPropagation();setEditingPolicyId(p.id);}} color="#06b6d4" small>Edit Policy</Btn>}
              <Btn onClick={()=>deletePolicy(p.id)} color="#ef4444" small>Delete Policy</Btn>
            </div>
          </div>}
        </div>);
      })}
    </div>}

    {/* ── Credit Lines ── */}
    {subTab==='creditlines'&&<div>
      {locs.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:18}}>
        <SummaryCard label="Total Credit Limit" value={fmt(locs.reduce((s,l)=>s+Number(l.creditLimit||0),0))} sub={`${locs.length} line${locs.length!==1?'s':''}`} />
        <SummaryCard label="Total Balance" value={fmt(locBalance)} sub="Outstanding" color={locBalance>0?'var(--amber)':'#475569'} />
        <SummaryCard label="Total Available" value={fmt(locAvailable)} color="var(--green)" />
      </div>}
      {locs.length>0?<div className="ibc-tw"><table className="ibc-table"><thead><tr><th>Name</th><th>Type</th><th>Lender</th><th>Limit</th><th>Balance</th><th>Available</th><th>Rate</th><th></th></tr></thead><tbody>
        {locs.map(l=>{const limit=Number(l.creditLimit||0); const bal=Number(l.currentBalance||0); return(<tr key={l.id}>
          <td>{l.name}</td><td><span className="badge badge-b">{{heloc:'HELOC',ploc:'Personal LOC',blc:'Business LOC'}[l.type]||l.type}</span></td>
          <td style={{color:'#475569'}}>{l.lender||'—'}</td><td>{fmt(limit)}</td>
          <td><input className="ibc-inline" type="number" style={{color:bal>0?'var(--amber)':'#475569'}} value={l.currentBalance||''} onChange={e=>updateLoc(l.id,{currentBalance:e.target.value})} placeholder="0" /></td>
          <td style={{color:'var(--green)'}}>{fmt(Math.max(0,limit-bal))}</td>
          <td style={{color:'#475569'}}>{l.interestRate?l.interestRate+'%':'—'}</td>
          <td><Btn onClick={()=>deleteLoc(l.id)} color="#ef4444" small>×</Btn></td>
        </tr>);})}
      </tbody></table></div>:<div style={{padding:40,textAlign:'center',color:'#475569',fontFamily:'var(--m)',background:'#0f172a',borderRadius:8,border:'1px solid #1e293b'}}><div style={{fontSize:36,marginBottom:10,opacity:.4}}>🏦</div>No credit lines. Track HELOCs, personal LOCs, or business LOCs here.</div>}
    </div>}

    {/* ── Projections ── */}
    {subTab==='projections'&&<div>
      {(()=>{
        const withData = policies.filter(p => p.illustration.length > 0);
        if (!withData.length) return <div style={{padding:40,textAlign:'center',color:'#475569'}}>No illustration data. Upload a policy PDF to see projections.</div>;

        // Selected policies — null means all
        const selectedIds = projSelectedIds || withData.map(p => p.id);
        const selected = withData.filter(p => selectedIds.includes(p.id));
        const isSingle = selected.length === 1;
        const isAll = selected.length === withData.length;

        // Toggle a policy in/out of selection
        const togglePolicy = (id) => {
          const current = projSelectedIds || withData.map(p => p.id);
          const next = current.includes(id) ? current.filter(x => x !== id) : [...current, id];
          if (next.length === 0) return; // don't allow empty
          setProjSelectedIds(next.length === withData.length ? null : next);
        };

        // Build combined year rows from all selected policies
        const allYears = new Set();
        selected.forEach(p => p.illustration.forEach(r => allYears.add(r.year)));
        const yearList = [...allYears].sort((a,b) => a - b);

        return (<div>
          <div style={{fontSize:15,fontWeight:700,marginBottom:10}}>Projected Cash Value & Death Benefit</div>

          {/* Policy selector chips */}
          {withData.length > 1 && <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
            <button onClick={()=>setProjSelectedIds(null)} style={{
              padding:'5px 12px',borderRadius:20,border:'1px solid '+(isAll?'rgba(34,197,94,.3)':'#1e293b'),
              background:isAll?'rgba(34,197,94,.08)':'transparent',color:isAll?'var(--green)':'#475569',
              fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'var(--m)',transition:'all .15s',
            }}>All Policies</button>
            {withData.map(p => {
              const active = selectedIds.includes(p.id);
              return <button key={p.id} onClick={()=>togglePolicy(p.id)} style={{
                padding:'5px 12px',borderRadius:20,border:'1px solid '+(active?'rgba(6,182,212,.3)':'#1e293b'),
                background:active?'rgba(6,182,212,.08)':'transparent',color:active?'var(--cyan)':'#475569',
                fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'var(--m)',transition:'all .15s',
              }}>{p.name||'Unnamed'}{p.insured?' ('+p.insured+')':''}</button>;
            })}
          </div>}

          {/* Milestone summary cards */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:10,marginBottom:16}}>
            {[5,10,20,30].map(yr => {
              let totalCV = 0, label = '';
              selected.forEach(p => { const r = p.illustration.find(d => d.year === yr); if (r) totalCV += r.ngCV; });
              if (totalCV === 0) return null;
              // Show calendar year for the first selected policy
              const refStart = selected[0].startDate ? ibcParseDate(selected[0].startDate).getFullYear() : new Date().getFullYear();
              const calYr = refStart + yr - 1;
              if (isSingle) { const r = selected[0].illustration.find(d => d.year === yr); label = r ? `Age ${r.age}` : ''; }
              else { label = `${selected.length} policies`; }
              return <SummaryCard key={yr} label={String(calYr)} value={fmt(totalCV)} sub={label} color="var(--green)" />;
            })}
          </div>

          {/* Single policy: detailed table */}
          {isSingle && (()=>{
            const pol = selected[0];
            const data = pol.illustration;
            const sYr = pol.startDate ? ibcParseDate(pol.startDate).getFullYear() : new Date().getFullYear();
            return <div className="ibc-tw scroll"><table className="ibc-table"><thead><tr><th>Year</th><th>Age</th><th>Premium</th><th>Total Paid</th><th>Cash Value</th><th>New CV</th><th>Death Benefit</th><th>Dividend</th><th>CV/Paid</th></tr></thead><tbody>
              {data.map((r,i)=>{
                let tp=0;for(let j=0;j<=i;j++)tp+=data[j].premium;
                const rat=tp>0?((r.ngCV/tp)*100).toFixed(1):'0.0';
                const prevCV = i > 0 ? data[i-1].ngCV : 0;
                const newCV = r.ngCV - prevCV;
                const calYr = sYr + r.year - 1;
                return(<tr key={r.year} className={[5,10,20,30].includes(r.year)?'hl':''}>
                  <td>{calYr}</td>
                  <td style={{color:'#475569'}}>{r.age}</td>
                  <td>{r.premium>0?fmt(r.premium):'—'}</td>
                  <td style={{color:'var(--amber)'}}>{fmt(tp)}</td>
                  <td style={{color:'var(--green)'}}>{fmt(r.ngCV)}</td>
                  <td style={{color:newCV>=r.premium?'var(--green)':newCV>0?'var(--cyan)':'var(--red)'}}>{newCV>0?'+':''}{fmt(newCV)}</td>
                  <td style={{color:'var(--purple)'}}>{fmt(r.ngDB)}</td>
                  <td style={{color:'#475569'}}>{fmt(r.div)}</td>
                  <td style={{color:Number(rat)>=100?'var(--green)':'#475569'}}>{rat}%</td>
                </tr>);
              })}
            </tbody></table></div>;
          })()}

          {/* Multiple policies: combined table with per-policy CV columns + totals */}
          {!isSingle && (()=>{
            // Build calendar-year-based rows across all selected policies
            const calYearMap = {};
            const yearPremMap = {}; // per-policy per-year premium (not cumulative)
            selected.forEach(p => {
              const sYr = p.startDate ? ibcParseDate(p.startDate).getFullYear() : new Date().getFullYear();
              p.illustration.forEach(r => {
                const calYr = sYr + r.year - 1;
                if (!calYearMap[calYr]) calYearMap[calYr] = {};
                calYearMap[calYr][p.id] = r;
                if (!yearPremMap[calYr]) yearPremMap[calYr] = {};
                yearPremMap[calYr][p.id] = r.premium;
              });
            });
            const calYears = Object.keys(calYearMap).map(Number).sort((a,b) => a - b);
            return <div className="ibc-tw scroll"><table className="ibc-table"><thead><tr>
              <th>Year</th>
              {selected.map(p => <React.Fragment key={p.id}>
                <th>{(p.name||'Policy').split(' ').slice(0,2).join(' ')} CV</th>
                <th>{(p.name||'Policy').split(' ').slice(0,2).join(' ')} DB</th>
              </React.Fragment>)}
              {selected.length > 1 && <><th>Total CV</th><th>Total DB</th></>}
              <th>Total Premiums</th>
            </tr></thead><tbody>
              {calYears.map(calYr => {
                let tCV = 0, tDB = 0, tPrem = 0;
                const cells = selected.map(p => {
                  const r = calYearMap[calYr]?.[p.id];
                  if (!r) return <React.Fragment key={p.id}><td style={{color:'#475569'}}>—</td><td style={{color:'#475569'}}>—</td></React.Fragment>;
                  tCV += r.ngCV; tDB += r.ngDB;
                  return <React.Fragment key={p.id}><td style={{color:'var(--green)'}}>{fmt(r.ngCV)}</td><td style={{color:'var(--purple)'}}>{fmt(r.ngDB)}</td></React.Fragment>;
                });
                selected.forEach(p => { tPrem += (yearPremMap[calYr]?.[p.id] || 0); });
                const thisYear = new Date().getFullYear();
                return <tr key={calYr} style={calYr===thisYear?{background:'rgba(34,197,94,.04)'}:{}}>
                  <td style={{fontWeight:calYr===thisYear?600:400}}>{calYr}{calYr===thisYear?' ←':''}</td>{cells}
                  {selected.length > 1 && <><td style={{color:'var(--green)',fontWeight:600}}>{fmt(tCV)}</td><td style={{color:'var(--purple)',fontWeight:600}}>{fmt(tDB)}</td></>}
                  <td style={{color:'var(--amber)'}}>{tPrem>0?fmt(tPrem):'—'}</td>
                </tr>;
              })}
            </tbody></table></div>;
          })()}
        </div>);
      })()}
    </div>}

    {/* ── Borrowable ── */}
    {subTab==='borrowable'&&<div>
      <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>Borrowable Equity for Flips</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:18}}>
        <SummaryCard label="IBC Available" value={fmt(totals.borrowable)} sub="CV − policy loans" color="var(--green)" />
        {locs.length>0&&<SummaryCard label="LOC Available" value={fmt(locAvailable)} sub={`${locs.length} line${locs.length!==1?'s':''}`} color="var(--green)" />}
        <SummaryCard label="Total Available" value={fmt(totals.borrowable + locAvailable)} sub="For flips" color="var(--green)" />
      </div>
      {(policies.length>0||locs.length>0)&&<div>
        <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>Projected Borrowable by Year</div>
        <div style={{fontSize:10,color:'#475569',fontFamily:'var(--m)',marginBottom:10}}>Policy CV minus existing loans minus projected DIBS loan accumulation · Credit lines shown at current available</div>
        <div className="ibc-tw scroll"><table className="ibc-table"><thead><tr><th>Year</th>
          {policies.map(p=><th key={p.id}>{p.name?p.name.split(' ').slice(0,2).join(' '):'Policy'}</th>)}
          {locs.length>0&&<th>Credit Lines</th>}
          <th>Total</th>
        </tr></thead><tbody>
          {(()=>{
            // Build calendar-year-based borrowable rows
            const calYearMap = {};
            policies.forEach(p => {
              const sYr = p.startDate ? ibcParseDate(p.startDate).getFullYear() : currentYear;
              p.illustration.forEach(r => {
                const calYr = sYr + r.year - 1;
                if (!calYearMap[calYr]) calYearMap[calYr] = {};
                calYearMap[calYr][p.id] = r.ngCV;
              });
            });
            // Ensure we have at least 20 years
            for (let yr = currentYear; yr <= currentYear + 20; yr++) {
              if (!calYearMap[yr]) calYearMap[yr] = {};
            }
            const calYears = Object.keys(calYearMap).map(Number).sort((a,b) => a - b);
            const shown = calYears.filter(yr => {
              const offset = yr - Math.min(...calYears);
              return offset < 10 || offset % 5 === 0;
            });
            const locAvailStatic = locs.reduce((s, l) => s + Math.max(0, Number(l.creditLimit||0) - Number(l.currentBalance||0)), 0);

            return shown.map(calYr => {
              // Compute DIBS loan impact at end of this calendar year
              const yearEnd = new Date(calYr, 11, 31);
              const dibsImpact = calcDibsImpact(trackedFlips, yearEnd);
              const isExpanded = borrowableDetailYear === calYr;

              let tB = 0;
              const cellData = policies.map(p => {
                const grossCV = calYearMap[calYr]?.[p.id];
                if (grossCV == null) return { pid: p.id, empty: true };
                const baseLoan = getLatestLoan(p);
                const dibsLoan = dibsImpact[p.id] || 0;
                const netBorrowable = Math.max(0, grossCV - baseLoan - dibsLoan);
                tB += netBorrowable;
                return { pid: p.id, grossCV, baseLoan, dibsLoan, netBorrowable, name: p.name || 'Policy' };
              });

              tB += locAvailStatic;

              return (<React.Fragment key={calYr}>
                <tr style={calYr===currentYear?{background:'rgba(34,197,94,.04)'}:{}} onClick={()=>setBorrowableDetailYear(isExpanded?null:calYr)}>
                  <td style={{fontWeight:calYr===currentYear?600:400,cursor:'pointer'}}>{calYr}{calYr===currentYear?' ←':''} <span style={{fontSize:8,color:'var(--blue)'}}>{isExpanded?'▴':'▾'}</span></td>
                  {cellData.map(d => d.empty
                    ? <td key={d.pid} style={{color:'#475569'}}>—</td>
                    : <td key={d.pid} style={{color:d.dibsLoan>0?'var(--cyan)':'var(--green)'}}>
                        {fmt(d.netBorrowable)}{d.dibsLoan>0&&<span style={{fontSize:8,color:'var(--amber)',marginLeft:3}}>−{fmtK(d.dibsLoan)}</span>}
                      </td>
                  )}
                  {locs.length>0&&<td style={{color:'var(--blue)'}}>{fmt(locAvailStatic)}</td>}
                  <td style={{color:'var(--green)',fontWeight:600}}>{fmt(tB)}</td>
                </tr>
                {isExpanded && cellData.filter(d=>!d.empty).map(d => (
                  <tr key={d.pid+'-detail'} style={{background:'rgba(15,23,42,.6)'}}>
                    <td style={{paddingLeft:20,color:'#475569',fontSize:10,fontWeight:400}}>{d.name}</td>
                    <td colSpan={policies.length + (locs.length>0?1:0) + 1} style={{fontSize:10,color:'#94a3b8',fontFamily:'var(--m)'}}>
                      <span style={{color:'var(--green)'}}>{fmt(d.grossCV)}</span> CV
                      {d.baseLoan > 0 && <span> − <span style={{color:'var(--amber)'}}>{fmt(d.baseLoan)}</span> existing loans</span>}
                      {d.dibsLoan > 0 && <span> − <span style={{color:'var(--amber)'}}>{fmt(d.dibsLoan)}</span> DIBS loans</span>}
                      <span> = <span style={{color:'var(--cyan)',fontWeight:600}}>{fmt(d.netBorrowable)}</span> borrowable</span>
                    </td>
                  </tr>
                ))}
                {isExpanded && locs.length>0 && (
                  <tr style={{background:'rgba(15,23,42,.6)'}}>
                    <td style={{paddingLeft:20,color:'#475569',fontSize:10,fontWeight:400}}>Credit Lines</td>
                    <td colSpan={policies.length + (locs.length>0?1:0) + 1} style={{fontSize:10,color:'#94a3b8',fontFamily:'var(--m)'}}>
                      {locs.map((l,i) => {
                        const limit = Number(l.creditLimit||0); const bal = Number(l.currentBalance||0); const avail = Math.max(0,limit-bal);
                        return <span key={l.id}>{i>0?' + ':''}<span style={{color:'var(--blue)'}}>{fmt(limit)}</span> limit − <span style={{color:'var(--amber)'}}>{fmt(bal)}</span> bal = <span style={{color:'var(--blue)'}}>{fmt(avail)}</span>{l.name?' ('+l.name+')':''}</span>;
                      })}
                      <span> = <span style={{color:'var(--blue)',fontWeight:600}}>{fmt(locAvailStatic)}</span> total LOC</span>
                    </td>
                  </tr>
                )}
              </React.Fragment>);
            });
          })()}
        </tbody></table></div>
        {trackedFlips.some(f=>f.dibs)&&<div style={{marginTop:8,fontSize:9,color:'#475569',fontFamily:'var(--m)'}}>
          Cyan values indicate DIBS-adjusted borrowable (policy CV reduced by projected DIBS loan accumulation from linked flips)
        </div>}
      </div>}
    </div>}

    {showAddModal && <IBCAddModal onClose={()=>setShowAddModal(false)} onAdd={addPolicy} />}
    {showLocModal && <IBCLocModal onClose={()=>setShowLocModal(false)} onAdd={addLoc} />}
    {showDealModal && <IBCDealModal onClose={()=>setShowDealModal(false)} onAdd={addDeal} policies={policies} locs={locs} />}
  </div>);
}


// ═══════════════════════════════════════════════
// GAP ANALYSIS (enhanced: pulls flip data + 20yr forecast)
// ═══════════════════════════════════════════════

function IBCGapAnalysis({ policies, deals, locs, trackedFlips, combinedRows, addDeal, updateDeal, deleteDeal }) {
  const today = new Date();

  let totalCV = 0, totalLoans = 0;
  policies.forEach(p => { const cur = getCurrentActualsEnhanced(p); totalCV += cur.cashValue; totalLoans += getLatestLoan(p); });
  const ibcBorrowable = Math.max(0, totalCV - totalLoans);
  const locAvailable = locs.reduce((s, l) => s + Math.max(0, Number(l.creditLimit||0) - Number(l.currentBalance||0)), 0);
  const totalBorrowable = ibcBorrowable + locAvailable;

  const activeDeals = deals.filter(d => d.status !== 'completed');
  let totalCommitted = activeDeals.reduce((s,d) => s + Number(d.capitalNeeded||0), 0);
  const headroom = totalBorrowable - totalCommitted;

  // ── Build milestone events: renewals + flip deployments ──
  const milestones = useMemo(() => {
    const events = [];
    const maxDate = new Date(today.getFullYear() + 20, today.getMonth(), 1);

    // 1. Policy renewal milestones — each anniversary where CV steps up
    policies.forEach(p => {
      if (!p.startDate || !p.illustration.length) return;
      const start = ibcParseDate(p.startDate);
      const sYr = start.getFullYear();

      p.illustration.forEach(row => {
        // Illustration Year 1 = start, Year N = (N-1)th renewal
        let eventDate;
        if (row.year === 1) {
          eventDate = start; // policy start
        } else {
          // Renewal N-1 happens at the anniversary in year startYear + row.year - 1
          eventDate = new Date(sYr + row.year - 1, start.getMonth(), start.getDate());
        }
        if (eventDate > maxDate) return;

        events.push({
          date: eventDate,
          type: 'renewal',
          label: row.year === 1 ? `${p.name||'Policy'} — Start` : `${p.name||'Policy'} — Renewal ${row.year - 1}`,
          policyId: p.id,
          policyName: p.name || 'Policy',
          illusYear: row.year,
          cv: row.ngCV,
        });
      });
    });

    // 2. Flip deployment events from simulation
    if (combinedRows && combinedRows.length > 1) {
      let prevFlipNum = combinedRows[0]?.flipNumber || 0;
      for (let i = 1; i < combinedRows.length; i++) {
        const row = combinedRows[i];
        if (!row.date || row.date > maxDate) continue;
        if (row.flipNumber > prevFlipNum) {
          events.push({
            date: row.date,
            type: 'flip',
            label: `Flip #${row.flipNumber} deploys`,
            flipAmount: row.currentFlipAmount || 0,
            flipNumber: row.flipNumber,
            source: row.source || 'forecast',
          });
        }
        prevFlipNum = row.flipNumber;
      }
    }

    // Sort by date
    events.sort((a, b) => a.date - b.date);

    // 3. Compute running borrowable at each event
    // Track per-policy CV based on which renewals have occurred
    const policyCV = {};
    policies.forEach(p => {
      // Start with illustration Year 1 CV if available, else current
      const yr1 = p.illustration.find(r => r.year === 1);
      policyCV[p.id] = yr1 ? yr1.ngCV : getCurrentActualsEnhanced(p).cashValue;
    });

    const enriched = events.map(evt => {
      // If this is a renewal event, update that policy's CV
      if (evt.type === 'renewal') {
        policyCV[evt.policyId] = evt.cv;
      }

      // Compute total borrowable at this point in time
      const dibsImpact = calcDibsImpact(trackedFlips, evt.date);
      let totalBorrowableAtDate = 0;
      policies.forEach(p => {
        const cv = policyCV[p.id] || 0;
        const baseLoan = getLatestLoan(p);
        const dibsLoan = dibsImpact[p.id] || 0;
        totalBorrowableAtDate += Math.max(0, cv - baseLoan - dibsLoan);
      });
      totalBorrowableAtDate += locAvailable;

      // For flip events, compute gap
      const gap = evt.type === 'flip' ? totalBorrowableAtDate - evt.flipAmount : null;

      return {
        ...evt,
        borrowableAtDate: totalBorrowableAtDate,
        gap,
        isGap: gap !== null && gap < 0,
      };
    });

    return enriched;
  }, [policies, locs, trackedFlips, combinedRows]);

  const firstGap = milestones.find(m => m.isGap);
  const isPast = (d) => d < today;

  return (<div>
    {firstGap && <div style={{padding:12,background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.15)',borderRadius:8,marginBottom:16,display:'flex',gap:10}}>
      <div style={{fontSize:18}}>⚠️</div>
      <div><div style={{fontWeight:700,color:'var(--red)',fontSize:13}}>LOC Gap Detected</div>
      <div style={{fontFamily:'var(--m)',fontSize:11,color:'var(--t2)'}}>At <strong>{ibcFormatDate(firstGap.date)}</strong>, flip #{firstGap.flipNumber} of <strong style={{color:'var(--cyan)'}}>{fmt(firstGap.flipAmount)}</strong> exceeds available <strong style={{color:'var(--green)'}}>{fmt(firstGap.borrowableAtDate)}</strong> — shortfall of <strong style={{color:'var(--red)'}}>{fmt(Math.abs(firstGap.gap))}</strong></div></div>
    </div>}

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:18}}>
      <SummaryCard label="IBC Borrowable" value={fmt(ibcBorrowable)} sub="CV − loans" color="var(--green)" />
      {locs.length>0&&<SummaryCard label="LOC Available" value={fmt(locAvailable)} color="var(--green)" />}
      <SummaryCard label="Total Available" value={fmt(totalBorrowable)} color="var(--green)" />
      <SummaryCard label="Deal Committed" value={fmt(totalCommitted)} sub={`${activeDeals.length} deals`} color="var(--amber)" />
      <SummaryCard label="Headroom" value={fmt(headroom)} color={headroom>=0?'var(--green)':'var(--red)'} />
    </div>

    {/* Milestone Timeline */}
    <div style={{marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div>
          <div style={{fontSize:13,fontWeight:700}}>Renewal & Flip Timeline</div>
          <div style={{fontSize:10,color:'#475569',fontFamily:'var(--m)'}}>Policy renewals (CV step-ups) interleaved with projected flip deployments — shows available capital at each decision point</div>
        </div>
        <Btn onClick={addDeal} color="#f59e0b" small>+ Deal</Btn>
      </div>
      <div className="ibc-tw scroll"><table className="ibc-table"><thead><tr>
        <th>Date</th><th>Event</th><th>Available After</th><th>Flip Size</th><th>Headroom</th><th></th>
      </tr></thead><tbody>
        {milestones.filter(m => !isPast(m.date) || m.date.getFullYear() === today.getFullYear()).map((m, i) => {
          const isRenewal = m.type === 'renewal';
          const isFlip = m.type === 'flip';
          const isActual = isFlip && m.source === 'actual';
          return (<tr key={i} style={m.isGap?{background:'rgba(239,68,68,.04)'}:isRenewal?{background:'rgba(34,197,94,.02)'}:{}}>
            <td style={{color:isRenewal?'var(--green)':isActual?'var(--cyan)':'var(--t2)',fontWeight:isPast(m.date)?400:500}}>
              {ibcFormatDate(m.date)}
            </td>
            <td>
              {isRenewal && <span style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{color:'var(--green)',fontSize:10}}>▲</span>
                <span style={{color:'var(--green)',fontSize:11}}>{m.label}</span>
                <span style={{color:'var(--t4)',fontSize:10,fontFamily:'var(--m)'}}>CV → {fmt(m.cv)}</span>
              </span>}
              {isFlip && <span style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{color:'var(--cyan)',fontSize:10}}>●</span>
                <span style={{color:isActual?'var(--cyan)':'var(--t2)',fontSize:11}}>{m.label}</span>
                {isActual&&<span className="badge badge-g" style={{fontSize:8}}>actual</span>}
                {!isActual&&<span className="badge badge-b" style={{fontSize:8}}>forecast</span>}
              </span>}
            </td>
            <td style={{color:'var(--green)',fontWeight:isRenewal?600:400}}>{fmt(m.borrowableAtDate)}</td>
            <td style={{color:isFlip?'var(--cyan)':'#334155',fontWeight:isFlip?600:400}}>{isFlip?fmt(m.flipAmount):'—'}</td>
            <td style={{color:m.gap==null?'#334155':m.gap>=0?'var(--green)':'var(--red)',fontWeight:m.isGap?600:400}}>
              {m.gap!=null?fmt(m.gap):'—'}
            </td>
            <td>{m.isGap?<span className="badge badge-r">GAP</span>:isFlip&&m.gap!=null&&m.gap<m.flipAmount*0.3?<span className="badge badge-w">Tight</span>:isFlip&&m.gap!=null?<span className="badge badge-g">OK</span>:''}</td>
          </tr>);
        })}
      </tbody></table></div>
    </div>

    {/* Deals table */}
    {deals.length > 0 && <div style={{marginBottom:18}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>Deals & Commitments</div>
      <div className="ibc-tw"><table className="ibc-table"><thead><tr><th>Deal</th><th>Type</th><th>Status</th><th>Amount</th><th>Flow</th><th></th></tr></thead><tbody>
        {deals.map(d=>{
          const srcLabel = d.type==='dibs'?(d.dibsSourceType==='policy'?(policies.find(p=>p.id===d.dibsSourcePolicyId)?.name||'Policy').split(' ').slice(0,2).join(' '):(d.dibsSourceLabel||'HELOC')):'';
          const destLabel = d.type==='dibs'?(policies.find(p=>p.id===d.dibsDestPolicyId)?.name||'Policy').split(' ').slice(0,2).join(' '):'';
          return(<tr key={d.id}><td>{d.name||'Unnamed'}</td>
          <td><span className={`badge ${d.type==='dibs'?'badge-b':'badge-g'}`}>{d.type==='dibs'?'DIBS':'Flip'}</span></td>
          <td><select style={{fontFamily:'var(--m)',fontSize:10,padding:'2px 5px',background:'var(--bg)',border:'1px solid var(--bg3)',borderRadius:3,color:'var(--t1)',outline:'none'}} value={d.status} onChange={e=>updateDeal(d.id,{status:e.target.value})}><option value="planned">Planned</option><option value="active">Active</option><option value="completed">Completed</option></select></td>
          <td style={{color:'var(--amber)'}}>{fmt(d.capitalNeeded)}</td>
          <td style={{color:'#475569',fontSize:10}}>{d.type==='dibs'?`${srcLabel} → ${destLabel}`:`${d.startMonth||'?'} → ${d.endMonth||'TBD'}`}</td>
          <td><Btn onClick={()=>deleteDeal(d.id)} color="#ef4444" small>×</Btn></td>
        </tr>);})}
      </tbody></table></div>
    </div>}

    {/* Deal Capacity Planner */}
    <div style={{marginTop:20,background:'#0f172a',border:'1px solid #1e293b',borderRadius:8,padding:16}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Deal Capacity Planner</div>
      {(()=>{
        const [amount, setAmount] = useState('');
        const needed = Number(amount||0);
        const canNow = needed > 0 && needed <= totalBorrowable;
        const firstViableRenewal = needed > 0 && !canNow ? milestones.find(m => m.type === 'renewal' && m.borrowableAtDate >= needed && m.date > today) : null;
        return (<div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div className="ibc-field" style={{flex:1,minWidth:180}}><label>Capital needed for next deal?</label><input type="number" placeholder="e.g. 50000" value={amount} onChange={e=>setAmount(e.target.value)} /></div>
          <div style={{flex:1,minWidth:200,paddingBottom:4}}>
            {needed>0&&canNow&&<div style={{fontFamily:'var(--m)',fontSize:12,color:'var(--green)',fontWeight:500}}>✓ You can fund this now — {fmt(totalBorrowable-needed)} remaining</div>}
            {needed>0&&!canNow&&firstViableRenewal&&<div style={{fontFamily:'var(--m)',fontSize:12,color:'var(--amber)',fontWeight:500}}>⏳ Available at {ibcFormatDate(firstViableRenewal.date)} ({firstViableRenewal.label})</div>}
            {needed>0&&!canNow&&!firstViableRenewal&&<div style={{fontFamily:'var(--m)',fontSize:12,color:'var(--red)',fontWeight:500}}>✗ Not enough capacity in forecast window</div>}
          </div>
        </div>);
      })()}
    </div>
  </div>);
}

// MAIN APP

function App({ googleReady, signedIn, onSignIn, onSignOut }) {
  // CF Settings
  const [startDate, setStartDate] = useState("2024-08-01");
  const [monthlyPersonalCash, setMonthlyPersonalCash] = useState(2000);
  const [startingFlipAmount, setStartingFlipAmount] = useState(9500);
  const [desiredMonthlyWithdrawal, setDesiredMonthlyWithdrawal] = useState(10000);
  const [maxFlipSize, setMaxFlipSize] = useState(600000);
  const [defaultYield, setDefaultYield] = useState(8);
  const [locInterestRate, setLocInterestRate] = useState(4);
  const [flipDurationYears, setFlipDurationYears] = useState(3);
  const [flipsPerAmount, setFlipsPerAmount] = useState(4);
  const [growthMultiplier, setGrowthMultiplier] = useState(1.5);
  const [staleThreshold, setStaleThreshold] = useState(12);
  const [currentAge, setCurrentAge] = useState(35); // kept for backwards compat but hidden
  const [retirementAge, setRetirementAge] = useState(60); // kept for backwards compat but hidden  
  const [current401k, setCurrent401k] = useState(250000); // kept for backwards compat but hidden
  const [include401k, setInclude401k] = useState(true);

  // Autosave settings
  const saveTimer = useRef(null);

      const a = actuals[mk];

      const personalCash = a.personalCash ?? 0;
      const withdrawal = a.withdrawal || 0;
      let assetCF = 0;
      for (const f of trackedFlips) {

        const fStartMonth = (fStart.getFullYear() - sd.getFullYear()) * 12 + (fStart.getMonth() - sd.getMonth());

              if (sp.indexFund) { const flipMonth = monthIdx - fStartMonth; const nets = calcIndexFundNetPmt(sp.amount, grossPmt, Math.round(sp.durationYears * 12)); assetCF += (flipMonth > 0 && flipMonth <= nets.length) ? nets[flipMonth - 1] : grossPmt; }

      initialState = { locBalance: lastActual.locBalance||0, activeFlips: forecastFlips, flipCount: trackedFlips.length, flipsAtCurrentAmt: flipsAtAmt, currentFlipAmt: cfa, lastFlipMonth: lastFlipStart, balance401k: latest401kBal, freedomReached: lastActual.assetCF >= desiredMonthlyWithdrawal };
    } else if (trackedFlips.length > 0) {
      const forecastFlips = trackedFlips.map(f => { const fs=parseDate(f.startDate); const fsm=(fs.getFullYear()-sd.getFullYear())*12+(fs.getMonth()-sd.getMonth()); return { id:f.id, startMonth:fsm, amount:f.amount, pmt:flipTotalPmt(f), yield:(f.yield||(f.splits?.[0]?.yield)||8)/100, endMonth:fsm+Math.round(flipMaxDuration(f)*12), indexFund:(f.indexFund||(f.splits&&f.splits.some(s=>s.indexFund)))||false, source:'actual', amount:f.amount }; });

      let calcLOC = 0;
      const firstFlipMonth = (()=>{const fs=parseDate(sortedFlips[0].startDate);return(fs.getFullYear()-sd.getFullYear())*12+(fs.getMonth()-sd.getMonth());})();
      const nowMonth = (new Date().getFullYear()-sd.getFullYear())*12+(new Date().getMonth()-sd.getMonth());
      for (let m = firstFlipMonth; m <= nowMonth; m++) { for(const ff of forecastFlips){if(ff.startMonth===m)calcLOC+=ff.amount;} let cf=0; for(const ff of forecastFlips){if(m>ff.startMonth&&m<=ff.endMonth)cf+=ff.pmt;} calcLOC=Math.max(0,calcLOC+calcLOC*(lr/12)-monthlyPersonalCash-cf); }
      forecastStartMonth = nowMonth + 1;
      initialState = { locBalance: calcLOC, activeFlips: forecastFlips, flipCount: trackedFlips.length, flipsAtCurrentAmt: flipsAtAmt, currentFlipAmt: cfa, lastFlipMonth: lastFlipStart, balance401k: latest401kBal, freedomReached: false };

  }, [startDate, monthlyPersonalCash, startingFlipAmount, desiredMonthlyWithdrawal, maxFlipSize, defaultYield, locInterestRate, flipDurationYears, flipsPerAmount, growthMultiplier, staleThreshold, currentAge, retirementAge, current401k, monthly401kContrib, annual401kYield, actuals, trackedFlips, include401k, retirement401kStartDate]);

  const idxSim = useMemo(() => simulateIndexFund({ startDate: parseDate(startDate), monthlyPersonalCash, desiredMonthlyWithdrawal, annualReturn: indexFundReturn/100, maxMonths: 600 }), [startDate, monthlyPersonalCash, desiredMonthlyWithdrawal, indexFundReturn]);

  const freeMonth = freedomMonth;
  const yf = freeMonth != null ? Math.floor(freeMonth/12) : null;
  const mr = freeMonth != null ? freeMonth % 12 : null;
  const teDefault = Math.min(freeMonth != null ? freeMonth + 60 : 240, combinedRows.length);
  const teMap = { 'default': teDefault, '10yr': 120, '20yr': 240, '30yr': 360, 'all': combinedRows.length };
  const te = Math.min(teMap[detailRange] || teDefault, combinedRows.length);
  const tRows = combinedRows.slice(0, te);
  const sr = Math.max(1, Math.floor(te / 280));

  const actualCount = tRows.filter(r => r.source === 'actual').length;

  const sd = parseDate(startDate);

  const updateActualFn = (mk, field, value) => { const next = { ...actuals, [mk]: { ...(actuals[mk]||{}), [field]: value } }; persistActuals(next); };
  const updateFlipCF = (flipId, splitId, mk, value) => {

  const addSplit = (flipId) => { const next = trackedFlips.map(f => { if(f.id!==flipId)return f; const splits=flipSplits(f); return{...f,splits:[...splits,{id:uid(),name:`Split ${splits.length+1}`,amount:0,yield:8,durationYears:3,monthlyPmt:0,indexFund:false,actualCF:{}}]}; }); persistFlips(next); };
  const removeSplit = (flipId, splitId) => { const next = trackedFlips.map(f => { if(f.id!==flipId||!f.splits)return f; const ns=f.splits.filter(s=>s.id!==splitId); if(ns.length===0)return f; return{...f,splits:ns,amount:ns.reduce((s,sp)=>s+sp.amount,0)}; }); persistFlips(next); };

    <div style={{'--d':"'Bricolage Grotesque', sans-serif",'--m':"'DM Mono', monospace",fontFamily:'var(--d)',background:'#020617',color:'#e2e8f0',minHeight:'100vh'}}>

          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',borderRadius:8,background:freedomDate?'rgba(34,197,94,.06)':'rgba(239,68,68,.06)',border:`1px solid ${freedomDate?'rgba(34,197,94,.12)':'rgba(239,68,68,.12)'}`,
            ...(freedomDate?{animation:'glow 3s ease-in-out infinite'}:{})}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:freedomDate?'#22c55e':'#ef4444'}}/>
            <div>
              <div style={{fontSize:8,color:'#64748b',fontFamily:'var(--m)',letterSpacing:'.06em',fontWeight:500}}>FREEDOM</div>
              <div style={{fontSize:14,fontWeight:800,color:freedomDate?'#22c55e':'#ef4444'}}>{freedomDate?fmtDate(freedomDate):">50yr"}</div>
              {freeMonth!=null&&<div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)'}}>{yf}y {mr}m</div>}
            </div>
          </div>
          <div style={{padding:'8px 14px',borderRadius:8,background:'rgba(249,115,22,.04)',border:'1px solid rgba(249,115,22,.1)'}}>
            <div style={{fontSize:8,color:'#64748b',fontFamily:'var(--m)',letterSpacing:'.06em',fontWeight:500}}>INDEX FUND</div>
            <div style={{fontSize:14,fontWeight:800,color:'#f97316'}}>{idxSim.freedomDate?fmtDate(idxSim.freedomDate):">50yr"}</div>
          </div>
          {signedIn
            ? <div onClick={onSignOut} style={{padding:'8px 12px',borderRadius:8,background:'rgba(34,197,94,.06)',border:'1px solid rgba(34,197,94,.12)',cursor:'pointer',transition:'all .15s'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:'#22c55e'}}/>
                  <span style={{fontSize:9,fontWeight:600,color:'#22c55e',fontFamily:'var(--m)'}}>Synced</span>
                </div>
              </div>
            : <button onClick={onSignIn} style={{padding:'8px 12px',borderRadius:8,background:'rgba(96,165,250,.06)',border:'1px solid rgba(96,165,250,.15)',cursor:'pointer',transition:'all .15s'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:'#ef4444'}}/>
                  <span style={{fontSize:9,fontWeight:600,color:'#60a5fa',fontFamily:'var(--m)'}}>Sign In</span>
                </div>
              </button>
          }
        </div>
      </header>

      {/* TABS */}
      <div style={{padding:'8px 20px',borderBottom:'1px solid #0f172a',display:'flex',gap:4,overflowX:'auto'}}>
        {tabs.map(([id,l])=>(<button key={id} onClick={()=>setTab(id)} style={{
          padding:'7px 14px',borderRadius:6,border:tab===id?'1px solid '+(id==='ibc'?'#166534':id==='gap'?'#164e63':'#164e63'):'1px solid transparent',
          background:tab===id?(id==='ibc'?'#052e16':id==='gap'?'#0c1929':'#0c1929'):'transparent',
          color:tab===id?(id==='ibc'?'#22c55e':id==='gap'?'#f59e0b':'#06b6d4'):'#64748b',
          fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'var(--m)',transition:'all .15s',whiteSpace:'nowrap',
        }}>{l}</button>))}
      </div>

      <div style={{padding:'20px',maxWidth:1200,margin:'0 auto'}}>

        {/* ═══ DASHBOARD ═══ */}
        {tab==="dashboard"&&(<div className="fi">
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#64748b',fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>Freedom</div>
            <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)',lineHeight:1.5}}>
              Earliest month where you can withdraw <span style={{color:'#06b6d4'}}>{fmt(desiredMonthlyWithdrawal)}/mo</span>, stop contributing, and flips sustain indefinitely
            </div>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:20}}>
            <Card label="Freedom Date" value={freedomDate?fmtDate(freedomDate):"N/A"} sub={freeMonth!=null?`${yf}y ${mr}m · self-sustaining`:'Adjust inputs'} color="#22c55e" icon="🎯"/>
            <Card label="Desired Withdrawal" value={fmt(desiredMonthlyWithdrawal)} sub="/mo at freedom" color="#a78bfa" icon="💰"/>
            <Card label="Tracked Flips" value={trackedFlips.length} sub={`${actualCount} months of actuals`} color="#f59e0b" icon="🔄"/>
            <Card label="CF Depleted" value={cfDepletedDate?fmtDate(cfDepletedDate):"Not Depleted"} color={cfDepletedDate?"#ef4444":"#22c55e"} icon={cfDepletedDate?"⚠️":"✅"}/>
            {ibcPolicies.length>0&&<Card label="IBC Cash Value" value={fmt(ibcPolicies.reduce((s,p)=>s+getCurrentActualsEnhanced(p).cashValue,0))} sub={`${ibcPolicies.length} policies`} color="#22c55e" icon="🛡️"/>}
            {include401k&&(()=>{
              // Get 401k balance from latest actuals (carry-forward) or from simulation
              let bal401k = current401k || 0;
              const sortedMks = Object.keys(actuals).sort();
              for (const mk of sortedMks) { if (actuals[mk]?.balance401k != null && actuals[mk].balance401k !== '') bal401k = Number(actuals[mk].balance401k); }
              return <Card label="401k Balance" value={fmtK(bal401k)} sub={`${fmt(monthly401kContrib)}/mo · ${annual401kYield}% yield`} color="#f59e0b" icon="🏦"/>;
            })()}
          </div>

          {/* Withdrawal breakdown at freedom */}
          {include401k&&freedomMonth!=null&&(()=>{
            const freedomRow = combinedRows.find(r => r.month === freedomMonth);
            if (!freedomRow) return null;
            const assetCFAtFreedom = freedomRow.assetCF || 0;
            const ret401kAtFreedom = freedomRow.retirement401kMonthly || 0;
            const totalAtFreedom = assetCFAtFreedom + ret401kAtFreedom;
            return totalAtFreedom > 0 ? <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:'12px 16px',marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:'#64748b',fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Monthly Income at Freedom</div>
              <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                <div style={{flex:'1 1 140px',padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
                  <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)',textTransform:'uppercase',fontWeight:700,marginBottom:2}}>Asset Cashflow</div>
                  <div style={{fontSize:18,fontWeight:800,color:'#06b6d4',fontFamily:'var(--m)'}}>{fmt(assetCFAtFreedom)}</div>
                  <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)'}}>{totalAtFreedom>0?((assetCFAtFreedom/totalAtFreedom)*100).toFixed(0)+'% of total':'—'}</div>
                </div>
                <div style={{flex:'1 1 140px',padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
                  <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)',textTransform:'uppercase',fontWeight:700,marginBottom:2}}>401k Withdrawal</div>
                  <div style={{fontSize:18,fontWeight:800,color:'#f59e0b',fontFamily:'var(--m)'}}>{fmt(ret401kAtFreedom)}</div>
                  <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)'}}>{totalAtFreedom>0?((ret401kAtFreedom/totalAtFreedom)*100).toFixed(0)+'% of total':'—'}{ret401kAtFreedom>0?' · 4% rule':''}</div>
                </div>
                <div style={{flex:'1 1 140px',padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid rgba(167,139,250,.2)'}}>
                  <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)',textTransform:'uppercase',fontWeight:700,marginBottom:2}}>Total Monthly</div>
                  <div style={{fontSize:18,fontWeight:800,color:'#a78bfa',fontFamily:'var(--m)'}}>{fmt(totalAtFreedom)}</div>
                  <div style={{fontSize:8,color:totalAtFreedom>=desiredMonthlyWithdrawal?'#22c55e':'#ef4444',fontFamily:'var(--m)'}}>{totalAtFreedom>=desiredMonthlyWithdrawal?'✓ Meets target':'Below target'}</div>
                </div>
              </div>
            </div> : null;
          })()}
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18,marginBottom:18}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,flexWrap:'wrap',gap:8}}>
              <div><h3 style={{fontSize:14,fontWeight:700}}>Cashflow Trajectory</h3><div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)',marginTop:2}}>Actuals + forecast</div></div>
              <div style={{display:'flex',gap:12,fontSize:9,fontFamily:'var(--m)'}}><span><span style={{color:'#06b6d4'}}>━</span> Asset CF</span><span><span style={{color:'#f97316'}}>╌</span> Index Fund</span></div>
            </div>
            <DualChart rows={cd} idxData={idxCd} target={desiredMonthlyWithdrawal}/>
          </div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {[['Asset CF',cd.map(d=>d.assetCF),'#06b6d4'],['LOC Balance',cd.map(d=>d.locBalance),'#ef4444']].map(([label,data,color])=>(<div key={label} style={{flex:'1 1 200px',background:'#0f172a',border:'1px solid #1e293b',borderRadius:8,padding:12}}>
              <div style={{fontSize:9,fontWeight:700,color:'#475569',marginBottom:6,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.05em'}}>{label}</div>
              <Spark data={data} color={color} h={44}/>
              <div style={{textAlign:'right',fontSize:12,fontWeight:700,color,marginTop:3,fontFamily:'var(--m)'}}>{data.length?fmtK(data[data.length-1]):'—'}</div>
            </div>))}
          </div>
        </div>)}

        {/* ═══ ACTUALS ═══ */}
        {tab==="actuals"&&(<div className="fi">
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18,marginBottom:18}}>
            <h3 style={{fontSize:13,fontWeight:700,marginBottom:14,fontFamily:'var(--m)',color:'#06b6d4'}}>📊 Record Monthly Actuals</h3>
            <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
              <Inp label="Month" value={editMonth||currentMoKey} onChange={setEditMonth} type="text" note="YYYY-MM" small style={{flex:'0 0 120px'}}/>
              <Inp label="Personal Cash" value={actuals[editMonth||currentMoKey]?.personalCash??monthlyPersonalCash} onChange={v=>updateActualFn(editMonth||currentMoKey,'personalCash',v)} pre="$" step={100} small style={{flex:'1 1 120px'}}/>
              <Inp label="Withdrawal" value={actuals[editMonth||currentMoKey]?.withdrawal??0} onChange={v=>updateActualFn(editMonth||currentMoKey,'withdrawal',v)} pre="$" step={100} small style={{flex:'1 1 120px'}}/>
              {include401k&&<Inp label="401k Balance" value={actuals[editMonth||currentMoKey]?.balance401k??''} onChange={v=>updateActualFn(editMonth||currentMoKey,'balance401k',v)} pre="$" step={1000} small note="Leave blank to carry forward" style={{flex:'1 1 140px'}}/>}
              <Inp label="Notes" value={actuals[editMonth||currentMoKey]?.notes??''} onChange={v=>updateActualFn(editMonth||currentMoKey,'notes',v)} type="text" small style={{flex:'2 1 200px'}}/>
            </div>
          </div>
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,overflow:'hidden'}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <h3 style={{fontSize:12,fontWeight:700,fontFamily:'var(--m)'}}>Monthly History</h3>
              <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)'}}>{Object.keys(actuals).length} months</div>
            </div>
            <div style={{overflowX:'auto',maxHeight:500}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:10,fontFamily:'var(--m)'}}>
                <thead><tr style={{borderBottom:'2px solid #1e293b',position:'sticky',top:0,background:'#0f172a',zIndex:1}}>
                  {include401k
                    ? ['Month','Personal','Asset CF','W/D','401k Bal','Notes',''].map(h=>(<th key={h} style={{padding:'7px 8px',textAlign:'left',color:'#475569',fontSize:8,fontWeight:700,textTransform:'uppercase'}}>{h}</th>))
                    : ['Month','Personal','Asset CF','W/D','Notes',''].map(h=>(<th key={h} style={{padding:'7px 8px',textAlign:'left',color:'#475569',fontSize:8,fontWeight:700,textTransform:'uppercase'}}>{h}</th>))
                  }
                </tr></thead>
                <tbody>{(()=>{
                  let carry401k = current401k || 0;
                  return allMonthKeys.map(mk=>{const a=actuals[mk];const hasData=a&&(a.personalCash!=null);let flipCF=0;for(const f of trackedFlips){for(const sp of flipSplits(f)){if(sp.actualCF?.[mk]!=null)flipCF+=sp.actualCF[mk];}}
                  if (a?.balance401k != null && a.balance401k !== '') carry401k = Number(a.balance401k);
                  return(<tr key={mk} className="tb" style={{borderBottom:'1px solid #0b1120',background:hasData?'rgba(6,182,212,.03)':'transparent',cursor:'pointer'}} onClick={()=>setEditMonth(mk)}>
                    <td style={{padding:'6px 8px',color:editMonth===mk?'#06b6d4':'#94a3b8',fontWeight:editMonth===mk?700:400}}>{mk}</td>
                    <td style={{padding:'6px 8px',color:hasData?'#f59e0b':'#1e293b'}}>{hasData?fmt(a.personalCash??0):'—'}</td>
                    <td style={{padding:'6px 8px',color:flipCF>0?'#22d3ee':'#1e293b'}}>{flipCF>0?fmt(flipCF):'—'}</td>
                    <td style={{padding:'6px 8px',color:a?.withdrawal?'#f87171':'#1e293b'}}>{a?.withdrawal?'-'+fmt(a.withdrawal):'—'}</td>
                    {include401k&&<td style={{padding:'6px 8px',color:carry401k>0?'#f59e0b':'#1e293b'}}>{carry401k>0?fmtK(carry401k):'—'}{a?.balance401k!=null&&a.balance401k!==''?'':carry401k>0?<span style={{fontSize:7,color:'#334155',marginLeft:2}}>↳</span>:''}</td>}
                    <td style={{padding:'6px 8px',color:'#475569',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a?.notes||''}</td>
                    <td style={{padding:'6px 8px'}}>{hasData&&<span style={{color:'#22c55e',fontSize:9}}>✓</span>}</td>
                  </tr>);
                })})()}</tbody>
              </table>
            </div>
          </div>
        </div>)}

        {/* ═══ FLIPS (with DIBS toggle) ═══ */}
        {tab==="flips"&&(<div className="fi">
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18,marginBottom:18}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <h3 style={{fontSize:13,fontWeight:700,fontFamily:'var(--m)',color:'#f59e0b'}}>🔄 Add New Flip</h3>
              {nextFlipSize>0&&<div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)'}}>Next projected flip: <span style={{color:'var(--cyan)',fontWeight:600}}>{fmt(nextFlipSize)}</span></div>}
            </div>

            {/* Top: name + date */}
            <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end',marginBottom:12}}>
              <Inp label="Name" value={newFlipForm.name} onChange={v=>setNewFlipForm({...newFlipForm,name:v})} type="text" small note="e.g. Flip #5" style={{flex:'1 1 180px'}}/>
              <div style={{flex:'1 1 130px',marginBottom:8}}>
                <label style={{display:'block',fontSize:9,fontWeight:700,color:'#94a3b8',marginBottom:3,textTransform:'uppercase',letterSpacing:'.08em',fontFamily:'var(--m)'}}>Start Date</label>
                <input type="date" value={newFlipForm.startDate||todayStr} onChange={e=>setNewFlipForm({...newFlipForm,startDate:e.target.value})}
                  style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:6,padding:'7px 8px',color:'#e2e8f0',fontSize:13,fontFamily:'var(--m)',width:'100%',outline:'none'}} />
              </div>
            </div>

            {/* Split rows */}
            {newFlipForm.splits.map((sp, si) => (
              <div key={sp.id} style={{marginBottom:8,padding:'10px 12px',background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
                {newFlipForm.splits.length>1&&<div style={{fontSize:9,fontWeight:700,color:'#475569',fontFamily:'var(--m)',marginBottom:6}}>{sp.name||`Split ${si+1}`}</div>}
                <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'flex-end'}}>
                  {newFlipForm.splits.length>1&&<Inp label="Name" value={sp.name} onChange={v=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],name:v};setNewFlipForm({...newFlipForm,splits:ns});}} type="text" small style={{flex:'1 1 90px'}}/>}
                  <Inp label="Amount" value={sp.amount} onChange={v=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],amount:v};setNewFlipForm({...newFlipForm,splits:ns});}} pre="$" step={500} small note={nextFlipSize>0&&si===0?`next: ${fmtK(nextFlipSize)}`:''} style={{flex:'1 1 100px'}}/>
                  <Inp label="Yield" value={sp.yield} onChange={v=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],yield:v};setNewFlipForm({...newFlipForm,splits:ns});}} suf="%" step={0.5} small style={{flex:'0 0 70px'}}/>
                  <Inp label="Duration" value={sp.durationYears} onChange={v=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],durationYears:v};setNewFlipForm({...newFlipForm,splits:ns});}} suf="yrs" step={0.5} small style={{flex:'0 0 80px'}}/>
                  <div style={{flex:'1 1 140px',marginBottom:8}}>
                    <label style={{display:'block',fontSize:9,fontWeight:700,color:'#94a3b8',marginBottom:3,textTransform:'uppercase',letterSpacing:'.08em',fontFamily:'var(--m)'}}>Destination</label>
                    <input list="dest-suggestions" value={sp.destination||''} onChange={e=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],destination:e.target.value};setNewFlipForm({...newFlipForm,splits:ns});}} placeholder="e.g. S&P 500 Index Fund"
                      style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:6,padding:'7px 8px',color:'#e2e8f0',fontSize:11,fontFamily:'var(--m)',width:'100%',outline:'none'}} />
                    <datalist id="dest-suggestions">{destSuggestions.map(d=><option key={d} value={d}/>)}</datalist>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,paddingBottom:2}}>
                    <div style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer'}} onClick={()=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],indexFund:!ns[si].indexFund};setNewFlipForm({...newFlipForm,splits:ns});}}>
                      <div style={{width:14,height:14,borderRadius:3,border:'1px solid '+(sp.indexFund?'#f97316':'#334155'),background:sp.indexFund?'#f97316':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>{sp.indexFund&&<span style={{color:'#fff',fontSize:9}}>✓</span>}</div>
                      <span style={{fontSize:8,color:sp.indexFund?'#f97316':'#64748b',fontFamily:'var(--m)',fontWeight:600}}>IDX</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer'}} onClick={()=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],isDibs:!ns[si].isDibs};setNewFlipForm({...newFlipForm,splits:ns});}}>
                      <div style={{width:14,height:14,borderRadius:3,border:'1px solid '+(sp.isDibs?'#60a5fa':'#334155'),background:sp.isDibs?'#60a5fa':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>{sp.isDibs&&<span style={{color:'#fff',fontSize:9}}>✓</span>}</div>
                      <span style={{fontSize:8,color:sp.isDibs?'#60a5fa':'#64748b',fontFamily:'var(--m)',fontWeight:600}}>DIBS</span>
                    </div>
                  </div>
                  {newFlipForm.splits.length>1&&<Btn onClick={()=>{const ns=newFlipForm.splits.filter((_,i)=>i!==si);setNewFlipForm({...newFlipForm,splits:ns});}} color="#ef4444" small>×</Btn>}
                </div>
                {/* Per-split DIBS linking */}
                {sp.isDibs&&<div style={{marginTop:8,padding:8,background:'rgba(96,165,250,.04)',border:'1px solid rgba(96,165,250,.1)',borderRadius:5}}>
                  <div style={{fontSize:9,fontWeight:600,color:'var(--blue)',fontFamily:'var(--m)',marginBottom:5}}>DIBS Linking{newFlipForm.splits.length>1?` — ${sp.name||'Split '+(si+1)}`:''}</div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
                    <div style={{flex:'0 0 110px'}} className="ibc-field"><label>Source Type</label>
                      <select value={sp.dibsSourceType||'loc'} onChange={e=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],dibsSourceType:e.target.value,dibsSourceId:''};setNewFlipForm({...newFlipForm,splits:ns});}}>
                        <option value="loc">Credit Line</option><option value="policy">Policy Loan</option>
                      </select>
                    </div>
                    <div style={{flex:'1 1 160px'}} className="ibc-field"><label>{(sp.dibsSourceType||'loc')==='policy'?'Source Policy':'Source LOC'}</label>
                      <select value={sp.dibsSourceId||''} onChange={e=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],dibsSourceId:e.target.value};setNewFlipForm({...newFlipForm,splits:ns});}}>
                        <option value="">Select...</option>
                        {(sp.dibsSourceType||'loc')==='policy'
                          ? ibcPolicies.map(p=><option key={p.id} value={p.id}>{p.name||'Unnamed'}{p.insured?' ('+p.insured+')':''}</option>)
                          : ibcLocs.map(l=><option key={l.id} value={l.id}>{l.name||'Unnamed'}{l.lender?' — '+l.lender:''}</option>)}
                      </select>
                    </div>
                    <div style={{flex:'1 1 160px'}} className="ibc-field"><label>Dest IBC Policy</label>
                      <select value={sp.dibsDestPolicyId||''} onChange={e=>{const ns=[...newFlipForm.splits];ns[si]={...ns[si],dibsDestPolicyId:e.target.value};setNewFlipForm({...newFlipForm,splits:ns});}}>
                        <option value="">Select...</option>
                        {ibcPolicies.map(p=><option key={p.id} value={p.id}>{p.name||'Unnamed'}{p.insured?' ('+p.insured+')':''}</option>)}
                      </select>
                    </div>
                  </div>
                </div>}
              </div>
            ))}

            {/* Actions */}
            <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>

              </div>}

              {/* ── Summary cards: Expected, Actual, Difference, Remaining ── */}
              {cfMonths.length>0&&(()=>{
                let totalExpected=0, totalActual=0;
                for(const mk of cfMonths){let moE=0,moA=0;for(const sp of splits){const spPmt=sp.monthlyPmt||monthlyPmt(sp.amount,(sp.yield||8)/100,sp.durationYears);const spEnd=Math.round(sp.durationYears*12);const fsp=parseDate(f.startDate);const mkP=mk.split('-').map(Number);const moIdx=(mkP[0]-fsp.getFullYear())*12+(mkP[1]-1-fsp.getMonth());if(moIdx>0&&moIdx<=spEnd){moE+=spPmt;const act=sp.actualCF?.[mk];moA+=act!=null?act:spPmt;}}totalExpected+=moE;totalActual+=moA;}
