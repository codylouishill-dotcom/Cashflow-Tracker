<script>

  CLIENT_ID: '481571770380-b90bpohn8atrqsls9jso7ah5lsn5pclm.apps.googleusercontent.com',

<script type="text/babel" data-type="module">

// ═══════════════════════════════════════════════
// GOOGLE SHEETS STORAGE LAYER  
// ═══════════════════════════════════════════════

const TABS = { SETTINGS: 'Settings', FLIPS: 'Flips', ACTUALS: 'Actuals', IBC_POLICIES: 'IBC_Policies', IBC_LOCS: 'IBC_LOCs', IBC_DEALS: 'IBC_Deals' };
let _gapiReady = false, _tokenClient = null, _signedIn = false;
let _onAuthChange = null;

async function initGoogleApi(onAuthChange) {
  _onAuthChange = onAuthChange;
  await new Promise((resolve) => {
    let elapsed = 0;
    const check = () => {
      if (typeof gapi !== 'undefined' && typeof google !== 'undefined' && google.accounts) { resolve(); }
      else if (elapsed > 5000) { resolve(); }
      else { elapsed += 100; setTimeout(check, 100); }
    };
    check();
  });
  if (typeof gapi === 'undefined' || typeof google === 'undefined' || !google.accounts) return;
  return new Promise((resolve) => {
    gapi.load('client', async () => {
      await gapi.client.init({ discoveryDocs: [SHEETS_CONFIG.DISCOVERY_DOC] });
      _gapiReady = true;
      _tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: SHEETS_CONFIG.CLIENT_ID, scope: SHEETS_CONFIG.SCOPES,
        callback: (resp) => { if (!resp.error) { _signedIn = true; if (_onAuthChange) _onAuthChange(true); } },
      });
      if (localStorage.getItem('cfs:google_authed')) {
        try { _tokenClient.requestAccessToken({ prompt: '' }); } catch(e) {}
      }
      resolve();
    });
  });
}

function doSignIn() {
  if (!_tokenClient) return;
  _tokenClient.requestAccessToken({ prompt: gapi.client.getToken() ? '' : 'consent' });
  localStorage.setItem('cfs:google_authed', 'true');
}
function doSignOut() {
  const token = gapi.client.getToken();
  if (token) { google.accounts.oauth2.revoke(token.access_token); gapi.client.setToken(''); }
  _signedIn = false; localStorage.removeItem('cfs:google_authed');
  if (_onAuthChange) _onAuthChange(false);
}
function isGoogleSignedIn() { return _signedIn && gapi.client && gapi.client.getToken() !== null; }

async function ensureTabs() {
  try {
    const resp = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: SHEETS_CONFIG.SHEET_ID });
    const existing = resp.result.sheets.map(s => s.properties.title);
    const reqs = [];
    for (const tab of Object.values(TABS)) {
      if (!existing.includes(tab)) reqs.push({ addSheet: { properties: { title: tab } } });
    }
    if (reqs.length > 0) await gapi.client.sheets.spreadsheets.batchUpdate({ spreadsheetId: SHEETS_CONFIG.SHEET_ID, resource: { requests: reqs } });
  } catch(e) { console.error('ensureTabs error:', e); }
}

// Generic sheet helpers
async function sheetClearAndWrite(tab, range, rows) {
  await gapi.client.sheets.spreadsheets.values.clear({ spreadsheetId: SHEETS_CONFIG.SHEET_ID, range: tab+'!'+range });
  if (rows.length > 0) {
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId: SHEETS_CONFIG.SHEET_ID, range: tab+'!A1',
      valueInputOption: 'RAW', resource: { values: rows },
    });
  }
}
async function sheetRead(tab, range) {
  try {
    const resp = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SHEETS_CONFIG.SHEET_ID, range: tab+'!'+range });
    return resp.result.values || [];
  } catch { return []; }
}

// Settings
async function sheetSaveSettings(settings) {
  const rows = Object.entries(settings).map(([k, v]) => [k, JSON.stringify(v)]);
  await sheetClearAndWrite(TABS.SETTINGS, 'A:B', rows);
}
async function sheetLoadSettings() {
  try {
    const rows = await sheetRead(TABS.SETTINGS, 'A:B');
    const s = {};
    for (const [k, v] of rows) { try { s[k] = JSON.parse(v); } catch { s[k] = v; } }
    return s;
  } catch { return {}; }
}

// Flips
async function sheetSaveFlips(flips) {
  const header = ['id','name','amount','startDate','splits_json','dibs_json'];
  const rows = [header, ...flips.map(f => [
    f.id, f.name, f.amount, f.startDate, JSON.stringify(f.splits || flipSplits(f)), JSON.stringify(f.dibs || null),
  ])];
  await sheetClearAndWrite(TABS.FLIPS, 'A:F', rows);
}
async function sheetLoadFlips() {
  try {
    const rows = await sheetRead(TABS.FLIPS, 'A:F');
    if (rows.length < 2) return [];
    const h = rows[0];
    return rows.slice(1).map(row => {
      const o = {};
      h.forEach((k, i) => {
        const v = row[i] || '';
        if (k === 'amount') o[k] = parseFloat(v)||0;
        else if (k === 'splits_json') { try { o.splits = JSON.parse(v); } catch { o.splits = []; } }
        else if (k === 'dibs_json') { try { o.dibs = JSON.parse(v); } catch { o.dibs = null; } }
        else if (['yield','durationYears','monthlyPmt'].includes(k)) o[k] = parseFloat(v)||0;
        else if (k === 'indexFund') o[k] = v === 'true';
        else if (k === 'actualCF') { try { o[k] = JSON.parse(v); } catch { o[k] = {}; } }
        else o[k] = v;
      });
      return o;
    });
  } catch { return []; }
}

// Actuals
async function sheetSaveActuals(actuals) {
  const header = ['month','personalCash','withdrawal','notes'];
  const rows = [header, ...Object.entries(actuals).sort().map(([mk, a]) => [mk, a.personalCash??'', a.withdrawal??'', a.notes??''])];
  await sheetClearAndWrite(TABS.ACTUALS, 'A:D', rows);
}
async function sheetLoadActuals() {
  try {
    const rows = await sheetRead(TABS.ACTUALS, 'A:D');
    if (rows.length < 2) return {};
    const a = {};
    for (const row of rows.slice(1)) {
      if (!row[0]) continue;
      a[row[0]] = { personalCash: row[1]!==''?parseFloat(row[1]):null, withdrawal: row[2]!==''?parseFloat(row[2]):0, notes: row[3]||'' };
    }
    return a;
  } catch { return {}; }
}

// IBC Policies
async function sheetSaveIBCPolicies(policies) {
  const header = ['id','json'];
  const rows = [header, ...policies.map(p => [p.id, JSON.stringify(p)])];
  await sheetClearAndWrite(TABS.IBC_POLICIES, 'A:B', rows);
}
async function sheetLoadIBCPolicies() {
  try {
    const rows = await sheetRead(TABS.IBC_POLICIES, 'A:B');
    if (rows.length < 2) return [];
    return rows.slice(1).map(r => { try { return JSON.parse(r[1]); } catch { return null; } }).filter(Boolean);
  } catch { return []; }
}

// IBC LOCs
async function sheetSaveIBCLocs(locs) {
  const header = ['id','json'];
  const rows = [header, ...locs.map(l => [l.id, JSON.stringify(l)])];
  await sheetClearAndWrite(TABS.IBC_LOCS, 'A:B', rows);
}
async function sheetLoadIBCLocs() {
  try {
    const rows = await sheetRead(TABS.IBC_LOCS, 'A:B');
    if (rows.length < 2) return [];
    return rows.slice(1).map(r => { try { return JSON.parse(r[1]); } catch { return null; } }).filter(Boolean);
  } catch { return []; }
}

// IBC Deals
async function sheetSaveIBCDeals(deals) {
  const header = ['id','json'];
  const rows = [header, ...deals.map(d => [d.id, JSON.stringify(d)])];
  await sheetClearAndWrite(TABS.IBC_DEALS, 'A:B', rows);
}
async function sheetLoadIBCDeals() {
  try {
    const rows = await sheetRead(TABS.IBC_DEALS, 'A:B');
    if (rows.length < 2) return [];
    return rows.slice(1).map(r => { try { return JSON.parse(r[1]); } catch { return null; } }).filter(Boolean);
  } catch { return []; }
}

// Configure pdf.js worker
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}


const { useState, useMemo, useEffect, useCallback, useRef } = React;

// ═══════════════════════════════════════════════
// SHARED UTILITIES
// ═══════════════════════════════════════════════

const MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmt = n => n == null || isNaN(n) ? "$0" : "$" + Math.round(n).toLocaleString();
const fmtK = n => { const a = Math.abs(n); return (n<0?'-':'') + (a>=1e6?'$'+(a/1e6).toFixed(1)+'M':a>=1e3?'$'+(a/1e3).toFixed(0)+'k':fmt(n)); };
const fmtDate = d => d ? MO[d.getMonth()] + " " + d.getFullYear() : "—";
const moKey = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
const parseDate = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d||1); };
const addMo = (d, m) => new Date(d.getFullYear(), d.getMonth() + m, 1);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const daysBetween = (a,b) => Math.round((b-a)/(1000*60*60*24));

function monthlyPmt(principal, annualRate, years) {
  const r = annualRate/12, n = years*12;
  if (r<=0||n<=0) return principal/Math.max(n,1);
  return (principal*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}

const TAX_FED_ST = 0.32, TAX_FED_LT = 0.15, TAX_STATE = 0.0465;
const TAX_IDX_RETURN = 0.10;
const TAX_IDX_MR = Math.pow(1 + TAX_IDX_RETURN, 1/12) - 1;

function calcIndexFundNetPmt(principal, grossPmt, durationMonths) {
  let lotBasis = principal, lotShares = principal;
  const nets = [];
  for (let m = 1; m <= durationMonths; m++) {
    lotShares *= (1 + TAX_IDX_MR);
    const sellAmt = Math.min(grossPmt, lotShares);
    const proportion = lotShares > 0 ? sellAmt / lotShares : 1;
    const basisSold = lotBasis * proportion;
    const gain = Math.max(0, sellAmt - basisSold);
    const isLT = m > 12;
    const taxRate = isLT ? (TAX_FED_LT + TAX_STATE) : (TAX_FED_ST + TAX_STATE);
    const tax = gain * taxRate;
    lotShares -= sellAmt; lotBasis -= basisSold;
    nets.push(grossPmt - tax);
  }
  return nets;
}

function avgIndexFundNetPmt(principal, grossPmt, durationMonths) {
  const nets = calcIndexFundNetPmt(principal, grossPmt, durationMonths);
  return nets.reduce((s,v) => s+v, 0) / nets.length;
}

function flipTotalPmt(f) {
  if (f.splits && f.splits.length > 0) return f.splits.reduce((sum, s) => sum + (s.monthlyPmt || monthlyPmt(s.amount, (s.yield||8)/100, s.durationYears)), 0);
  return f.monthlyPmt || monthlyPmt(f.amount, (f.yield||8)/100, f.durationYears);
}

function flipSplits(f) {
  if (f.splits && f.splits.length > 0) return f.splits;
  return [{ id: f.id, name: 'Main', amount: f.amount, yield: f.yield, durationYears: f.durationYears,
    monthlyPmt: f.monthlyPmt || monthlyPmt(f.amount, (f.yield||8)/100, f.durationYears),
    indexFund: f.indexFund || false, actualCF: f.actualCF || {} }];
}

function flipMaxDuration(f) {
  if (f.splits && f.splits.length > 0) return Math.max(...f.splits.map(s => s.durationYears));
  return f.durationYears;
}

// ═══════════════════════════════════════════════
// STORAGE LAYER (Google Sheets + localStorage)
// ═══════════════════════════════════════════════

async function loadData() {
  if (isGoogleSignedIn()) {
    try {
      await ensureTabs();
      const [settings, actuals, flips, ibcPolicies, ibcLocs, ibcDeals] = await Promise.all([
        sheetLoadSettings(), sheetLoadActuals(), sheetLoadFlips(),
        sheetLoadIBCPolicies(), sheetLoadIBCLocs(), sheetLoadIBCDeals(),
      ]);
      return { settings: Object.keys(settings).length > 0 ? settings : null, actuals, flips, ibcPolicies, ibcLocs, ibcDeals };
    } catch(e) { console.error('Sheet load error:', e); }
  }
  try {
    const s = localStorage.getItem('cfs:settings');
    const a = localStorage.getItem('cfs:actuals');
    const f = localStorage.getItem('cfs:flips');
    const ip = localStorage.getItem('cfs:ibc_policies');
    const il = localStorage.getItem('cfs:ibc_locs');
    const id = localStorage.getItem('cfs:ibc_deals');
    return {
      settings: s ? JSON.parse(s) : null, actuals: a ? JSON.parse(a) : {},
      flips: f ? JSON.parse(f) : [],
      ibcPolicies: ip ? JSON.parse(ip) : [], ibcLocs: il ? JSON.parse(il) : [], ibcDeals: id ? JSON.parse(id) : [],
    };
  } catch { return { settings: null, actuals: {}, flips: [], ibcPolicies: [], ibcLocs: [], ibcDeals: [] }; }
}

async function saveSettings(data) {
  try { localStorage.setItem('cfs:settings', JSON.stringify(data)); } catch {}
  if (isGoogleSignedIn()) { try { await sheetSaveSettings(data); } catch(e) { console.error(e); } }
}
async function saveActuals(data) {

  if (isGoogleSignedIn()) { try { await sheetSaveActuals(data); } catch(e) { console.error(e); } }
}
async function saveFlips(data) {

// ═══════════════════════════════════════════════
// SIMULATION ENGINE (unchanged from original)
// ═══════════════════════════════════════════════

function simulateFromState(p, initialState) {
  const { startMonth, startDate, desiredMonthlyWithdrawal, maxFlipSize,
    defaultYield, locInterestRate, flipDurationYears, flipsPerAmount, growthMultiplier,
    staleThreshold, maxMonths, currentAge, retirementAge, current401k, monthly401kContrib,
    annual401kYield, monthlyPersonalCash, include401k, retirement401kStartDate, cfStartDate } = p;
  // monthsToRetirement must be in absolute month index (from original cashflow start date)
  // m in step() is an absolute index where m=0 = cfStartDate
  let monthsToRetirement;
  if (retirement401kStartDate) {
    const retDate = parseDate(retirement401kStartDate);
    const origStart = cfStartDate || startDate || new Date();
    monthsToRetirement = Math.max(0, (retDate.getFullYear() - origStart.getFullYear()) * 12 + (retDate.getMonth() - origStart.getMonth()));
  } else {
    monthsToRetirement = Math.max(0, (retirementAge - currentAge) * 12);
  }

  function step(s, m, date, postFreedom) {
    const pc = postFreedom ? 0 : monthlyPersonalCash;
    const wd = postFreedom ? desiredMonthlyWithdrawal : 0;
    let deployed = false;
    if (s.loc <= 0) {
      s.loc = 0;
      const gap = m - s.lfm;
      if (s.faa >= flipsPerAmount && gap < staleThreshold) { s.fa = Math.min(Math.round(s.fa * growthMultiplier / 100) * 100, maxFlipSize); s.faa = 0; }
      const pmt = monthlyPmt(s.fa, defaultYield, flipDurationYears);
      s.flips.push({ startMonth: m, pmt, endMonth: m + Math.round(flipDurationYears * 12) });
      s.loc += s.fa; s.fc++; s.faa++; s.lfm = m; deployed = true;
    }
    let assetCF = 0;
    for (const f of s.flips) {
      if (m > f.startMonth && m <= f.endMonth) {
        if (f.indexFund && f.amount) {
          if (!f._nets) { f._nets = calcIndexFundNetPmt(f.amount, f.pmt, f.endMonth - f.startMonth); }
          const flipMo = m - f.startMonth;
          assetCF += (flipMo > 0 && flipMo <= f._nets.length) ? f._nets[flipMo - 1] : f.pmt;
        } else { assetCF += f.pmt; }
      }
    }
    if (include401k && m < monthsToRetirement) { s.b401k += monthly401kContrib; s.b401k *= (1 + annual401kYield / 12); }
    const ret401k = (include401k && m >= monthsToRetirement) ? (s.b401k * 0.04) / 12 : 0;
    const locInt = s.loc * (locInterestRate / 12);
    s.loc = s.loc + locInt - pc - assetCF - ret401k + wd;
    if (s.loc <= 0 && !deployed) {
      s.loc = 0;
      const gap = m - s.lfm;
      if (s.faa >= flipsPerAmount && gap < staleThreshold) { s.fa = Math.min(Math.round(s.fa * growthMultiplier / 100) * 100, maxFlipSize); s.faa = 0; }
      const pmt = monthlyPmt(s.fa, defaultYield, flipDurationYears);
      s.flips.push({ startMonth: m, pmt, endMonth: m + Math.round(flipDurationYears * 12) });
      s.loc += s.fa; s.fc++; s.faa++; s.lfm = m;
    }
    const totalCF = assetCF + ret401k;
    return { month: m, date, flipNumber: s.fc, personalCash: pc, assetCF, locBalance: Math.max(0, s.loc),
      currentFlipAmount: s.fa, balance401k: s.b401k, retirement401kMonthly: ret401k,
      totalMonthlyCF: totalCF, monthlyWithdrawalOut: wd,
      activeFlipCount: s.flips.filter(f => m >= f.startMonth && m <= f.endMonth).length, source: 'forecast' };
  }

  function cloneState(s) { return { loc: s.loc, flips: s.flips.map(f => ({...f})), fc: s.fc, faa: s.faa, fa: s.fa, lfm: s.lfm, b401k: s.b401k }; }
  function makeState(is) { return { loc: is.locBalance, flips: is.activeFlips.map(f => ({...f})), fc: is.flipCount, faa: is.flipsAtCurrentAmt, fa: is.currentFlipAmt, lfm: is.lastFlipMonth, b401k: is.balance401k }; }

  function testSustainable(savedState, fromMonth) {
    const ts = cloneState(savedState);
    let peakCF = 0;
    for (let t = 0; t < 600; t++) {
      const tm = fromMonth + 1 + t;
      const date = addMo(startDate, tm - startMonth);
      const row = step(ts, tm, date, true);
      if (row.assetCF > peakCF) peakCF = row.assetCF;
      const hasActive = ts.flips.some(f => tm < f.endMonth);
      if (peakCF > 0 && row.assetCF <= 0 && !hasActive) return false;
    }
    return true;
  }

  const state = makeState(initialState);
  const rows = [];
  let freedomDate = null, freedomMonth = null, freedomReached = initialState.freedomReached || false;
  let cfDepletedDate = null, cfDepletedMonth = null, peakAssetCF = 0;
  if (freedomReached) { freedomMonth = startMonth; freedomDate = addMo(startDate, 0); }

  for (let i = 0; i < maxMonths; i++) {
    const m = startMonth + i;
    const date = addMo(startDate, i);
    const row = step(state, m, date, freedomReached);
    rows.push(row);
    if (!freedomReached && row.assetCF > 0 && row.assetCF >= desiredMonthlyWithdrawal * 0.5) {
      const snapshot = cloneState(state);
      if (testSustainable(snapshot, m)) { freedomReached = true; freedomDate = date; freedomMonth = m; }
    }
    if (row.assetCF > peakAssetCF) peakAssetCF = row.assetCF;
    const hasActiveFuture = state.flips.some(f => m < f.endMonth);
    if (!cfDepletedDate && peakAssetCF > 0 && row.assetCF <= 0 && !hasActiveFuture && freedomReached) { cfDepletedDate = date; cfDepletedMonth = m; }
  }
  return { rows, freedomDate, freedomMonth, cfDepletedDate, cfDepletedMonth };
}

function simulateIndexFund(p) {
  const { startDate, monthlyPersonalCash, desiredMonthlyWithdrawal, annualReturn, maxMonths } = p;
  const rows = []; let balance = 0, freedomMonth = null, freedomDate = null;
  let depletedMonth = null, depletedDate = null, phase = "accumulate";
  for (let m = 0; m < maxMonths; m++) {
    const mr = annualReturn / 12;
    if (phase === "accumulate") {
      balance += monthlyPersonalCash; balance *= (1 + mr);
      const w = (balance * 0.04) / 12;
      if (w >= desiredMonthlyWithdrawal) { freedomDate = addMo(startDate, m); freedomMonth = m; phase = "drawdown"; }
      rows.push({ month: m, date: addMo(startDate, m), balance, monthlyWithdrawable: w, phase: "accumulate" });
    } else if (phase === "drawdown") {
      balance *= (1 + mr); balance -= desiredMonthlyWithdrawal;
      if (balance <= 0) { balance = 0; depletedDate = addMo(startDate, m); depletedMonth = m; phase = "depleted"; }
      rows.push({ month: m, date: addMo(startDate, m), balance, monthlyWithdrawable: balance > 0 ? desiredMonthlyWithdrawal : 0, phase });
    } else { rows.push({ month: m, date: addMo(startDate, m), balance: 0, monthlyWithdrawable: 0, phase: "depleted" }); }
  }
  return { rows, freedomDate, freedomMonth, depletedDate, depletedMonth };
}

const ibcParseDate = (s) => s ? new Date(s+'T00:00:00') : null;
const ibcFormatDate = (d) => { if(!d) return '—'; return `${MO[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; };
const getNextAnniversary = (sd) => {
  const s = ibcParseDate(sd); if(!s) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  let n = new Date(t.getFullYear(), s.getMonth(), s.getDate());
  if (n <= t) n = new Date(t.getFullYear()+1, s.getMonth(), s.getDate());
  return n;
};
const getCurrentPolicyYear = (startDateStr) => {
  const start = ibcParseDate(startDateStr); if (!start) return 1;
  const today = new Date(); today.setHours(0,0,0,0);
  let py = today.getFullYear() - start.getFullYear();
  const thisYearAnniv = new Date(today.getFullYear(), start.getMonth(), start.getDate());
  if (today < thisYearAnniv) py--;
  return Math.max(1, py + 1);
};
const getAnniversaryForYear = (startDateStr, policyYear) => {
  const start = ibcParseDate(startDateStr); if (!start) return null;
  return new Date(start.getFullYear() + policyYear - 1, start.getMonth(), start.getDate());
};
const getCurrentActuals = (p) => {
  if (!p.startDate) {
    const now = new Date().getFullYear();
    const yrs = Object.keys(p.actuals||{}).map(Number).filter(y => y <= now).sort((a,b) => a-b);
    if (!yrs.length) return { cashValue: 0, deathBenefit: 0 };
    const latest = p.actuals[yrs[yrs.length-1]];
    return { cashValue: Number(latest.cashValue||0), deathBenefit: Number(latest.deathBenefit||0) };
  }
  const currentPY = getCurrentPolicyYear(p.startDate);
  const start = ibcParseDate(p.startDate);
  const currentAnnivYear = start.getFullYear() + currentPY - 1;
  const yrs = Object.keys(p.actuals||{}).map(Number).filter(y => y <= currentAnnivYear).sort((a,b) => a-b);
  if (!yrs.length) return { cashValue: 0, deathBenefit: 0 };
  const latest = p.actuals[yrs[yrs.length-1]];
  return { cashValue: Number(latest.cashValue||0), deathBenefit: Number(latest.deathBenefit||0) };
};
const getLatestLoan = (p) => { const k=Object.keys(p.monthlyLoans||{}).sort(); return k.length ? Number(p.monthlyLoans[k[k.length-1]]||0) : 0; };

const makePolicy = (id) => ({

});

function prefillActuals(policy) {
  if (!policy.illustration.length || !policy.startDate) return policy;
  const start = ibcParseDate(policy.startDate);
  const actuals = { ...policy.actuals };
  const startYear = start.getFullYear();

  // CV and DB have different timing from the illustration:
  // CV Year N → calendar year startYear + N - 1 (Year 1 CV = immediate at start)
  // DB Year N → calendar year startYear + N (DB lags by one year; stays at base until first renewal)
  //
  // So for calendar year startYear + N - 1:
  //   CV = illustration Year N
  //   DB = illustration Year (N-1), or base if N=1
  //
  // Example (start Nov 2024):
  //   2024: CV from Yr1 (15,484), DB = base (684,865)
  //   2025: CV from Yr2 (38,922), DB from Yr1 (743,910)
  //   2026: CV from Yr3 (63,466), DB from Yr2 (801,559)

  policy.illustration.forEach(row => {
    const calendarYear = startYear + row.year - 1; // CV year mapping
    // Find the DB value: use previous illustration year's DB, or base for year 1
    const prevIllusRow = policy.illustration.find(r => r.year === row.year - 1);
    const dbValue = prevIllusRow ? String(prevIllusRow.ngDB) : String(policy.baseDeathBenefit || row.ngDB);

    if (!actuals[calendarYear]) {
      actuals[calendarYear] = {
        cashValue: String(row.ngCV),
        deathBenefit: dbValue,
      };
    }
  });

  // Also prefill one extra year at the end for the last DB value
  // (the last illustration year's DB applies to startYear + lastYear)
  const lastRow = policy.illustration[policy.illustration.length - 1];
  if (lastRow) {
    const lastDBYear = startYear + lastRow.year;
    if (!actuals[lastDBYear]) {
      actuals[lastDBYear] = {
        cashValue: '', // no CV data for this year from illustration
        deathBenefit: String(lastRow.ngDB),
      };
    }
  }

  return { ...policy, actuals };
}

// Get current values accounting for CV/DB timing differences
// CV: updates immediately at policy start (illustration Year 1), then at each renewal anniversary
// DB: stays at base death benefit until first renewal, then updates at each anniversary
const getCurrentActualsEnhanced = (p) => {
  if (!p.startDate) return getCurrentActuals(p);

  const start = ibcParseDate(p.startDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const startYear = start.getFullYear();

  // CV: available from policy start, use most recent year with data that has occurred
  const currentPY = getCurrentPolicyYear(p.startDate);
  const currentAnnivYear = startYear + currentPY - 1;
  const cvYears = Object.keys(p.actuals||{}).map(Number).filter(y => y <= currentAnnivYear).sort((a,b) => a-b);
  let cv = 0, db = Number(p.baseDeathBenefit || 0);

  if (cvYears.length > 0) {
    const latestCVYear = cvYears[cvYears.length - 1];
    cv = Number(p.actuals[latestCVYear]?.cashValue || 0);
  }

  // DB: stays at base until first renewal anniversary passes
  // First renewal = illustration Year 2 values, occurs at startYear + 1 anniversary
  const firstAnniv = getAnniversaryForYear(p.startDate, 1);
  const firstAnnivPassed = firstAnniv ? today >= firstAnniv : false;

  if (firstAnnivPassed) {
    // DB can now use renewal data (calendar years after start year)
    const dbYears = Object.keys(p.actuals||{}).map(Number).filter(y => y <= currentAnnivYear && y > startYear).sort((a,b) => a-b);
    if (dbYears.length > 0) {
      const latestDBYear = dbYears[dbYears.length - 1];
      db = Number(p.actuals[latestDBYear]?.deathBenefit || db);
    }
  }

  return { cashValue: cv, deathBenefit: db };
};

async function parsePolicyPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pageTexts = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const items = content.items.map(item => ({ text: item.str, x: Math.round(item.transform[4]), y: Math.round(item.transform[5]) }));
    pageTexts.push({ pageNum: i, items, fullText: items.map(it => it.text).join(' ') });
  }
  const allText = pageTexts.map(p => p.fullText).join(' ');
  const result = { name: '', carrier: '', insured: '', issueAge: '', startDate: '', basePremium: '', fpur: '', fpurEndYear: '', premiumEndYear: '', baseDeathBenefit: '', illustration: [], parseNotes: [] };
  const nameMatch = allText.match(/Ameritas\s+Access\s+Whole\s+Life/i);
  if (nameMatch) { result.name = 'Ameritas Access Whole Life'; result.carrier = 'Ameritas Life Insurance Corp.'; }
  else { const m = allText.match(/([\w\s]+Whole\s+Life)/i); if (m) result.name = m[1].trim(); }
  const insuredMatch = allText.match(/Prepared\s+for:\s*([A-Z][a-z]+(?:\s+[A-Z][a-z]+)+)/);
  if (insuredMatch) result.insured = insuredMatch[1].trim();
  const ageMatch = allText.match(/(Male|Female),\s*Age\s*(\d+)/i);
  if (ageMatch) result.issueAge = ageMatch[2];
  const dbMatch = allText.match(/Base\s+Death\s+Benefit[:\s]*\$?([\d,]+)/i);
  if (dbMatch) result.baseDeathBenefit = dbMatch[1].replace(/,/g, '');
  const initPremMatch = allText.match(/Initial\s+Premium[:\s]*\$?([\d,]+(?:\.\d+)?)/i);
  if (initPremMatch) result.basePremium = initPremMatch[1].replace(/,/g, '');
  const fpurMatch = allText.match(/FPUR[:\s]*\$?([\d,]+)/i);
  if (fpurMatch) result.fpur = fpurMatch[1].replace(/,/g, '');
  const fpurAgeMatch = allText.match(/FPUR.*?ages?\s*(\d+)\s*(?:to|-)\s*(\d+)/i);
  if (fpurAgeMatch && result.issueAge) { result.fpurEndYear = String(parseInt(fpurAgeMatch[2]) - parseInt(fpurAgeMatch[1]) + 1); }
  const premYearsMatch = allText.match(/for\s+(\d+)\s+Years/i);
  if (premYearsMatch) result.premiumEndYear = premYearsMatch[1];
  const dateMatch = allText.match(/Prepared\s+on\s+(\w+\s+\d+,?\s+\d{4})/i);
  if (dateMatch) { try { const d = new Date(dateMatch[1]); if (!isNaN(d)) { result.startDate = d.toISOString().split('T')[0]; result.parseNotes.push('Start date from "Prepared on" — update to actual policy issue date'); } } catch(e) {} }

  for (const page of pageTexts) {
    if (!page.fullText.match(/End\s+of\s+Year/i) && !page.fullText.match(/Cash\s+Value.*Death\s+Benefit/i)) continue;
    const rowMap = {};
    page.items.forEach(item => { if (!item.text.trim()) return; const yKey = Math.round(item.y / 3) * 3; if (!rowMap[yKey]) rowMap[yKey] = []; rowMap[yKey].push(item); });
    const sortedYs = Object.keys(rowMap).map(Number).sort((a, b) => b - a);
    for (const yKey of sortedYs) {
      const rowItems = rowMap[yKey].sort((a, b) => a.x - b.x);
      const rowText = rowItems.map(r => r.text.trim()).filter(Boolean);
      const nums = rowText.map(t => t.replace(/[$,]/g, '')).filter(t => /^\d+$/.test(t));
      if (nums.length >= 8) {
        const age = parseInt(nums[0]), year = parseInt(nums[1]);
        if (age < 20 || age > 130 || year < 1 || year > 100) continue;
        const premium = parseInt(nums[2]);
        let gCV, gDB, ngCV, ngDB, dividend;
        if (nums.length >= 11) { gCV=parseInt(nums[3]); gDB=parseInt(nums[4]); dividend=parseInt(nums[8]); ngCV=parseInt(nums[9]); ngDB=parseInt(nums[10]); }
        else if (nums.length >= 9) { gCV=parseInt(nums[3]); gDB=parseInt(nums[4]); ngDB=parseInt(nums[nums.length-1]); ngCV=parseInt(nums[nums.length-2]); dividend=parseInt(nums[nums.length-3]); }
        else { gCV=parseInt(nums[3]); gDB=parseInt(nums[4]); ngCV=gCV; ngDB=gDB; dividend=0; }
        if (gCV > 0 && gDB > 0 && gCV < gDB * 2) {
          if (!result.illustration.find(r => r.year === year)) result.illustration.push({ age, year, premium, gCV, gDB, ngCV: ngCV||gCV, ngDB: ngDB||gDB, div: dividend||0 });
        }
      }
    }
  }
  result.illustration.sort((a, b) => a.year - b.year);
  if (result.insured) result.parseNotes.push(`Insured: ${result.insured}`);
  if (result.illustration.length > 0) result.parseNotes.push(`Parsed ${result.illustration.length} years of illustration data`);
  else result.parseNotes.push('Could not parse illustration table — enter values manually');
  if (!result.basePremium && result.illustration.length > 0) {
    const laterRows = result.illustration.filter(r => r.year > 5);
    if (laterRows.length > 0 && laterRows[0].premium > 0) { result.basePremium = String(laterRows[0].premium); result.parseNotes.push(`Base premium inferred: $${laterRows[0].premium}`); }
  }
  return result;
}

function Spark({ data, h = 50, color = "#22d3ee" }) {
  if (!data?.length) return null;
  const max = Math.max(...data, 1), w = data.length * 3;
  const pts = data.map((v, i) => `${i*3},${h-(v/max)*(h-6)-3}`).join(' ');
  const area = pts + ` ${(data.length-1)*3},${h} 0,${h}`;
  const id = `sp${color.slice(1)}`;
  return (<svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
    <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <polygon points={area} fill={`url(#${id})`}/><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
  </svg>);
}

function DualChart({ rows, idxData, target }) {
  if (!rows?.length) return null;
  const W = 800, H = 300, P = { t: 28, r: 18, b: 38, l: 72 };
  const cw = W-P.l-P.r, ch = H-P.t-P.b;
  const cfV = rows.map(d => d.assetCF||0);
  const idxV = idxData ? idxData.slice(0, rows.length).map(d => d.monthlyWithdrawable||0) : [];
  const maxY = Math.max(...cfV, ...idxV, target*1.2, 1);
  const x = i => P.l + (i/Math.max(rows.length-1,1))*cw;
  const y = v => P.t + ch - (v/maxY)*ch;
  const path = vals => vals.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const area = vals => path(vals)+` L${x(vals.length-1).toFixed(1)},${P.t+ch} L${x(0).toFixed(1)},${P.t+ch} Z`;
  const yT = [0,.25,.5,.75,1].map(p=>({v:maxY*p,y:y(maxY*p)}));
  const xT = []; const step = Math.max(1, Math.floor(rows.length/7));
  for (let i=0;i<rows.length;i+=step) xT.push({l:fmtDate(rows[i].date),x:x(i)});
  const lastActIdx = rows.findIndex(r => r.source === 'forecast');
  const boundaryX = lastActIdx > 0 ? x(lastActIdx) : null;
  return (<svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
    <defs><linearGradient id="cfg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#06b6d4" stopOpacity=".15"/><stop offset="100%" stopColor="#06b6d4" stopOpacity="0"/></linearGradient></defs>
    {yT.map((t,i)=>(<g key={i}><line x1={P.l} y1={t.y} x2={W-P.r} y2={t.y} stroke="#1e293b"/><text x={P.l-6} y={t.y+3} textAnchor="end" fill="#475569" fontSize="9" fontFamily="monospace">{fmtK(t.v)}</text></g>))}
    {xT.map((t,i)=><text key={i} x={t.x} y={H-6} textAnchor="middle" fill="#475569" fontSize="8" fontFamily="monospace">{t.l}</text>)}
    {boundaryX && (<g><line x1={boundaryX} y1={P.t} x2={boundaryX} y2={P.t+ch} stroke="#475569" strokeWidth="1" strokeDasharray="2,4" opacity=".5"/><text x={boundaryX+4} y={P.t+10} fill="#475569" fontSize="7" fontFamily="monospace">Forecast →</text></g>)}
    <path d={area(cfV)} fill="url(#cfg)"/><path d={path(cfV)} fill="none" stroke="#06b6d4" strokeWidth="2"/>
    {idxV.length > 0 && <path d={path(idxV)} fill="none" stroke="#f97316" strokeWidth="1.5" strokeDasharray="6,3"/>}
    <line x1={P.l} y1={y(target)} x2={W-P.r} y2={y(target)} stroke="#22c55e" strokeWidth="1" strokeDasharray="3,3" opacity=".4"/>
    <text x={W-P.r+2} y={y(target)+3} fill="#22c55e" fontSize="8" fontFamily="monospace" opacity=".5">{fmtK(target)}</text>
  </svg>);
}

  return (<div style={{ marginBottom: small?8:14, ...sx }}>
