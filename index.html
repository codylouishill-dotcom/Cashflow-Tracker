              {completedFlips.length > 0 && <div style={{marginTop:activeFlips.length>0?12:0}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,cursor:'pointer',padding:'8px 12px',background:'#0f172a',borderRadius:8,border:'1px solid #1e293b'}} onClick={()=>setShowCompleted(!showCompleted)}>
                  <span style={{fontSize:10,color:showCompleted?'#22c55e':'#475569',transition:'transform .2s',transform:showCompleted?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
                  <span style={{fontSize:11,fontWeight:700,color:'#475569',fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>Completed Flips ({completedFlips.length})</span>
                  <span style={{fontSize:9,color:'#334155',fontFamily:'var(--m)'}}>{showCompleted?'click to collapse':'click to expand'}</span>
                </div>
                {showCompleted && completedFlips.map(renderFlip)}
              </div>}
              {trackedFlips.length===0&&<div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:30,textAlign:'center'}}><div style={{fontSize:11,color:'#475569',fontFamily:'var(--m)'}}>No flips tracked yet.</div></div>}
            </>);
          })()}
        </div>)}

        {/* ═══ DETAIL TABLE ═══ */}
        {tab==="detail"&&(<div className="fi">
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,overflow:'hidden'}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
              <h3 style={{fontSize:12,fontWeight:700,fontFamily:'var(--m)'}}>Actuals + Forecast</h3>
              <div style={{display:'flex',gap:6}}>
                {[['default','Default'],['10yr','10yr'],['20yr','20yr'],['30yr','30yr'],['all','All']].map(([k,l])=>(<button key={k} onClick={()=>setDetailRange(k)} style={{padding:'4px 8px',fontSize:9,fontWeight:600,fontFamily:'var(--m)',border:'none',cursor:'pointer',background:detailRange===k?'#06b6d4':'#020617',color:detailRange===k?'#020617':'#64748b',borderRadius:4}}>{l}</button>))}
              </div>
            </div>
            <div style={{overflowX:'auto',maxHeight:detailRange==='all'||detailRange==='30yr'?'none':600}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:10,fontFamily:'var(--m)'}}>
                <thead><tr style={{borderBottom:'2px solid #1e293b',position:'sticky',top:0,background:'#0f172a',zIndex:1}}>
                  {include401k
                    ? ['','Date','Flip#','Personal','Asset CF','401k W/D','Total CF','W/D','LOC','401k Bal','Active'].map(h=>(<th key={h} style={{padding:'7px 8px',textAlign:'right',color:'#475569',fontSize:8,fontWeight:700,textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>))
                    : ['','Date','Flip#','Personal','Asset CF','W/D','LOC','Active'].map(h=>(<th key={h} style={{padding:'7px 8px',textAlign:'right',color:'#475569',fontSize:8,fontWeight:700,textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>))
                  }
                </tr></thead>
                <tbody>{tRows.map((r,i)=>{const isFree=freeMonth!=null&&r.month===freeMonth;const isActual=r.source==='actual';
                  const ret401k = r.retirement401kMonthly || 0;
                  const totalCF = (r.assetCF||0) + ret401k;
                  return(<tr key={i} className="tb" style={{borderBottom:'1px solid #0b1120',background:isFree?'rgba(34,197,94,.07)':isActual?'rgba(6,182,212,.03)':'transparent'}}>
                    <td style={{padding:'6px 6px',textAlign:'center',width:8}}><div style={{width:6,height:6,borderRadius:'50%',background:isActual?'#22c55e':'#334155',margin:'0 auto'}}/></td>
                    <td style={{padding:'6px 8px',textAlign:'right',color:isFree?'#22c55e':'#94a3b8',fontWeight:isFree?700:400}}>{fmtDate(r.date)}{isFree&&' 🎯'}</td>
                    <td style={{padding:'6px 8px',textAlign:'right',color:'#06b6d4'}}>{r.flipNumber}</td>
                    <td style={{padding:'6px 8px',textAlign:'right',color:r.personalCash>0?'#f59e0b':'#334155'}}>{r.personalCash>0?fmt(r.personalCash):'$0'}</td>
                    <td style={{padding:'6px 8px',textAlign:'right',color:'#22d3ee',fontWeight:600}}>{fmt(r.assetCF)}</td>
                    {include401k&&<td style={{padding:'6px 8px',textAlign:'right',color:ret401k>0?'#f59e0b':'#334155'}}>{ret401k>0?fmt(ret401k):'—'}</td>}
                    {include401k&&<td style={{padding:'6px 8px',textAlign:'right',color:'#a78bfa',fontWeight:600}}>{fmt(totalCF)}</td>}
                    <td style={{padding:'6px 8px',textAlign:'right',color:r.monthlyWithdrawalOut>0?'#f87171':'#1e293b'}}>{r.monthlyWithdrawalOut>0?'-'+fmt(r.monthlyWithdrawalOut):'—'}</td>
                    <td style={{padding:'6px 8px',textAlign:'right',color:r.locBalance>100?'#ef4444':'#22c55e'}}>{r.locBalance<=0?'$0':fmt(r.locBalance)}</td>
                    {include401k&&<td style={{padding:'6px 8px',textAlign:'right',color:r.balance401k>0?'#f59e0b':'#334155'}}>{r.balance401k>0?fmtK(r.balance401k):'—'}</td>}
                    <td style={{padding:'6px 8px',textAlign:'right',color:'#475569'}}>{r.activeFlipCount}</td>
                  </tr>);
                })}</tbody>
              </table>
            </div>
          </div>
        </div>)}

        {/* ═══ IBC SECTION ═══ */}
        {tab==="ibc"&&<IBCSection policies={ibcPolicies} setPolicies={setIbcPolicies} locs={ibcLocs} setLocs={setIbcLocs} deals={ibcDeals} setDeals={setIbcDeals} trackedFlips={trackedFlips} combinedRows={combinedRows} persistIBCPolicies={persistIBCPolicies} persistIBCLocs={persistIBCLocs} persistIBCDeals={persistIBCDeals} />}

        {/* ═══ GAP ANALYSIS ═══ */}
        {tab==="gap"&&<div className="fi">
          <IBCGapAnalysis policies={ibcPolicies} deals={ibcDeals} locs={ibcLocs} trackedFlips={trackedFlips} combinedRows={combinedRows} addDeal={()=>setShowGapDealModal(true)} updateDeal={(id,u)=>persistIBCDeals(ibcDeals.map(d=>d.id===id?{...d,...u}:d))} deleteDeal={(id)=>persistIBCDeals(ibcDeals.filter(d=>d.id!==id))} />
          {showGapDealModal && <IBCDealModal onClose={()=>setShowGapDealModal(false)} onAdd={(d)=>{persistIBCDeals([...ibcDeals,d]);setShowGapDealModal(false);}} policies={ibcPolicies} locs={ibcLocs} />}
        </div>}

        {/* ═══ SETTINGS ═══ */}
        {tab==="settings"&&(<div className="fi" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:16}}>
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
            <h3 style={{fontSize:12,fontWeight:700,color:'#06b6d4',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>◇ Core</h3>
            <Inp label="Start Date" value={startDate} onChange={setStartDate} type="text" note="YYYY-MM-DD" small/>
            <Inp label="Monthly Personal Cash" value={monthlyPersonalCash} onChange={setMonthlyPersonalCash} pre="$" step={100} small/>
            <Inp label="Starting Flip Amount" value={startingFlipAmount} onChange={setStartingFlipAmount} pre="$" step={500} small/>
            <Inp label="Max Flip Size" value={maxFlipSize} onChange={setMaxFlipSize} pre="$" step={10000} small/>
          </div>
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
            <h3 style={{fontSize:12,fontWeight:700,color:'#a78bfa',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>💰 Withdrawal & Rates</h3>
            <Inp label="Desired Monthly Withdrawal" value={desiredMonthlyWithdrawal} onChange={setDesiredMonthlyWithdrawal} pre="$" step={500} small/>
            <Inp label="Default Yield" value={defaultYield} onChange={setDefaultYield} suf="%" step={0.5} small/>
            <Inp label="LOC Interest Rate" value={locInterestRate} onChange={setLocInterestRate} suf="%" step={0.25} small/>
          </div>
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
            <h3 style={{fontSize:12,fontWeight:700,color:'#f59e0b',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>🔄 Flip Structure</h3>
            <Inp label="Flip Duration" value={flipDurationYears} onChange={setFlipDurationYears} suf="yrs" step={0.5} small/>
            <Inp label="Flips Per Amount" value={flipsPerAmount} onChange={setFlipsPerAmount} step={1} small/>
            <Inp label="Growth Multiplier" value={growthMultiplier} onChange={setGrowthMultiplier} suf="×" step={0.1} small/>
            <Inp label="Stale Threshold" value={staleThreshold} onChange={setStaleThreshold} suf="mo" step={1} small/>
          </div>
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
            <h3 style={{fontSize:12,fontWeight:700,color:'#f59e0b',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>🏦 401k & Index</h3>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid #1e293b',cursor:'pointer'}} onClick={()=>setInclude401k(!include401k)}>
              <div style={{width:36,height:20,borderRadius:10,background:include401k?'#06b6d4':'#334155',position:'relative',transition:'background .2s'}}><div style={{width:16,height:16,borderRadius:'50%',background:'#fff',position:'absolute',top:2,left:include401k?18:2,transition:'left .2s'}}/></div>
              <span style={{fontSize:10,fontWeight:600,color:include401k?'#e2e8f0':'#64748b',fontFamily:'var(--m)'}}>Include 401k</span>
            </div>
            <div style={{marginBottom:10}}>
              <label style={{display:'block',fontSize:9,fontWeight:700,color:'#94a3b8',marginBottom:3,textTransform:'uppercase',letterSpacing:'.08em',fontFamily:'var(--m)'}}>401k Withdrawal Start Date</label>
              <input type="date" value={retirement401kStartDate} onChange={e=>setRetirement401kStartDate(e.target.value)}
                style={{background:'#020617',border:'1px solid #1e293b',borderRadius:6,padding:'7px 8px',color:'#e2e8f0',fontSize:12,fontFamily:'var(--m)',width:'100%',outline:'none'}} />
              <div style={{fontSize:8,color:'#475569',fontFamily:'var(--m)',marginTop:2}}>When you plan to start withdrawing from 401k</div>
            </div>
            <Inp label="Monthly 401k Contrib" value={monthly401kContrib} onChange={setMonthly401kContrib} pre="$" step={50} small/>
            <Inp label="401k Yield" value={annual401kYield} onChange={setAnnual401kYield} suf="%" step={0.5} small/>
            <Inp label="Index Return" value={indexFundReturn} onChange={setIndexFundReturn} suf="%" step={0.5} small/>
          </div>
          <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
            <h3 style={{fontSize:12,fontWeight:700,color:'#ef4444',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>💾 Data Management</h3>
            <div style={{marginBottom:14,padding:12,background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:signedIn?'#22c55e':'#ef4444'}}/>
                  <span style={{fontSize:10,fontWeight:600,color:signedIn?'#22c55e':'#94a3b8',fontFamily:'var(--m)'}}>{signedIn?'Google Sheets Connected':'Not Connected'}</span>
                </div>
                {signedIn
                  ?<div style={{display:'flex',gap:6}}>
                    <Btn onClick={async()=>{setSaving(true);try{await ensureTabs();const s={startDate,monthlyPersonalCash,startingFlipAmount,desiredMonthlyWithdrawal,maxFlipSize,defaultYield,locInterestRate,flipDurationYears,flipsPerAmount,growthMultiplier,staleThreshold,currentAge,retirementAge,current401k,include401k,monthly401kContrib,annual401kYield,indexFundReturn};await Promise.all([sheetSaveSettings(s),sheetSaveFlips(trackedFlips),sheetSaveActuals(actuals),sheetSaveIBCPolicies(ibcPolicies),sheetSaveIBCLocs(ibcLocs),sheetSaveIBCDeals(ibcDeals)]);}catch(e){console.error(e);}setSaving(false);}} color="#06b6d4" small>Sync All</Btn>
                    <Btn onClick={onSignOut} color="#ef4444" small>Sign Out</Btn>
                  </div>
                  :<Btn onClick={onSignIn} color="#22c55e" small>Sign In with Google</Btn>
                }
              </div>
              <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)',lineHeight:1.5}}>{signedIn?'All data (cashflow + IBC) syncs to Google Sheets.':'Sign in to sync across devices.'}</div>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
              <Btn onClick={()=>{try{const data=JSON.stringify({settings:{startDate,monthlyPersonalCash,startingFlipAmount,desiredMonthlyWithdrawal,maxFlipSize,defaultYield,locInterestRate,flipDurationYears,flipsPerAmount,growthMultiplier,staleThreshold,currentAge,retirementAge,current401k,include401k,monthly401kContrib,annual401kYield,indexFundReturn},actuals,flips:trackedFlips,ibcPolicies,ibcLocs,ibcDeals},null,2);setExportData(data);}catch(e){setExportData('Error: '+e.message);}}} color="#06b6d4">Export All Data</Btn>
              <Btn onClick={()=>setShowImport(!showImport)} color="#f59e0b">{showImport?'Cancel Import':'Import Data'}</Btn>
            </div>
            {exportData&&<div style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span style={{fontSize:9,color:'#22c55e',fontFamily:'var(--m)'}}>Copy and save:</span>
                <Btn onClick={()=>{navigator.clipboard.writeText(exportData).catch(()=>{});}} color="#06b6d4" small>Copy</Btn>
              </div>
              <textarea readOnly value={exportData} style={{width:'100%',height:100,background:'#020617',border:'1px solid #1e293b',borderRadius:6,color:'#94a3b8',fontSize:9,fontFamily:'var(--m)',padding:8,resize:'vertical',outline:'none'}} onClick={e=>e.target.select()}/>
              <div style={{marginTop:4}}><Btn onClick={()=>setExportData(null)} color="#475569" small>Close</Btn></div>
            </div>}
            {showImport&&<div style={{marginBottom:14}}>
              <textarea value={importData} onChange={e=>setImportData(e.target.value)} placeholder="Paste exported JSON..." style={{width:'100%',height:100,background:'#020617',border:'1px solid #1e293b',borderRadius:6,color:'#e2e8f0',fontSize:9,fontFamily:'var(--m)',padding:8,resize:'vertical',outline:'none'}}/>
              <div style={{marginTop:6}}><Btn onClick={()=>{try{const data=JSON.parse(importData);
                if(data.settings){const s=data.settings;if(s.startDate)setStartDate(s.startDate);if(s.monthlyPersonalCash!=null)setMonthlyPersonalCash(s.monthlyPersonalCash);if(s.startingFlipAmount!=null)setStartingFlipAmount(s.startingFlipAmount);if(s.desiredMonthlyWithdrawal!=null)setDesiredMonthlyWithdrawal(s.desiredMonthlyWithdrawal);if(s.maxFlipSize!=null)setMaxFlipSize(s.maxFlipSize);if(s.defaultYield!=null)setDefaultYield(s.defaultYield);if(s.locInterestRate!=null)setLocInterestRate(s.locInterestRate);if(s.flipDurationYears!=null)setFlipDurationYears(s.flipDurationYears);if(s.flipsPerAmount!=null)setFlipsPerAmount(s.flipsPerAmount);if(s.growthMultiplier!=null)setGrowthMultiplier(s.growthMultiplier);if(s.staleThreshold!=null)setStaleThreshold(s.staleThreshold);if(s.currentAge!=null)setCurrentAge(s.currentAge);if(s.retirementAge!=null)setRetirementAge(s.retirementAge);if(s.current401k!=null)setCurrent401k(s.current401k);if(s.include401k!=null)setInclude401k(s.include401k);if(s.monthly401kContrib!=null)setMonthly401kContrib(s.monthly401kContrib);if(s.annual401kYield!=null)setAnnual401kYield(s.annual401kYield);if(s.indexFundReturn!=null)setIndexFundReturn(s.indexFundReturn);if(s.retirement401kStartDate)setRetirement401kStartDate(s.retirement401kStartDate);saveSettings(s);}
                if(data.actuals){setActuals(data.actuals);saveActuals(data.actuals);}
                if(data.flips){setTrackedFlips(data.flips);saveFlips(data.flips);}
                if(data.ibcPolicies){setIbcPolicies(data.ibcPolicies);saveIBCPolicies(data.ibcPolicies);}
                if(data.ibcLocs){setIbcLocs(data.ibcLocs);saveIBCLocs(data.ibcLocs);}
                if(data.ibcDeals){setIbcDeals(data.ibcDeals);saveIBCDeals(data.ibcDeals);}
                setImportData('');setShowImport(false);setExportData(null);
              }catch(e){}}} color="#22c55e" small>Import</Btn></div>
            </div>}
            <Btn onClick={resetAll} color="#ef4444">Reset All Saved Data</Btn>
          </div>
        </div>)}

      </div>

      <footer style={{padding:'12px 20px',borderTop:'1px solid #0f172a',textAlign:'center',fontSize:8,color:'#1e293b',fontFamily:'var(--m)'}}>
        Cashflow Stacking v5 · Calculator · Tracker · IBC · Google Sheets Sync · Not financial advice
      </footer>
    </div>
  );
}

function AppWithAuth() {
  const [googleReady, setGoogleReady] = useState(false);
  const [signedIn, setSignedIn] = useState(false);
  useEffect(() => {
    initGoogleApi((authed) => setSignedIn(authed)).then(() => {
      setGoogleReady(true);
      if (isGoogleSignedIn()) setSignedIn(true);
    }).catch(e => { console.error(e); setGoogleReady(true); });
  }, []);
  return React.createElement('div', null, React.createElement(App, { googleReady, signedIn, onSignIn: doSignIn, onSignOut: doSignOut }));
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AppWithAuth));

</script>

</body>
</html>
