              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'8px 10px',background:'#020617',borderRadius:6,border:'1px solid #1e293b',cursor:'pointer'}} onClick={()=>setInclude401k(!include401k)}>
                <div style={{width:36,height:20,borderRadius:10,background:include401k?'#06b6d4':'#334155',position:'relative',transition:'background .2s'}}>
                  <div style={{width:16,height:16,borderRadius:'50%',background:'#fff',position:'absolute',top:2,left:include401k?18:2,transition:'left .2s'}}/>
                </div>
                <span style={{fontSize:10,fontWeight:600,color:include401k?'#e2e8f0':'#64748b',fontFamily:'var(--m)'}}>Include 401k in calculations</span>
              </div>
              <Inp label="Current Age" value={currentAge} onChange={setCurrentAge} step={1} small/>
              <Inp label="Retirement Age" value={retirementAge} onChange={setRetirementAge} step={1} small/>
              <Inp label="Current 401k" value={current401k} onChange={setCurrent401k} pre="$" step={1000} small/>
              <Inp label="Monthly 401k" value={monthly401kContrib} onChange={setMonthly401kContrib} pre="$" step={50} small/>
              <Inp label="401k Yield" value={annual401kYield} onChange={setAnnual401kYield} suf="%" step={0.5} small/>
              <Inp label="Index Return" value={indexFundReturn} onChange={setIndexFundReturn} suf="%" step={0.5} small/>
            </div>
            <div style={{background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:18}}>
              <h3 style={{fontSize:12,fontWeight:700,color:'#ef4444',marginBottom:14,fontFamily:'var(--m)',textTransform:'uppercase',letterSpacing:'.06em'}}>💾 Data Management</h3>
              <div style={{marginBottom:14,padding:12,background:'#020617',borderRadius:6,border:'1px solid #1e293b'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:signedIn?'#22c55e':'#ef4444'}}/>
                    <span style={{fontSize:10,fontWeight:600,color:signedIn?'#22c55e':'#94a3b8',fontFamily:'var(--m)'}}>
                      {signedIn ? 'Google Sheets Connected' : 'Google Sheets Not Connected'}
                    </span>
                  </div>
                  {signedIn
                    ? <div style={{display:'flex',gap:6}}>
                        <Btn onClick={async ()=>{
                          setSaving(true);
                          try {
                            await ensureTabs();
                            const s = { startDate, monthlyPersonalCash, startingFlipAmount, desiredMonthlyWithdrawal,
                              maxFlipSize, defaultYield, locInterestRate, flipDurationYears,
                              flipsPerAmount, growthMultiplier, staleThreshold, currentAge, retirementAge,
                              current401k, include401k, monthly401kContrib, annual401kYield, indexFundReturn };
                            await Promise.all([
                              sheetSaveSettings(s),
                              sheetSaveFlips(trackedFlips),
                              sheetSaveActuals(actuals),
                            ]);
                          } catch(e) { console.error('Sync error:', e); }
                          setSaving(false);
                        }} color="#06b6d4" small>Sync Now</Btn>
                        <Btn onClick={onSignOut} color="#ef4444" small>Sign Out</Btn>
                      </div>
                    : <Btn onClick={onSignIn} color="#22c55e" small>Sign In with Google</Btn>
                  }
                </div>
                <div style={{fontSize:9,color:'#475569',fontFamily:'var(--m)',lineHeight:1.5}}>
                  {signedIn
                    ? 'Data saves to Google Sheets automatically and syncs across all devices.'
                    : 'Sign in to sync data across devices via Google Sheets. Data also saves locally as backup.'}
                </div>
              </div>
              <p style={{fontSize:10,color:'#64748b',fontFamily:'var(--m)',marginBottom:14,lineHeight:1.6}}>
                Export your data to transfer between artifact versions, or import a previous backup.
              </p>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
                <Btn onClick={()=>{
                  try {
                    const data = JSON.stringify({ settings: {
                      startDate, monthlyPersonalCash, startingFlipAmount, desiredMonthlyWithdrawal,
                      maxFlipSize, defaultYield, locInterestRate, flipDurationYears,
                      flipsPerAmount, growthMultiplier, staleThreshold, currentAge, retirementAge,
                      current401k, include401k, monthly401kContrib, annual401kYield, indexFundReturn,
                    }, actuals, flips: trackedFlips }, null, 2);
                    setExportData(data);
                  } catch(e) { setExportData('Error: ' + e.message); }
                }} color="#06b6d4">Export All Data</Btn>
                <Btn onClick={()=>setShowImport(!showImport)} color="#f59e0b">{showImport ? 'Cancel Import' : 'Import Data'}</Btn>
              </div>
              {exportData && (
                <div style={{marginBottom:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <span style={{fontSize:9,color:'#22c55e',fontFamily:'var(--m)'}}>Copy the text below and save it, or paste into the import on another device:</span>
                    <Btn onClick={()=>{navigator.clipboard.writeText(exportData).catch(()=>{});}} color="#06b6d4" small>Copy</Btn>
                  </div>
                  <textarea readOnly value={exportData} style={{width:'100%',height:120,background:'#020617',border:'1px solid #1e293b',borderRadius:6,color:'#94a3b8',fontSize:9,fontFamily:'var(--m)',padding:8,resize:'vertical',outline:'none'}}
                    onClick={e=>e.target.select()}/>
                  <div style={{marginTop:4}}><Btn onClick={()=>setExportData(null)} color="#475569" small>Close</Btn></div>
                </div>
              )}
              {showImport && (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:9,color:'#f59e0b',fontFamily:'var(--m)',marginBottom:6}}>Paste your exported data below:</div>
                  <textarea value={importData} onChange={e=>setImportData(e.target.value)} placeholder="Paste exported JSON here..."
                    style={{width:'100%',height:120,background:'#020617',border:'1px solid #1e293b',borderRadius:6,color:'#e2e8f0',fontSize:9,fontFamily:'var(--m)',padding:8,resize:'vertical',outline:'none'}}/>
                  <div style={{marginTop:6}}>
                    <Btn onClick={()=>{
                      try {
                        const data = JSON.parse(importData);
                        if (data.settings) {
                          const s = data.settings;
                          if (s.startDate) setStartDate(s.startDate);
                          if (s.monthlyPersonalCash != null) setMonthlyPersonalCash(s.monthlyPersonalCash);
                          if (s.startingFlipAmount != null) setStartingFlipAmount(s.startingFlipAmount);
                          if (s.desiredMonthlyWithdrawal != null) setDesiredMonthlyWithdrawal(s.desiredMonthlyWithdrawal);
                          if (s.maxFlipSize != null) setMaxFlipSize(s.maxFlipSize);
                          if (s.defaultYield != null) setDefaultYield(s.defaultYield);
                          if (s.locInterestRate != null) setLocInterestRate(s.locInterestRate);
                          if (s.flipDurationYears != null) setFlipDurationYears(s.flipDurationYears);
                          if (s.flipsPerAmount != null) setFlipsPerAmount(s.flipsPerAmount);
                          if (s.growthMultiplier != null) setGrowthMultiplier(s.growthMultiplier);
                          if (s.staleThreshold != null) setStaleThreshold(s.staleThreshold);
                          if (s.currentAge != null) setCurrentAge(s.currentAge);
                          if (s.retirementAge != null) setRetirementAge(s.retirementAge);
                          if (s.current401k != null) setCurrent401k(s.current401k);
                          if (s.include401k != null) setInclude401k(s.include401k);
                          if (s.monthly401kContrib != null) setMonthly401kContrib(s.monthly401kContrib);
                          if (s.annual401kYield != null) setAnnual401kYield(s.annual401kYield);
                          if (s.indexFundReturn != null) setIndexFundReturn(s.indexFundReturn);
                          saveSettings(s);
                        }
                        if (data.actuals) { setActuals(data.actuals); saveActuals(data.actuals); }
                        if (data.flips) { setTrackedFlips(data.flips); saveFlips(data.flips); }
                        setImportData(''); setShowImport(false);
                        setExportData(null);
                      } catch(e) { /* import error */ }
                    }} color="#22c55e" small>Import</Btn>
                  </div>
                </div>
              )}
              <Btn onClick={resetAll} color="#ef4444">Reset All Saved Data</Btn>
            </div>
          </div>
        )}
      </div>

      <footer style={{padding:'12px 20px',borderTop:'1px solid #0f172a',textAlign:'center',fontSize:8,color:'#1e293b',fontFamily:'var(--m)'}}>
        Cashflow Stacking v4 · Calculator & Tracker · Google Sheets Sync · Not financial advice
      </footer>
    </div>
  );
}


// ═══ App wrapper with Google Auth ═══
function AppWithAuth() {
  const [googleReady, setGoogleReady] = useState(false);
  const [signedIn, setSignedIn] = useState(false);

  useEffect(() => {
    initGoogleApi((authed) => {
      setSignedIn(authed);
    }).then(() => {
      setGoogleReady(true);
      if (isGoogleSignedIn()) setSignedIn(true);
    }).catch(e => {
      console.error('Google API init failed:', e);
      setGoogleReady(true); // Still allow app to work with localStorage
    });
  }, []);

  return React.createElement('div', null,
    React.createElement(App, { googleReady, signedIn, onSignIn: doSignIn, onSignOut: doSignOut }),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(AppWithAuth)
);

</script>
</body>
